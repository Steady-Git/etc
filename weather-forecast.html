<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기상청 날씨 조회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4ff;
  --card: #ffffff;
  --card2: #f8faff;
  --ink: #1a1f3a;
  --ink2: #4a5180;
  --muted: #8892b0;
  --sky-blue: #4f8ef7;
  --sky-light: #e8f0fe;
  --accent: #ff6b35;
  --warm: #ffa726;
  --cold: #42a5f5;
  --rain: #26c6da;
  --border: #e2e8f8;
  --shadow: 0 4px 24px rgba(79,142,247,0.10);
  --shadow-lg: 0 12px 48px rgba(79,142,247,0.15);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
}

/* Atmospheric top bar */
.atmo-bar {
  height: 6px;
  background: linear-gradient(90deg, #4f8ef7 0%, #42a5f5 30%, #26c6da 60%, #ffa726 80%, #ff6b35 100%);
}

.page-wrap {
  max-width: 960px;
  margin: 0 auto;
  padding: 36px 20px 80px;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 36px;
  flex-wrap: wrap;
  gap: 16px;
  animation: fadeIn .6s ease both;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.brand-icon {
  width: 52px; height: 52px;
  background: linear-gradient(135deg, #4f8ef7, #42a5f5);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  box-shadow: 0 6px 20px rgba(79,142,247,0.35);
}

.brand-text h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  letter-spacing: 2px;
  color: var(--ink);
  line-height: 1;
}

.brand-text p {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  font-family: 'DM Mono', monospace;
  margin-top: 2px;
}

/* ── SEARCH CARD ── */
.search-card {
  background: var(--card);
  border-radius: 20px;
  padding: 28px;
  box-shadow: var(--shadow);
  margin-bottom: 28px;
  border: 1px solid var(--border);
  animation: fadeIn .6s ease .05s both;
}

.region-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.region-btn {
  background: var(--card2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 9px 6px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink2);
  cursor: pointer;
  transition: all .18s;
  text-align: center;
}
.region-btn:hover { border-color: var(--sky-blue); color: var(--sky-blue); background: var(--sky-light); }
.region-btn.active {
  background: var(--sky-blue);
  border-color: var(--sky-blue);
  color: white;
  box-shadow: 0 4px 14px rgba(79,142,247,0.3);
}

.tab-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}

.tab-btn {
  flex: 1;
  background: var(--card2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all .18s;
}
.tab-btn.active {
  background: linear-gradient(135deg, #4f8ef7, #42a5f5);
  border-color: transparent;
  color: white;
  box-shadow: 0 4px 14px rgba(79,142,247,0.3);
}

.search-action {
  display: flex;
  justify-content: flex-end;
}

.go-btn {
  background: linear-gradient(135deg, #4f8ef7, #ff6b35);
  border: none;
  border-radius: 12px;
  padding: 13px 32px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: white;
  cursor: pointer;
  transition: all .2s;
  box-shadow: 0 6px 20px rgba(79,142,247,0.3);
  letter-spacing: .3px;
}
.go-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(79,142,247,0.4); }
.go-btn:active { transform: none; }
.go-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

/* ── LOADING ── */
.loading {
  display: none;
  text-align: center;
  padding: 48px;
}
.pulse-rings {
  display: flex; justify-content: center; gap: 6px; margin-bottom: 16px;
}
.ring {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--sky-blue);
  animation: pulse .9s ease-in-out infinite;
}
.ring:nth-child(2) { animation-delay:.15s; }
.ring:nth-child(3) { animation-delay:.3s; }
@keyframes pulse {
  0%,100% { transform: scale(.6); opacity:.4; }
  50% { transform: scale(1.2); opacity:1; }
}
.loading p { color: var(--muted); font-size: 13px; }

/* ── ERROR ── */
.error-box {
  display: none;
  background: #fff5f5;
  border: 1px solid #fed7d7;
  border-radius: 12px;
  padding: 14px 18px;
  color: #c53030;
  font-size: 13px;
  margin-bottom: 20px;
  line-height: 1.7;
}

/* ── WEATHER OUTPUT ── */
.weather-out { display: none; }

/* Now card */
.now-card {
  background: linear-gradient(135deg, #1a2a6c 0%, #2a52a8 40%, #4f8ef7 70%, #42a5f5 100%);
  border-radius: 24px;
  padding: 36px 32px;
  color: white;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 12px 48px rgba(26,42,108,.3);
  animation: fadeUp .5s ease both;
}

.now-card::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 280px; height: 280px;
  border-radius: 50%;
  background: rgba(255,255,255,.06);
}

.now-card::after {
  content: '';
  position: absolute;
  bottom: -80px; left: -40px;
  width: 220px; height: 220px;
  border-radius: 50%;
  background: rgba(255,255,255,.04);
}

.now-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 12px;
  position: relative; z-index:1;
}

.now-loc {
  font-size: 13px;
  opacity: .75;
  letter-spacing: .5px;
  font-family: 'DM Mono', monospace;
}

.now-name {
  font-size: 26px;
  font-weight: 900;
  letter-spacing: -1px;
  margin-top: 4px;
}

.now-updated {
  font-size: 11px;
  opacity: .6;
  font-family: 'DM Mono', monospace;
  text-align: right;
  line-height: 1.8;
}

.now-main {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 28px;
  position: relative; z-index:1;
  flex-wrap: wrap;
}

.now-icon { font-size: 72px; line-height:1; filter: drop-shadow(0 4px 12px rgba(0,0,0,.2)); }

.now-temp {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 88px;
  line-height: 1;
  letter-spacing: -2px;
}

.now-sky {
  font-size: 16px;
  opacity: .85;
  font-weight: 500;
  margin-top: 6px;
}

.now-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 12px;
  position: relative; z-index:1;
}

.now-stat {
  background: rgba(255,255,255,.12);
  border-radius: 12px;
  padding: 12px 16px;
  backdrop-filter: blur(8px);
}

.now-stat-label {
  font-size: 10px;
  opacity: .7;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-family: 'DM Mono', monospace;
  margin-bottom: 5px;
}

.now-stat-val {
  font-size: 20px;
  font-weight: 700;
  font-family: 'DM Mono', monospace;
}

.now-stat-unit { font-size: 12px; font-weight: 400; opacity: .8; }

/* ── HOURLY FORECAST ── */
.section-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.scroll-wrap {
  overflow-x: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  padding-bottom: 6px;
}

.hourly-row {
  display: flex;
  gap: 10px;
  min-width: max-content;
}

.hour-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 14px 18px;
  text-align: center;
  min-width: 88px;
  transition: all .18s;
  cursor: default;
  animation: fadeUp .4s ease both;
}
.hour-card:hover { border-color: var(--sky-blue); transform: translateY(-2px); box-shadow: var(--shadow); }

.h-time { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 8px; }
.h-icon { font-size: 24px; display: block; margin-bottom: 6px; }
.h-temp { font-size: 17px; font-weight: 700; color: var(--ink); font-family: 'DM Mono', monospace; }
.h-rain { font-size: 10px; color: var(--rain); margin-top: 4px; font-family: 'DM Mono', monospace; }
.h-wind { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* ── MID TERM ── */
.mid-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 12px;
}

.mid-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 18px 14px;
  text-align: center;
  transition: all .18s;
  animation: fadeUp .4s ease both;
}
.mid-card:hover { border-color: var(--sky-blue); box-shadow: var(--shadow); transform: translateY(-2px); }

.mid-date { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 2px; }
.mid-day { font-size: 13px; font-weight: 700; color: var(--ink2); margin-bottom: 10px; }
.mid-icons { font-size: 20px; margin-bottom: 10px; display: flex; justify-content: center; gap: 4px; }
.mid-temps {
  display: flex;
  justify-content: center;
  gap: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
}
.mid-max { color: var(--accent); font-weight: 700; }
.mid-min { color: var(--cold); font-weight: 500; }
.mid-rain-prob { font-size: 10px; color: var(--rain); margin-top: 6px; font-family: 'DM Mono', monospace; }

/* ── NOTICE ── */
.notice {
  background: #fffbeb;
  border: 1px solid #fde68a;
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 12px;
  color: #92400e;
  margin-bottom: 24px;
  line-height: 1.7;
  animation: fadeIn .6s ease .1s both;
}

/* ── FORECAST SECTION WRAP ── */
.section-wrap {
  background: var(--card);
  border-radius: 20px;
  padding: 24px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  margin-bottom: 20px;
  animation: fadeUp .5s ease both;
}

/* ── OUTLOOK ── */
.outlook-box {
  background: linear-gradient(135deg, var(--card2), var(--sky-light));
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  font-size: 14px;
  line-height: 1.9;
  color: var(--ink2);
}
.outlook-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--sky-blue);
  font-family: 'DM Mono', monospace;
  margin-bottom: 10px;
}

/* Animations */
@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(16px); }
  to { opacity:1; transform: translateY(0); }
}

/* Responsive */
@media (max-width: 600px) {
  .now-temp { font-size: 66px; }
  .now-icon { font-size: 54px; }
  .mid-grid { grid-template-columns: repeat(3, 1fr); }
  .tab-row { flex-wrap: wrap; }
}
</style>
</head>
<body>

<div class="atmo-bar"></div>
<div class="page-wrap">

  <header>
    <div class="brand">
      <div class="brand-icon">⛅</div>
      <div class="brand-text">
        <h1>WEATHER NOW</h1>
        <p>기상청 단기 · 중기예보 조회</p>
      </div>
    </div>
  </header>

  <div class="notice">
    ⚠️ 기상청 공공데이터 API(단기예보 VilageFcstInfoService_2.0 / 중기예보 MidFcstInfoService)를 사용합니다.
    CORS 정책으로 브라우저 직접 호출이 차단될 경우 <b>데모 데이터</b>로 표시됩니다.
    실 서비스 배포 시 백엔드 프록시 서버가 필요합니다.
  </div>

  <!-- SEARCH CARD -->
  <div class="search-card">
    <!-- 지역 선택 -->
    <div style="font-size:12px;font-weight:600;color:var(--ink2);letter-spacing:.5px;margin-bottom:12px;">📍 지역 선택</div>
    <div class="region-grid" id="regionGrid"></div>

    <!-- 탭 -->
    <div style="font-size:12px;font-weight:600;color:var(--ink2);letter-spacing:.5px;margin-bottom:12px;margin-top:20px;">📅 예보 종류</div>
    <div class="tab-row">
      <button class="tab-btn active" data-tab="short" onclick="setTab(this)">단기예보 (오늘~내일)</button>
      <button class="tab-btn" data-tab="mid" onclick="setTab(this)">중기예보 (3~7일)</button>
      <button class="tab-btn" data-tab="both" onclick="setTab(this)">통합 조회</button>
    </div>

    <div class="search-action">
      <button class="go-btn" id="goBtn" onclick="fetchWeather()">날씨 조회 →</button>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>
  <div class="loading" id="loading">
    <div class="pulse-rings"><div class="ring"></div><div class="ring"></div><div class="ring"></div></div>
    <p>기상청 서버에서 날씨 데이터를 불러오는 중…</p>
  </div>

  <div class="weather-out" id="weatherOut"></div>
</div>

<script>
const API_KEY = 'dc8294cd0177c5d51b45be29652fb691c4b18e055f22c87b0967ca1a78c7df0a';
const SHORT_BASE = 'https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0';
const MID_BASE   = 'https://apis.data.go.kr/1360000/MidFcstInfoService';

// 주요 지역 (nx, ny: 단기예보 격자 / regId: 중기예보 코드)
const REGIONS = [
  { name:'서울', nx:60, ny:127, regId:'11B10101', midTempId:'11B10101' },
  { name:'인천', nx:55, ny:124, regId:'11B20201', midTempId:'11B20201' },
  { name:'수원', nx:60, ny:121, regId:'11B20601', midTempId:'11B20601' },
  { name:'춘천', nx:73, ny:134, regId:'11D10101', midTempId:'11D10101' },
  { name:'강릉', nx:92, ny:131, regId:'11D20501', midTempId:'11D20501' },
  { name:'청주', nx:69, ny:107, regId:'11C10301', midTempId:'11C10301' },
  { name:'대전', nx:67, ny:100, regId:'11C20401', midTempId:'11C20401' },
  { name:'전주', nx:63, ny:89,  regId:'11F10201', midTempId:'11F10201' },
  { name:'광주', nx:58, ny:74,  regId:'11F20501', midTempId:'11F20501' },
  { name:'대구', nx:89, ny:90,  regId:'11H10701', midTempId:'11H10701' },
  { name:'부산', nx:98, ny:76,  regId:'11H20201', midTempId:'11H20201' },
  { name:'울산', nx:102,ny:84,  regId:'11H20101', midTempId:'11H20101' },
  { name:'제주', nx:52, ny:38,  regId:'11G00201', midTempId:'11G00201' },
];

let selectedRegion = REGIONS[0];
let selectedTab = 'short';

// Build region buttons
const grid = document.getElementById('regionGrid');
REGIONS.forEach(r => {
  const b = document.createElement('button');
  b.className = 'region-btn' + (r === selectedRegion ? ' active' : '');
  b.textContent = r.name;
  b.onclick = () => {
    document.querySelectorAll('.region-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    selectedRegion = r;
  };
  grid.appendChild(b);
});

function setTab(el) {
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  selectedTab = el.dataset.tab;
}

// ─── Date/Time helpers ───
function getBaseTime() {
  const now = new Date();
  const h = now.getHours();
  // 발표 시각: 0200, 0500, 0800, 1100, 1400, 1700, 2000, 2300
  const slots = [2,5,8,11,14,17,20,23];
  let base = 23;
  for (let i = slots.length-1; i >= 0; i--) {
    if (h >= slots[i]) { base = slots[i]; break; }
  }
  // 조회시 최소 10분 이후부터 유효
  if (now.getMinutes() < 10) base = base === 2 ? 23 : slots[slots.indexOf(base)-1] ?? 23;
  return String(base).padStart(2,'0') + '00';
}

function getBaseDate(forYesterday = false) {
  const d = new Date();
  const h = d.getHours();
  // 0200 이전이면 전날 2300 사용
  if (h < 2) d.setDate(d.getDate()-1);
  if (forYesterday) d.setDate(d.getDate()-1);
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

function getTmFc() {
  // 중기예보 발표시각: 0600, 1800
  const now = new Date();
  const h = now.getHours();
  const d = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  return d + (h >= 18 ? '1800' : h >= 6 ? '0600' : (() => {
    const y = new Date(now); y.setDate(y.getDate()-1);
    return `${y.getFullYear()}${String(y.getMonth()+1).padStart(2,'0')}${String(y.getDate()).padStart(2,'0')}1800`;
  })());
}

async function apiFetch(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const ct = res.headers.get('content-type')||'';
  if (ct.includes('json')) return res.json();
  const text = await res.text();
  if (text.trim().startsWith('<')) throw new Error('XML응답(CORS차단)');
  return JSON.parse(text);
}

async function fetchWeather() {
  document.getElementById('goBtn').disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('weatherOut').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';

  try {
    let shortData = null, midLandData = null, midTempData = null;
    const r = selectedRegion;
    const baseDate = getBaseDate();
    const baseTime = getBaseTime();
    const tmFc = getTmFc();

    const promises = [];

    if (selectedTab === 'short' || selectedTab === 'both') {
      // 초단기실황
      const ultUrl = `${SHORT_BASE}/getUltraSrtNcst?serviceKey=${API_KEY}&pageNo=1&numOfRows=10&dataType=JSON&base_date=${baseDate}&base_time=${getBaseTime()}&nx=${r.nx}&ny=${r.ny}`;
      // 단기예보
      const frcUrl = `${SHORT_BASE}/getVilageFcst?serviceKey=${API_KEY}&pageNo=1&numOfRows=300&dataType=JSON&base_date=${baseDate}&base_time=${baseTime}&nx=${r.nx}&ny=${r.ny}`;
      promises.push(apiFetch(ultUrl), apiFetch(frcUrl));
    }

    if (selectedTab === 'mid' || selectedTab === 'both') {
      // 중기육상예보
      const midLandUrl = `${MID_BASE}/getMidLandFcst?serviceKey=${API_KEY}&pageNo=1&numOfRows=10&dataType=JSON&regId=${r.regId}&tmFc=${tmFc}`;
      // 중기기온
      const midTempUrl = `${MID_BASE}/getMidTa?serviceKey=${API_KEY}&pageNo=1&numOfRows=10&dataType=JSON&regId=${r.midTempId}&tmFc=${tmFc}`;
      promises.push(apiFetch(midLandUrl), apiFetch(midTempUrl));
    }

    const results = await Promise.allSettled(promises);

    if (selectedTab === 'short') {
      shortData = { ult: results[0], frc: results[1] };
    } else if (selectedTab === 'mid') {
      midLandData = results[0];
      midTempData  = results[1];
    } else {
      shortData    = { ult: results[0], frc: results[1] };
      midLandData  = results[2];
      midTempData  = results[3];
    }

    renderAll(shortData, midLandData, midTempData);

  } catch(e) {
    console.warn('API error, using demo:', e);
    renderDemo();
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('goBtn').disabled = false;
  }
}

// ─── Parsers ───
function parseNcst(data) {
  try {
    const items = data.value?.response?.body?.items?.item || [];
    const map = {};
    items.forEach(i => { map[i.category] = i.obsrValue; });
    return map;
  } catch { return {}; }
}

function parseFcst(data) {
  try {
    const items = data.value?.response?.body?.items?.item || [];
    // group by fcstDate+fcstTime
    const map = {};
    items.forEach(i => {
      const k = i.fcstDate + i.fcstTime;
      if (!map[k]) map[k] = { date: i.fcstDate, time: i.fcstTime };
      map[k][i.category] = i.fcstValue;
    });
    return Object.values(map).sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));
  } catch { return []; }
}

function parseMidLand(data) {
  try {
    return data.value?.response?.body?.items?.item?.[0] || null;
  } catch { return null; }
}

function parseMidTemp(data) {
  try {
    return data.value?.response?.body?.items?.item?.[0] || null;
  } catch { return null; }
}

// ─── Sky code ───
function skyInfo(sky, pty) {
  if (pty && pty !== '0') {
    const m = { '1':['🌧️','비'], '2':['🌨️','비/눈'], '3':['❄️','눈'], '4':['🌦️','소나기'] };
    return m[pty] || ['🌧️','비'];
  }
  const m = { '1':['☀️','맑음'], '3':['⛅','구름많음'], '4':['☁️','흐림'] };
  return m[sky] || ['🌤️','구름조금'];
}

function midSkyIcon(wf) {
  if (!wf) return '❓';
  if (wf.includes('비')) return '🌧️';
  if (wf.includes('눈')) return '❄️';
  if (wf.includes('흐림')) return '☁️';
  if (wf.includes('구름많')) return '⛅';
  return '☀️';
}

function dayName(dateStr) {
  if (!dateStr) return '-';
  const d = new Date(dateStr.slice(0,4)+'-'+dateStr.slice(4,6)+'-'+dateStr.slice(6,8));
  return ['일','월','화','수','목','금','토'][d.getDay()];
}

function formatDate(dateStr) {
  if (!dateStr) return '-';
  return `${dateStr.slice(4,6)}/${dateStr.slice(6,8)}`;
}

// ─── Render ───
function renderAll(shortData, midLandData, midTempData) {
  const r = selectedRegion;
  const out = document.getElementById('weatherOut');
  out.innerHTML = '';

  const now = new Date();
  const updStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  // SHORT
  if (shortData) {
    const ncst = parseNcst(shortData.ult);
    const fcstList = parseFcst(shortData.frc);

    // if both failed, use demo
    const hasReal = Object.keys(ncst).length > 0 || fcstList.length > 0;

    const temp  = ncst['T1H'] ?? fcstList[0]?.TMP ?? '--';
    const humid = ncst['REH'] ?? '--';
    const wind  = ncst['WSD'] ?? fcstList[0]?.WSD ?? '--';
    const pty   = ncst['PTY'] ?? fcstList[0]?.PTY ?? '0';
    const sky   = fcstList[0]?.SKY ?? '1';
    const [icon, skyLabel] = skyInfo(sky, pty);
    const rain1h = ncst['RN1'] ?? '--';

    // Now card
    const nowEl = document.createElement('div');
    nowEl.className = 'now-card';
    nowEl.innerHTML = `
      <div class="now-top">
        <div>
          <div class="now-loc">📍 현재 날씨 · 초단기실황</div>
          <div class="now-name">${r.name}</div>
        </div>
        <div class="now-updated">${updStr}<br>기상청 제공</div>
      </div>
      <div class="now-main">
        <div class="now-icon">${icon}</div>
        <div>
          <div class="now-temp">${temp}<span style="font-size:40px;opacity:.7">°</span></div>
          <div class="now-sky">${skyLabel}</div>
        </div>
      </div>
      <div class="now-grid">
        <div class="now-stat">
          <div class="now-stat-label">습도</div>
          <div class="now-stat-val">${humid}<span class="now-stat-unit">%</span></div>
        </div>
        <div class="now-stat">
          <div class="now-stat-label">풍속</div>
          <div class="now-stat-val">${wind}<span class="now-stat-unit">m/s</span></div>
        </div>
        <div class="now-stat">
          <div class="now-stat-label">1시간강수</div>
          <div class="now-stat-val">${rain1h}<span class="now-stat-unit">mm</span></div>
        </div>
        <div class="now-stat">
          <div class="now-stat-label">데이터</div>
          <div class="now-stat-val" style="font-size:13px">${hasReal?'실시간':'데모'}</div>
        </div>
      </div>
    `;
    out.appendChild(nowEl);

    // Hourly
    if (fcstList.length > 0) {
      const secWrap = document.createElement('div');
      secWrap.className = 'section-wrap';
      const hours = fcstList.slice(0, 16);
      secWrap.innerHTML = `
        <div class="section-title">시간별 예보</div>
        <div class="scroll-wrap">
          <div class="hourly-row">
            ${hours.map((fc, i) => {
              const [hicon] = skyInfo(fc.SKY, fc.PTY);
              const hr = fc.time ? fc.time.slice(0,2)+':00' : '--';
              const dateTxt = i > 0 && fc.date !== hours[i-1]?.date ? `<span style="font-size:9px;display:block;color:var(--sky-blue)">${formatDate(fc.date)}</span>` : '';
              return `
                <div class="hour-card" style="animation-delay:${i*.04}s">
                  <div class="h-time">${dateTxt}${hr}</div>
                  <span class="h-icon">${hicon}</span>
                  <div class="h-temp">${fc.TMP ?? fc.T1H ?? '--'}°</div>
                  <div class="h-rain">💧 ${fc.POP ?? '0'}%</div>
                  <div class="h-wind">${fc.WSD ?? '--'}m/s</div>
                </div>`;
            }).join('')}
          </div>
        </div>
      `;
      out.appendChild(secWrap);
    }
  }

  // MID
  if (midLandData || midTempData) {
    const land = parseMidLand(midLandData);
    const temp = parseMidTemp(midTempData);

    const midWrap = document.createElement('div');
    midWrap.className = 'section-wrap';

    // Outlook text
    const outlook = land?.wf3Am || land?.wf4Am || '중기예보 데이터를 불러오는 중입니다.';

    // Build 3~7 day
    const today = new Date();
    const days = [];
    for (let d = 3; d <= 7; d++) {
      const dt = new Date(today);
      dt.setDate(today.getDate() + d);
      const dStr = `${dt.getFullYear()}${String(dt.getMonth()+1).padStart(2,'0')}${String(dt.getDate()).padStart(2,'0')}`;
      const amKey = `wf${d}Am`;
      const pmKey = `wf${d}Pm`;
      const taMaxKey = `taMax${d}`;
      const taMinKey = `taMin${d}`;
      const rainAmKey = `rnSt${d}Am`;
      const rainPmKey = `rnSt${d}Pm`;
      days.push({
        dateStr: dStr,
        dayName: dayName(dStr),
        wfAm: land?.[amKey] ?? '',
        wfPm: land?.[pmKey] ?? '',
        taMax: temp?.[taMaxKey] ?? '--',
        taMin: temp?.[taMinKey] ?? '--',
        rainAm: land?.[rainAmKey] ?? '--',
        rainPm: land?.[rainPmKey] ?? '--',
      });
    }

    midWrap.innerHTML = `
      <div class="section-title">중기예보 (3~7일)</div>
      ${land?.wf4Am ? `
      <div class="outlook-box" style="margin-bottom:16px">
        <div class="outlook-label">기상 전망</div>
        ${land.wf3Am || ''} ${land.wf4Am ? '/ '+land.wf4Am : ''}
      </div>` : ''}
      <div class="mid-grid">
        ${days.map((d, i) => `
          <div class="mid-card" style="animation-delay:${i*.06}s">
            <div class="mid-date">${formatDate(d.dateStr)}</div>
            <div class="mid-day">${d.dayName}요일</div>
            <div class="mid-icons">
              <span title="오전">${midSkyIcon(d.wfAm)}</span>
              <span style="font-size:12px;opacity:.3">|</span>
              <span title="오후">${midSkyIcon(d.wfPm)}</span>
            </div>
            <div class="mid-temps">
              <span class="mid-max">${d.taMax}°</span>
              <span style="color:var(--border)">|</span>
              <span class="mid-min">${d.taMin}°</span>
            </div>
            <div class="mid-rain-prob">☔ ${d.rainAm}% / ${d.rainPm}%</div>
          </div>
        `).join('')}
      </div>
    `;
    out.appendChild(midWrap);
  }

  out.style.display = 'block';
}

  if (selectedTab === 'short') renderAll(demoShort, null, null);
