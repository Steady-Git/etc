<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중기예보 날씨</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0f1117;
  --ink2: #2d3550;
  --muted: #7c8aaa;
  --bg: #eef2fb;
  --card: #ffffff;
  --border: #dde3f5;
  --sky: #4a7cf7;
  --sky-lt: #e8effe;
  --sun: #f59e0b;
  --rain: #38bdf8;
  --snow: #a5b4fc;
  --warm: #fb923c;
  --cold: #60a5fa;
  --green: #34d399;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--ink);
  min-height: 100vh;
}

/* Subtle dot grid bg */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(var(--border) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none; z-index: 0;
}

.wrap {
  position: relative; z-index: 1;
  max-width: 980px;
  margin: 0 auto;
  padding: 44px 20px 90px;
}

/* ── TOP HEADER ── */
.top-header {
  margin-bottom: 40px;
  animation: fadeUp .7s ease both;
}

.eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.main-title {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(36px, 6vw, 60px);
  font-weight: 400;
  letter-spacing: -1.5px;
  line-height: 1.0;
  color: var(--ink);
}

.main-title em {
  font-style: italic;
  color: var(--sky);
}

.subtitle {
  font-size: 13px;
  color: var(--muted);
  margin-top: 10px;
  font-weight: 300;
}

/* ── CONTROL PANEL ── */
.control-panel {
  background: var(--card);
  border-radius: 24px;
  border: 1px solid var(--border);
  padding: 28px 28px 24px;
  margin-bottom: 28px;
  box-shadow: 0 2px 20px rgba(74,124,247,.07);
  animation: fadeUp .7s ease .05s both;
}

.ctrl-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  margin-bottom: 12px;
}

.region-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
}

.rtab {
  padding: 7px 16px;
  border-radius: 30px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink2);
  cursor: pointer;
  transition: all .16s;
}

.rtab:hover { border-color: var(--sky); color: var(--sky); }
.rtab.on {
  background: var(--sky);
  border-color: var(--sky);
  color: #fff;
  box-shadow: 0 4px 14px rgba(74,124,247,.35);
}

.ctrl-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.api-note {
  font-size: 11px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  line-height: 1.6;
}

.fetch-btn {
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 13px 28px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all .18s;
  letter-spacing: .3px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.fetch-btn:hover { background: var(--sky); box-shadow: 0 6px 20px rgba(74,124,247,.35); transform: translateY(-1px); }
.fetch-btn:active { transform: none; }
.fetch-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

/* ── LOADING ── */
.loader {
  display: none;
  padding: 52px;
  text-align: center;
}

.load-dots {
  display: flex; justify-content: center; gap: 8px; margin-bottom: 18px;
}

.ld {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--sky);
  animation: bounce .8s ease-in-out infinite;
}
.ld:nth-child(2) { animation-delay: .15s; background: var(--sun); }
.ld:nth-child(3) { animation-delay: .3s; background: var(--rain); }

@keyframes bounce {
  0%,100% { transform: translateY(0); opacity: .5; }
  50% { transform: translateY(-10px); opacity: 1; }
}

.loader p { color: var(--muted); font-size: 13px; }

/* ── ERROR ── */
.err-box {
  display: none;
  background: #fff5f5;
  border: 1px solid #fecdd3;
  border-radius: 14px;
  padding: 14px 18px;
  font-size: 13px;
  color: #be123c;
  margin-bottom: 20px;
  line-height: 1.8;
}

/* ── OUTPUT ── */
.output { display: none; }

/* ── LOCATION HERO ── */
.loc-hero {
  display: flex;
  align-items: stretch;
  gap: 20px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  animation: fadeUp .5s ease both;
}

.loc-main {
  flex: 1; min-width: 260px;
  background: var(--ink);
  border-radius: 22px;
  padding: 32px;
  color: #fff;
  position: relative;
  overflow: hidden;
}

.loc-main::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 240px; height: 240px;
  border-radius: 50%;
  background: rgba(74,124,247,.15);
}

.loc-main::after {
  content: '';
  position: absolute;
  bottom: -80px; left: -30px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: rgba(245,158,11,.08);
}

.loc-tag {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  opacity: .55;
  text-transform: uppercase;
  margin-bottom: 8px;
  position: relative; z-index:1;
}

.loc-name {
  font-size: 32px;
  font-weight: 900;
  letter-spacing: -1px;
  position: relative; z-index:1;
  margin-bottom: 4px;
}

.loc-sub {
  font-size: 12px;
  opacity: .5;
  position: relative; z-index:1;
  font-family: 'DM Mono', monospace;
  margin-bottom: 24px;
}

.loc-period {
  display: inline-block;
  background: rgba(255,255,255,.1);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 12px;
  opacity: .8;
  position: relative; z-index:1;
  font-family: 'DM Mono', monospace;
}

/* Outlook card */
.outlook-card {
  flex: 1.4; min-width: 260px;
  background: var(--card);
  border-radius: 22px;
  border: 1px solid var(--border);
  padding: 28px;
}

.oc-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

.oc-sections { display: flex; flex-direction: column; gap: 12px; }

.oc-section {
  background: var(--bg);
  border-radius: 12px;
  padding: 14px 16px;
}

.oc-sec-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
  font-family: 'DM Mono', monospace;
}

.oc-text {
  font-size: 13px;
  color: var(--ink2);
  line-height: 1.8;
}

/* ── 7-DAY FORECAST ── */
.week-section {
  background: var(--card);
  border-radius: 22px;
  border: 1px solid var(--border);
  padding: 28px;
  margin-bottom: 20px;
  animation: fadeUp .5s ease .05s both;
}

.sec-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2.5px;
  color: var(--muted);
  text-transform: uppercase;
  font-family: 'DM Mono', monospace;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.sec-title::after { content:''; flex:1; height:1px; background: var(--border); }

.day-rows { display: flex; flex-direction: column; gap: 8px; }

.day-row {
  display: grid;
  grid-template-columns: 90px 44px 44px 80px 1fr 90px;
  align-items: center;
  gap: 12px;
  background: var(--bg);
  border-radius: 14px;
  padding: 16px 20px;
  transition: all .16s;
  animation: fadeUp .4s ease both;
  cursor: default;
}

.day-row:hover { background: var(--sky-lt); transform: translateX(4px); }

.day-date {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}

.day-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
}
.day-name.sat { color: var(--sky); }
.day-name.sun { color: var(--warm); }

.day-icons {
  display: flex;
  gap: 4px;
  font-size: 20px;
}

.day-icons .sep {
  font-size: 11px;
  color: var(--border);
  align-self: center;
}

.temp-bar-wrap {
  flex: 1;
  position: relative;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
}

.temp-bar-fill {
  position: absolute;
  top: 0;
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--cold), var(--warm));
}

.day-temps {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
}

.t-max { color: var(--warm); font-weight: 700; }
.t-min { color: var(--cold); }

.day-rain {
  font-size: 11px;
  color: var(--rain);
  font-family: 'DM Mono', monospace;
  text-align: right;
}

/* responsive day-row */
@media (max-width: 640px) {
  .day-row {
    grid-template-columns: 70px 36px 60px 1fr 80px;
    padding: 12px 14px;
  }
  .day-icons { font-size: 17px; }
  .temp-bar-wrap { display: none; }
}

/* ── TEMP CHART SECTION ── */
.chart-section {
  background: var(--card);
  border-radius: 22px;
  border: 1px solid var(--border);
  padding: 28px;
  margin-bottom: 20px;
  animation: fadeUp .5s ease .1s both;
}

.chart-canvas-wrap {
  position: relative;
  height: 180px;
  margin-top: 10px;
}

canvas { width: 100% !important; }

/* ── LEGEND ── */
.legend {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  margin-top: 14px;
}

.leg-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
}

.leg-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
}

/* ── NOTICE ── */
.notice-strip {
  background: #fffbeb;
  border: 1px solid #fde68a;
  border-radius: 14px;
  padding: 12px 18px;
  font-size: 12px;
  color: #92400e;
  line-height: 1.7;
  margin-bottom: 24px;
  animation: fadeUp .6s ease .1s both;
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(18px); }
  to   { opacity:1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="top-header">
    <div class="eyebrow">기상청 MidFcstInfoService · REST API</div>
    <h1 class="main-title">중기<em>예보</em><br>날씨 조회</h1>
    <p class="subtitle">중기전망 · 중기육상예보 · 중기기온 — 3~7일 예측 정보 제공</p>
  </div>

  <div class="notice-strip">
    ⚠️ 기상청 공공데이터 API (MidFcstInfoService)를 사용합니다.
    브라우저 CORS 정책으로 직접 호출이 차단될 경우 <b>데모 데이터</b>로 자동 표시됩니다.
    실 서비스에는 서버사이드 프록시가 필요합니다.
  </div>

  <!-- CONTROL -->
  <div class="control-panel">
    <div class="ctrl-label">지역 선택</div>
    <div class="region-tabs" id="regionTabs"></div>
    <div class="ctrl-bottom">
      <div class="api-note">
        발표시각: 매일 06:00 / 18:00<br>
        오퍼레이션: 중기전망 · 중기육상예보 · 중기기온
      </div>
      <button class="fetch-btn" id="fetchBtn" onclick="run()">
        <span>조회하기</span>
        <span>→</span>
      </button>
    </div>
  </div>

  <div class="err-box" id="errBox"></div>

  <div class="loader" id="loader">
    <div class="load-dots">
      <div class="ld"></div><div class="ld"></div><div class="ld"></div>
    </div>
    <p>기상청 중기예보 데이터 불러오는 중…</p>
  </div>

  <div class="output" id="output"></div>
</div>

<script>
const KEY = 'dc8294cd0177c5d51b45be29652fb691c4b18e055f22c87b0967ca1a78c7df0a';
const BASE = 'https://apis.data.go.kr/1360000/MidFcstInfoService';

// 지역 데이터: regId(육상), tempId(기온), name
const REGIONS = [
  { name:'서울·경기', regId:'11B00000', tempId:'11B10101' },
  { name:'인천', regId:'11B00000', tempId:'11B20201' },
  { name:'춘천(강원내륙)', regId:'11D10000', tempId:'11D10101' },
  { name:'강릉(강원동해)', regId:'11D20000', tempId:'11D20501' },
  { name:'청주(충북)', regId:'11C10000', tempId:'11C10301' },
  { name:'대전(충남)', regId:'11C20000', tempId:'11C20401' },
  { name:'전주(전북)', regId:'11F10000', tempId:'11F10201' },
  { name:'광주(전남)', regId:'11F20000', tempId:'11F20501' },
  { name:'대구(경북)', regId:'11H10000', tempId:'11H10701' },
  { name:'부산(경남)', regId:'11H20000', tempId:'11H20201' },
  { name:'제주', regId:'11G00000', tempId:'11G00201' },
];

let sel = REGIONS[0];

// Build tabs
const tabWrap = document.getElementById('regionTabs');
REGIONS.forEach(r => {
  const b = document.createElement('button');
  b.className = 'rtab' + (r === sel ? ' on' : '');
  b.textContent = r.name;
  b.onclick = () => {
    document.querySelectorAll('.rtab').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    sel = r;
  };
  tabWrap.appendChild(b);
});

// TmFc: 중기예보 발표시각 (0600/1800)
function getTmFc() {
  const now = new Date();
  const h = now.getHours();
  const pad = n => String(n).padStart(2,'0');
  const d = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
  if (h >= 18) return d + '1800';
  if (h >= 6)  return d + '0600';
  // before 6am → yesterday 1800
  const y = new Date(now); y.setDate(y.getDate()-1);
  return `${y.getFullYear()}${pad(y.getMonth()+1)}${pad(y.getDate())}1800`;
}

async function apiFetch(op, params) {
  const p = new URLSearchParams({ serviceKey: KEY, dataType:'JSON', pageNo:1, numOfRows:10, ...params });
  const res = await fetch(`${BASE}/${op}?${p}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const ct = res.headers.get('content-type')||'';
  if (!ct.includes('json')) throw new Error('Non-JSON (CORS blocked)');
  return res.json();
}

async function run() {
  document.getElementById('fetchBtn').disabled = true;
  document.getElementById('loader').style.display = 'block';
  document.getElementById('output').style.display = 'none';
  document.getElementById('errBox').style.display = 'none';

  const tmFc = getTmFc();
  try {
    const [outlook, land, temp] = await Promise.all([
      apiFetch('getMidFcst',    { stnId: getMidFcstStnId(sel.regId), tmFc }),
      apiFetch('getMidLandFcst',{ regId: sel.regId, tmFc }),
      apiFetch('getMidTa',      { regId: sel.tempId, tmFc }),
    ]);
    render(outlook, land, temp, tmFc);
  } catch(e) {
    console.warn('API failed, using demo:', e.message);
    renderDemo(tmFc);
  } finally {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('fetchBtn').disabled = false;
  }
}

// 중기전망 stnId 매핑
function getMidFcstStnId(regId) {
  const m = {
    '11B00000':'109', '11D10000':'101', '11D20000':'105',
    '11C10000':'131', '11C20000':'133', '11F10000':'146',
    '11F20000':'156', '11H10000':'143', '11H20000':'159',
    '11G00000':'184',
  };
  return m[regId] || '109';
}

function getItem(data) {
  try {
    const item = data?.response?.body?.items?.item;
    if (!item) return {};
    return Array.isArray(item) ? item[0] : item;
  } catch { return {}; }
}

function render(outlookData, landData, tempData, tmFc) {
  const outlook = getItem(outlookData);
  const land    = getItem(landData);
  const temp    = getItem(tempData);
  console.log('[중기전망] outlook keys:', Object.keys(outlook));
  console.log('[중기전망] wf value:', outlook.wf);
  console.log('[중기육상] land keys (sample):', Object.keys(land).slice(0,6));
  console.log('[중기기온] temp taMax3:', temp.taMax3, 'taMin3:', temp.taMin3);
  renderUI(outlook, land, temp, tmFc, false);
}

function renderDemo(tmFc) {
  const wfOpts = ['맑음','구름많음','구름많음','흐림','흐리고 비','맑음','구름조금'];
  const mk = () => wfOpts[Math.floor(Math.random()*wfOpts.length)];
  const ri = () => Math.round(Math.random()*50);
  const base = 17;

  const land = {
    wf3Am:mk(), wf3Pm:mk(), wf4Am:mk(), wf4Pm:mk(),
    wf5Am:mk(), wf5Pm:mk(), wf6Am:mk(), wf6Pm:mk(), wf7Am:mk(), wf7Pm:mk(),
    rnSt3Am:ri(), rnSt3Pm:ri(), rnSt4Am:ri(), rnSt4Pm:ri(),
    rnSt5Am:ri(), rnSt5Pm:ri(), rnSt6Am:ri(), rnSt6Pm:ri(),
    rnSt7Am:ri(), rnSt7Pm:ri(),
  };

  const temp = {
    taMax3: base+6, taMin3: base,
    taMax4: base+7, taMin4: base+1,
    taMax5: base+4, taMin5: base-1,
    taMax6: base+8, taMin6: base+2,
    taMax7: base+9, taMin7: base+3,
  };

  const outlook = {
    wf: `${sel.name} 지역은 이번 주 전반 구름이 많겠으나 큰 비는 없겠습니다. 주 중반 이후 기온이 점차 오르면서 맑은 날씨가 예상됩니다. (데모 데이터)`
  };

  renderUI(outlook, land, temp, tmFc, true);
}

function renderUI(outlook, land, temp, tmFc, isDemo) {
  const out = document.getElementById('output');
  out.innerHTML = '';

  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const baseStr = `${tmFc.slice(0,4)}.${tmFc.slice(4,6)}.${tmFc.slice(6,8)} ${tmFc.slice(8,10)}:00 발표`;

  // Build 5 days (day 3~7) - base date from tmFc, not today
  const days = [];
  const tmBase = new Date(
    parseInt(tmFc.slice(0,4)),
    parseInt(tmFc.slice(4,6)) - 1,
    parseInt(tmFc.slice(6,8))
  );
  for (let d = 3; d <= 7; d++) {
    const dt = new Date(tmBase);
    dt.setDate(tmBase.getDate() + d);
    const ds = `${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}`;
    const dow = dt.getDay();
    days.push({
      dateStr: ds,
      label: `${ds.slice(4,6)}/${ds.slice(6,8)}`,
      dayName: ['일','월','화','수','목','금','토'][dow],
      dow,
      wfAm: land[`wf${d}Am`] ?? '',
      wfPm: land[`wf${d}Pm`] ?? '',
      rnAm: land[`rnSt${d}Am`] ?? '--',
      rnPm: land[`rnSt${d}Pm`] ?? '--',
      taMax: temp[`taMax${d}`] ?? null,
      taMin: temp[`taMin${d}`] ?? null,
    });
  }

  // Temperature range for bar
  const allTemps = days.flatMap(d => [d.taMax, d.taMin]).filter(t => t !== null);
  const globalMin = allTemps.length ? Math.min(...allTemps) - 2 : 0;
  const globalMax = allTemps.length ? Math.max(...allTemps) + 2 : 30;
  const range = globalMax - globalMin || 1;

  // ── HERO ROW ──
  const hero = document.createElement('div');
  hero.className = 'loc-hero';
  hero.innerHTML = `
    <div class="loc-main">
      <div class="loc-tag">${isDemo ? '⚡ DEMO DATA' : '✓ LIVE DATA'} · 중기예보</div>
      <div class="loc-name">${sel.name}</div>
      <div class="loc-sub">${baseStr}</div>
      <div class="loc-period">예보 기간 : +3일 ~ +7일</div>
    </div>
    <div class="outlook-card">
      <div class="oc-label">기상 전망</div>
      <div class="oc-sections">
        ${(() => {
          // getMidFcst: wf 필드 또는 첫번째 문자열 값 추출
          const wfText = outlook.wf || outlook.wfSv || Object.values(outlook).find(v => typeof v === 'string' && v.length > 10) || '';
          return wfText ? `
          <div class="oc-section">
            <div class="oc-sec-label">종합 전망</div>
            <div class="oc-text">${wfText}</div>
          </div>` : `
          <div class="oc-section">
            <div class="oc-sec-label">종합 전망</div>
            <div class="oc-text" style="color:var(--muted)">데모 모드: CORS 제한으로 API가 차단됐습니다. 실서비스에는 서버 프록시가 필요합니다.</div>
          </div>`;
        })()}
      </div>
    </div>
  `;
  out.appendChild(hero);

  // ── 5-DAY TABLE ──
  const weekSec = document.createElement('div');
  weekSec.className = 'week-section';

  weekSec.innerHTML = `
    <div class="sec-title">5일 예보 (오전/오후)</div>
    <div class="day-rows">
      ${days.map((d, i) => {
        const barLeft = d.taMin !== null ? ((d.taMin - globalMin)/range)*100 : 0;
        const barWidth = (d.taMax !== null && d.taMin !== null) ? ((d.taMax - d.taMin)/range)*100 : 0;
        const nameClass = d.dow === 0 ? 'day-name sun' : d.dow === 6 ? 'day-name sat' : 'day-name';
        return `
          <div class="day-row" style="animation-delay:${i*.07}s">
            <div>
              <div class="${nameClass}">${d.dayName}요일</div>
              <div class="day-date">${d.label}</div>
            </div>
            <div class="day-icons">
              <span title="오전">${wfIcon(d.wfAm)}</span>
              <span class="sep">│</span>
              <span title="오후">${wfIcon(d.wfPm)}</span>
            </div>
            <div style="font-size:11px;color:var(--rain);font-family:'DM Mono',monospace;text-align:center">
              ☔<br>${d.rnAm}%<br>${d.rnPm}%
            </div>
            <div class="temp-bar-wrap">
              <div class="temp-bar-fill" style="left:${barLeft.toFixed(1)}%;width:${barWidth.toFixed(1)}%"></div>
            </div>
            <div class="day-temps">
              <span class="t-max">${d.taMax ?? '--'}°</span>
              <span class="t-min">${d.taMin ?? '--'}°</span>
            </div>
            <div class="day-rain" style="font-size:11px;color:var(--muted)">
              ${wfLabel(d.wfAm)} / ${wfLabel(d.wfPm)}
            </div>
          </div>`;
      }).join('')}
    </div>
    <div class="legend" style="margin-top:16px">
      <div class="leg-item"><div class="leg-dot" style="background:var(--warm)"></div>최고기온</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--cold)"></div>최저기온</div>
      <div class="leg-item"><span style="font-size:14px">☔</span> 강수확률(오전/오후)</div>
      <div class="leg-item"><span style="font-size:14px">🌤️│☁️</span> 오전/오후 날씨</div>
    </div>
  `;
  out.appendChild(weekSec);

  // ── TEMP CHART ──
  if (days.some(d => d.taMax !== null)) {
    const chartSec = document.createElement('div');
    chartSec.className = 'chart-section';
    chartSec.innerHTML = `
      <div class="sec-title">기온 추이 그래프</div>
      <div class="chart-canvas-wrap">
        <canvas id="tempChart"></canvas>
      </div>
    `;
    out.appendChild(chartSec);

    setTimeout(() => drawChart(days), 50);
  }

  out.style.display = 'block';
}

function wfIcon(wf) {
  if (!wf) return '❓';
  if (wf.includes('소나기')) return '🌦️';
  if (wf.includes('비/눈') || wf.includes('눈/비')) return '🌨️';
  if (wf.includes('비')) return '🌧️';
  if (wf.includes('눈')) return '❄️';
  if (wf.includes('흐림')) return '☁️';
  if (wf.includes('구름많')) return '⛅';
  return '☀️';
}

function wfLabel(wf) {
  if (!wf) return '-';
  const short = {'맑음':'맑음','구름많음':'구름','흐림':'흐림','흐리고 비':'흐림·비','비':'비','눈':'눈','소나기':'소나기'};
  for (const [k,v] of Object.entries(short)) {
    if (wf.includes(k)) return v;
  }
  return wf.slice(0,4);
}

// Simple canvas chart
function drawChart(days) {
  const canvas = document.getElementById('tempChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = 180 * window.devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = '180px';
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

  const W = rect.width, H = 180;
  const pad = { top:24, bottom:30, left:20, right:20 };
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;

  const maxTs = days.map(d => d.taMax).filter(t=>t!==null);
  const minTs = days.map(d => d.taMin).filter(t=>t!==null);
  const allT = [...maxTs, ...minTs];
  const tMax = Math.max(...allT) + 2;
  const tMin = Math.min(...allT) - 2;
  const tRange = tMax - tMin || 1;

  const xStep = plotW / (days.length - 1);
  const toX = i => pad.left + i * xStep;
  const toY = t => pad.top + plotH - ((t - tMin) / tRange) * plotH;

  // Grid lines
  ctx.strokeStyle = '#dde3f5';
  ctx.lineWidth = 1;
  for (let g = 0; g <= 4; g++) {
    const y = pad.top + (plotH/4)*g;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W-pad.right, y); ctx.stroke();
  }

  // Gradient fill between lines
  const pts_max = days.map((d,i) => ({ x: toX(i), y: d.taMax!==null ? toY(d.taMax) : null })).filter(p=>p.y!==null);
  const pts_min = days.map((d,i) => ({ x: toX(i), y: d.taMin!==null ? toY(d.taMin) : null })).filter(p=>p.y!==null);

  if (pts_max.length > 1 && pts_min.length > 1) {
    const grad = ctx.createLinearGradient(0, pad.top, 0, H-pad.bottom);
    grad.addColorStop(0, 'rgba(251,146,60,.2)');
    grad.addColorStop(1, 'rgba(96,165,250,.2)');
    ctx.beginPath();
    ctx.moveTo(pts_max[0].x, pts_max[0].y);
    pts_max.forEach(p => ctx.lineTo(p.x, p.y));
    [...pts_min].reverse().forEach(p => ctx.lineTo(p.x, p.y));
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // Max line
  drawLine(ctx, days, 'taMax', toX, toY, '#fb923c', 2.5);
  // Min line
  drawLine(ctx, days, 'taMin', toX, toY, '#60a5fa', 2.5);

  // Dots + labels
  days.forEach((d, i) => {
    const x = toX(i);
    // Max
    if (d.taMax !== null) {
      const y = toY(d.taMax);
      ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2);
      ctx.fillStyle = '#fb923c'; ctx.fill();
      ctx.fillStyle = '#2d3550';
      ctx.font = `bold 11px 'DM Mono', monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(d.taMax+'°', x, y - 10);
    }
    // Min
    if (d.taMin !== null) {
      const y = toY(d.taMin);
      ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2);
      ctx.fillStyle = '#60a5fa'; ctx.fill();
      ctx.fillStyle = '#2d3550';
      ctx.font = `11px 'DM Mono', monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(d.taMin+'°', x, y + 17);
    }
    // Day label
    ctx.fillStyle = '#7c8aaa';
    ctx.font = `11px 'DM Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(d.label, x, H - 8);
  });
}

function drawLine(ctx, days, key, toX, toY, color, lw) {
  const pts = days.map((d,i) => d[key]!==null ? {x:toX(i),y:toY(d[key])} : null).filter(Boolean);
  if (pts.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i=1; i<pts.length; i++) {
    const cp = { x: (pts[i-1].x+pts[i].x)/2, y: (pts[i-1].y+pts[i].y)/2 };
    ctx.quadraticCurveTo(pts[i-1].x, pts[i-1].y, cp.x, cp.y);
  }
  ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
  ctx.strokeStyle = color;
  ctx.lineWidth = lw;
  ctx.lineJoin = 'round';
  ctx.stroke();
}
</script>
