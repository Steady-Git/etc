<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>스케줄러</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #f7f5f0;
      --surface: #ffffff;
      --ink:     #1c1c1e;
      --ink2:    #48484a;
      --muted:   #8e8e93;
      --line:    #e5e5ea;
      --red:     #d0021b;
      --blue:    #1a56db;
      --gold:    #b8860b;
      --amber:   #f5a623;
      --radius:  12px;
      --shadow:  0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.05);
    }
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body { background: var(--bg); color: var(--ink); font-family: 'Noto Sans KR', sans-serif; min-height: 100dvh; }

    /* ── HEADER ── */
    .app-header { background: var(--ink); color: #fff; padding: 14px 16px 0; position: sticky; top: 0; z-index: 200; }
    .header-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding-bottom: 10px; }
    .app-title { font-size: .95rem; font-weight: 700; letter-spacing: -.3px; }
    .app-subtitle { font-family: 'DM Mono', monospace; font-size: .58rem; color: rgba(255,255,255,.4); letter-spacing: 1.5px; margin-top: 2px; }

    /* ── TAB ── */
    .tab-bar { display: flex; border-top: 1px solid rgba(255,255,255,.08); padding: 0 16px; }
    .tab-btn {
      padding: 9px 20px 8px;
      font-family: 'DM Mono', monospace; font-size: .7rem; letter-spacing: 1px;
      color: rgba(255,255,255,.4); background: transparent; border: none;
      border-bottom: 2px solid transparent; cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .tab-btn.active { color: var(--amber); border-bottom-color: var(--amber); }

    /* ── BODY ── */
    .app-body { max-width: 860px; margin: 0 auto; padding: 16px 14px 60px; }
    .view { display: none; }
    .view.active { display: block; }

    /* ── NAV HEADER ── */
    .nav-header {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 12px 18px; margin-bottom: 16px;
    }
    .nav-btn {
      width: 36px; height: 36px; border: none; background: var(--bg);
      border-radius: 50%; font-size: 1rem; cursor: pointer; color: var(--ink2);
      display: flex; align-items: center; justify-content: center; transition: background .15s;
    }
    .nav-btn:hover { background: var(--line); }
    .nav-center { text-align: center; flex: 1; }
    .nav-main { font-family: 'DM Mono', monospace; font-size: .88rem; font-weight: 600; color: var(--ink); letter-spacing: 1px; }
    .nav-sub { font-family: 'DM Mono', monospace; font-size: .58rem; color: var(--muted); letter-spacing: 1px; margin-top: 3px; }

    /* ── TASK AREA ── */
    .task-input-wrap { display: flex; flex-direction: column; gap: 4px; }
    .task-item { display: flex; align-items: flex-start; gap: 6px; }
    .task-cb { width: 14px; height: 14px; flex-shrink: 0; margin-top: 3px; accent-color: var(--gold); cursor: pointer; }
    .task-text {
      flex: 1; border: none; background: transparent;
      font-family: 'Noto Sans KR', sans-serif; font-size: .78rem; color: var(--ink);
      outline: none; padding: 1px 0; border-bottom: 1px solid transparent;
      transition: border-color .15s; resize: none; overflow: hidden; line-height: 1.5;
    }
    .task-text:focus { border-bottom-color: var(--gold); }
    .task-text.done { text-decoration: line-through; color: var(--muted); }
    .task-del {
      flex-shrink: 0; background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: .65rem; opacity: 0; transition: opacity .15s;
      padding: 2px 0; line-height: 1;
    }
    .task-item:hover .task-del { opacity: 1; }
    .add-task-btn {
      background: none; border: 1px dashed var(--line); border-radius: 6px;
      width: 100%; padding: 5px; font-family: 'Noto Sans KR', sans-serif;
      font-size: .65rem; color: var(--muted); cursor: pointer; text-align: center;
      transition: all .15s; margin-top: 4px;
    }
    .add-task-btn:hover { border-color: var(--gold); color: var(--gold); background: #fffbf0; }

    /* ════════════════════════════════════════
       단기 — 주간 카드 (월~일, 세로 나열)
    ════════════════════════════════════════ */
    .week-cards { display: flex; flex-direction: column; gap: 10px; }

    .day-card {
      background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
      display: flex; overflow: hidden;
    }
    .day-card.today { box-shadow: 0 0 0 2.5px var(--gold), var(--shadow); }

    .day-card-aside {
      width: 72px; flex-shrink: 0;
      background: var(--bg); border-right: 1.5px solid var(--line);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 16px 6px; gap: 2px;
    }
    .day-card.today .day-card-aside { background: var(--gold); border-right-color: var(--gold); }
    .day-card.weekend-sat .day-card-aside { background: #f0f4ff; }
    .day-card.weekend-sun .day-card-aside { background: #fff5f5; }

    .day-aside-dow {
      font-family: 'DM Mono', monospace; font-size: .58rem; font-weight: 500;
      letter-spacing: 2px; color: var(--muted);
    }
    .day-card.today .day-aside-dow { color: rgba(255,255,255,.8); }
    .day-card.weekend-sat .day-aside-dow { color: var(--blue); }
    .day-card.weekend-sun .day-aside-dow { color: var(--red); }

    .day-aside-num {
      font-family: 'DM Mono', monospace; font-size: 1.7rem; font-weight: 600;
      color: var(--ink); line-height: 1;
    }
    .day-card.today .day-aside-num { color: #fff; }
    .day-card.weekend-sat .day-aside-num { color: var(--blue); }
    .day-card.weekend-sun .day-aside-num { color: var(--red); }

    .day-aside-md {
      font-family: 'DM Mono', monospace; font-size: .52rem; color: var(--muted);
    }
    .day-card.today .day-aside-md { color: rgba(255,255,255,.7); }

    .day-card-body { flex: 1; padding: 14px 18px; min-height: 110px; }

    /* ════════════════════════════════════════
       장기 — 연간 타임라인
    ════════════════════════════════════════ */
    .year-timeline-wrap {
      background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 30px 28px 36px;
    }

    .month-section { margin-bottom: 60px; }
    .month-section:last-child { margin-bottom: 0; }

    .month-label-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 28px;
    }
    .month-label {
      font-family: 'DM Mono', monospace; font-size: .75rem; font-weight: 600;
      color: var(--ink2); letter-spacing: 1px;
    }
    .month-now-badge {
      font-size: .55rem; background: var(--gold); color: #fff;
      border-radius: 10px; padding: 2px 8px; font-weight: 700;
    }

    /* 수평 선 */
    .timeline-outer { position: relative; margin-bottom: 0; }

    .timeline-line {
      position: relative; height: 2.5px; background: var(--ink);
      border-radius: 2px;
    }
    /* 왼쪽 세로 캡 */
    .timeline-line::before {
      content: ''; position: absolute; left: 0; top: -5px;
      width: 2.5px; height: 13px; background: var(--ink); border-radius: 1px;
    }
    /* 오른쪽 세로 캡 */
    .timeline-line::after {
      content: ''; position: absolute; right: 0; top: -5px;
      width: 2.5px; height: 13px; background: var(--ink); border-radius: 1px;
    }

    /* 틱 + 레이블 레이어 */
    .ticks-layer { position: relative; height: 0; }
    .tick-wrap {
      position: absolute; top: 0; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center;
    }
    .tick-mark {
      width: 2px; height: 8px; background: var(--ink);
      margin-bottom: 3px; border-radius: 1px;
    }
    .tick-label {
      font-family: 'DM Mono', monospace; font-size: .55rem;
      color: var(--ink2); white-space: nowrap; margin-top: -12px;
    }
    /* 숫자는 선 위에 표시 */
    .tick-wrap { top: -20px; }

    /* 구간 브래킷 + 할일 */
    .segments-row { display: flex; margin-top: 6px; }
    .segment { flex: 1; display: flex; flex-direction: column; padding: 0 3px; }

    .bracket-svg { width: 100%; height: 20px; display: block; overflow: visible; }

    .segment-label {
      font-family: 'DM Mono', monospace; font-size: .56rem;
      color: var(--muted); text-align: center; margin: 3px 0 7px;
    }
    .segment-label.is-now { color: var(--gold); font-weight: 700; }

    .segment-body {
      background: var(--bg); border-radius: 8px;
      padding: 8px 10px; flex: 1; min-height: 80px;
    }

    /* 오늘 마커 */
    .today-marker-wrap {
      position: absolute; top: -2px; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; z-index: 5;
      pointer-events: none;
    }
    .today-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--gold); border: 2px solid #fff;
      box-shadow: 0 0 0 1.5px var(--gold);
    }
    .today-label {
      font-family: 'DM Mono', monospace; font-size: .48rem;
      font-weight: 700; color: var(--gold); margin-top: 3px; white-space: nowrap;
    }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div>
      <div class="app-title">📋 스케줄러</div>
      <div class="app-subtitle">단기 · 장기 플래너</div>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="short">📅 주간 스케줄러</button>
    <button class="tab-btn" data-tab="long">🗓 연간 스케줄러</button>
  </div>
</header>

<div class="app-body">

  <!-- 주간 -->
  <div class="view active" id="view-short">
    <div class="nav-header">
      <button class="nav-btn" id="prevWeek">←</button>
      <div class="nav-center">
        <div class="nav-main" id="weekRangeLabel">────</div>
        <div class="nav-sub" id="weekSubLabel">──</div>
      </div>
      <button class="nav-btn" id="nextWeek">→</button>
    </div>
    <div class="week-cards" id="weekCards"></div>
  </div>

  <!-- 연간 -->
  <div class="view" id="view-long">
    <div class="nav-header">
      <button class="nav-btn" id="prevYear">←</button>
      <div class="nav-center">
        <div class="nav-main" id="yearLabel">────</div>
        <div class="nav-sub">연간 타임라인</div>
      </div>
      <button class="nav-btn" id="nextYear">→</button>
    </div>
    <div class="year-timeline-wrap" id="yearTimeline"></div>
  </div>

</div>

<script>
/* ─── UTILS ─── */
const pad2 = n => String(n).padStart(2,'0');
const today = new Date();
const todayStr = `${today.getFullYear()}-${pad2(today.getMonth()+1)}-${pad2(today.getDate())}`;

function saveTask(key, tasks) { try { localStorage.setItem(key, JSON.stringify(tasks)); } catch(e) {} }
function loadTask(key) { try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch(e) { return []; } }

/* ─── TAB ─── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-' + btn.dataset.tab).classList.add('active');
  });
});

/* ─── TASK AREA ─── */
function buildTaskArea(storageKey) {
  const wrap = document.createElement('div');
  wrap.className = 'task-input-wrap';

  function redraw() {
    wrap.innerHTML = '';
    const tasks = loadTask(storageKey);
    tasks.forEach((t, idx) => {
      const row = document.createElement('div');
      row.className = 'task-item';

      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.className = 'task-cb'; cb.checked = t.done;
      cb.addEventListener('change', () => {
        const ts = loadTask(storageKey); ts[idx].done = cb.checked; saveTask(storageKey, ts);
        ta.classList.toggle('done', cb.checked);
      });

      const ta = document.createElement('textarea');
      ta.className = 'task-text' + (t.done ? ' done' : '');
      ta.value = t.text; ta.placeholder = '할 일 입력…'; ta.rows = 1;
      ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; });
      ta.addEventListener('blur', () => { const ts = loadTask(storageKey); ts[idx].text = ta.value; saveTask(storageKey, ts); });
      ta.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addTask(); } });
      setTimeout(() => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }, 0);

      const del = document.createElement('button');
      del.className = 'task-del'; del.textContent = '✕';
      del.addEventListener('click', () => { const ts = loadTask(storageKey); ts.splice(idx,1); saveTask(storageKey,ts); redraw(); });

      row.appendChild(cb); row.appendChild(ta); row.appendChild(del);
      wrap.appendChild(row);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'add-task-btn'; addBtn.textContent = '+ 추가';
    addBtn.addEventListener('click', addTask);
    wrap.appendChild(addBtn);
  }

  function addTask() {
    const ts = loadTask(storageKey); ts.push({ text:'', done:false }); saveTask(storageKey, ts); redraw();
    setTimeout(() => { const all = wrap.querySelectorAll('.task-text'); if (all.length) all[all.length-1].focus(); }, 10);
  }

  redraw();
  return wrap;
}

/* ════════════════════════════════════════
   주간 스케줄러 (월~일)
════════════════════════════════════════ */
const DOW_EN  = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
let weekOffset = 0;

function getMondayWeek(offset) {
  const base = new Date(today);
  const dow = (base.getDay() + 6) % 7; // Mon=0
  base.setDate(base.getDate() - dow + offset * 7);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(base); d.setDate(base.getDate() + i); days.push(d);
  }
  return days;
}

function getWeekNumber(d) {
  const jan1 = new Date(d.getFullYear(), 0, 1);
  return Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
}

function renderWeek() {
  const days = getMondayWeek(weekOffset);
  const first = days[0], last = days[6];
  const sy = first.getFullYear() === last.getFullYear();
  const sm = sy && first.getMonth() === last.getMonth();
  let rangeText = sm
    ? `${first.getFullYear()}년 ${first.getMonth()+1}월 ${first.getDate()}일 – ${last.getDate()}일`
    : sy
      ? `${first.getFullYear()}년 ${first.getMonth()+1}/${first.getDate()} – ${last.getMonth()+1}/${last.getDate()}`
      : `${first.getFullYear()}/${first.getMonth()+1}/${first.getDate()} – ${last.getFullYear()}/${last.getMonth()+1}/${last.getDate()}`;

  document.getElementById('weekRangeLabel').textContent = rangeText;
  document.getElementById('weekSubLabel').textContent = `${days[3].getFullYear()}년 제 ${getWeekNumber(days[3])}주차`;

  const wrap = document.getElementById('weekCards');
  wrap.innerHTML = '';

  days.forEach((d, i) => {
    const dk = `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    const isToday = dk === todayStr;
    const isSat = i === 5, isSun = i === 6;

    const card = document.createElement('div');
    card.className = 'day-card' + (isToday ? ' today' : '') + (isSat ? ' weekend-sat' : '') + (isSun ? ' weekend-sun' : '');

    const aside = document.createElement('div');
    aside.className = 'day-card-aside';
    aside.innerHTML = `
      <div class="day-aside-dow">${DOW_EN[i]}</div>
      <div class="day-aside-num">${d.getDate()}</div>
      <div class="day-aside-md">${d.getMonth()+1}/${d.getDate()}</div>
    `;

    const body = document.createElement('div');
    body.className = 'day-card-body';
    body.appendChild(buildTaskArea(`week_${dk}`));

    card.appendChild(aside);
    card.appendChild(body);
    wrap.appendChild(card);
  });
}

document.getElementById('prevWeek').addEventListener('click', () => { weekOffset--; renderWeek(); });
document.getElementById('nextWeek').addEventListener('click', () => { weekOffset++; renderWeek(); });

/* ════════════════════════════════════════
   연간 타임라인
════════════════════════════════════════ */
let longYear = today.getFullYear();
const MONTH_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }

function getSegments(y, m) {
  const total = daysInMonth(y, m);
  const q = Math.floor(total / 4);
  const segs = [];
  let s = 1;
  for (let i = 0; i < 4; i++) {
    const e = (i === 3) ? total : s + q - 1;
    segs.push({ start: s, end: e });
    s = e + 1;
  }
  return segs;
}

function renderYear() {
  document.getElementById('yearLabel').textContent = `${longYear}년`;
  const wrap = document.getElementById('yearTimeline');
  wrap.innerHTML = '';

  for (let m = 1; m <= 12; m++) {
    const segs = getSegments(longYear, m);
    const total = daysInMonth(longYear, m);
    const isThisMonth = today.getFullYear() === longYear && today.getMonth()+1 === m;

    const section = document.createElement('div');
    section.className = 'month-section';

    /* 월 레이블 */
    const labelRow = document.createElement('div');
    labelRow.className = 'month-label-row';
    labelRow.innerHTML = `<span class="month-label">${longYear}.${pad2(m)} &nbsp;${MONTH_KO[m-1]}</span>`;
    if (isThisMonth) labelRow.innerHTML += `<span class="month-now-badge">이번 달</span>`;

    /* 타임라인 선 */
    const outer = document.createElement('div');
    outer.className = 'timeline-outer';

    const line = document.createElement('div');
    line.className = 'timeline-line';

    /* 틱 레이어 — 선 위에 올림 */
    const ticksLayer = document.createElement('div');
    ticksLayer.className = 'ticks-layer';

    // 틱 포인트: 각 구간 시작일 + 마지막일
    const tickDays = [segs[0].start, segs[1].start, segs[2].start, segs[3].start, total];
    tickDays.forEach((day, ti) => {
      const pct = (day - 1) / (total - 1) * 100;
      const tw = document.createElement('div');
      tw.className = 'tick-wrap';
      tw.style.left = pct + '%';
      tw.innerHTML = `
        <div class="tick-label">${day}일</div>
        <div class="tick-mark"></div>
      `;
      ticksLayer.appendChild(tw);
    });

    /* 오늘 마커 */
    if (isThisMonth) {
      const frac = (today.getDate() - 1) / (total - 1) * 100;
      const marker = document.createElement('div');
      marker.className = 'today-marker-wrap';
      marker.style.left = frac + '%';
      marker.innerHTML = `
        <div class="today-dot"></div>
        <div class="today-label">TODAY</div>
      `;
      line.appendChild(marker);
    }

    line.appendChild(ticksLayer);
    outer.appendChild(line);

    /* 구간 브래킷 + 할일 */
    const segRow = document.createElement('div');
    segRow.className = 'segments-row';

    segs.forEach((seg, qi) => {
      const isCur = isThisMonth && today.getDate() >= seg.start && today.getDate() <= seg.end;
      const segEl = document.createElement('div');
      segEl.className = 'segment';

      /* SVG 브래킷 (이미지의 U자/괄호 모양) */
      const svgNS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNS, 'svg');
      svg.setAttribute('class','bracket-svg');
      svg.setAttribute('viewBox','0 0 100 20');
      svg.setAttribute('preserveAspectRatio','none');

      const strokeColor = isCur ? '#b8860b' : '#1c1c1e';
      const sw = isCur ? '3' : '2.2';

      const path = document.createElementNS(svgNS,'path');
      // U자: 양 끝에서 내려와서 둥글게 이어지는 모양
      path.setAttribute('d','M 1,0 L 1,12 Q 1,19 8,19 L 92,19 Q 99,19 99,12 L 99,0');
      path.setAttribute('fill','none');
      path.setAttribute('stroke', strokeColor);
      path.setAttribute('stroke-width', sw);
      path.setAttribute('stroke-linecap','round');
      path.setAttribute('stroke-linejoin','round');
      svg.appendChild(path);

      const lbl = document.createElement('div');
      lbl.className = 'segment-label' + (isCur ? ' is-now' : '');
      lbl.textContent = `${seg.start}일 – ${seg.end}일`;

      const body = document.createElement('div');
      body.className = 'segment-body';
      body.appendChild(buildTaskArea(`year_${longYear}_${pad2(m)}_q${qi+1}`));

      segEl.appendChild(svg);
      segEl.appendChild(lbl);
      segEl.appendChild(body);
      segRow.appendChild(segEl);
    });

    section.appendChild(labelRow);
    section.appendChild(outer);
    section.appendChild(segRow);
    wrap.appendChild(section);
  }
}

document.getElementById('prevYear').addEventListener('click', () => { longYear--; renderYear(); });
document.getElementById('nextYear').addEventListener('click', () => { longYear++; renderYear(); });

/* ─── INIT ─── */
renderWeek();
renderYear();
</script>
</body>
</html>
