<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주식 포트폴리오 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1f2d47;
    --accent: #00d4aa;
    --accent2: #4f8ef7;
    --red: #ff4f6b;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Tab nav ── */
  .tab-nav {
    position: relative;
    z-index: 10;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 32px;
    gap: 4px;
  }

  .tab-logo {
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 1px;
    color: var(--accent);
    margin-right: 24px;
    padding: 16px 0;
    white-space: nowrap;
  }

  .tab-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 18px 20px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab-btn:hover { color: var(--text); }

  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 700;
  }

  /* ── Pages ── */
  .page { display: none; }
  .page.active { display: block; }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── Header ── */
  header { margin-bottom: 40px; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,212,170,0.1);
    border: 1px solid rgba(0,212,170,0.3);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 20px;
    font-weight: 500;
  }

  .badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  h1 {
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1.15;
  }
  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--text-muted);
    margin-top: 10px;
    font-size: 14px;
    font-weight: 300;
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .card-title {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* ── Summary strip ── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
  }

  @media(max-width:700px){ .summary-grid { grid-template-columns: repeat(2,1fr); } }

  .summary-item {
    padding: 22px 24px;
    border-right: 1px solid var(--border);
  }
  .summary-item:last-child { border-right: none; }

  .summary-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 10px;
  }

  .summary-val {
    font-size: 22px;
    font-weight: 900;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -1px;
    line-height: 1;
  }

  .summary-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 5px;
    font-family: 'JetBrains Mono', monospace;
  }

  .up { color: var(--red); }
  .down { color: var(--accent2); }
  .flat { color: var(--text-muted); }

  /* ── Add form ── */
  .add-form {
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr auto auto auto;
    gap: 10px;
    align-items: end;
  }

  @media(max-width:700px){
    .add-form { grid-template-columns: 1fr 1fr; }
    .add-form .btn-full { grid-column: 1/-1; }
  }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,170,0.1);
  }

  .field input::placeholder { color: var(--text-muted); font-family: 'Noto Sans KR',sans-serif; font-size: 13px; }

  .btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 12px 22px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    font-family: 'Noto Sans KR', sans-serif;
    height: 44px;
  }

  .btn:hover { background: #00f0c0; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,212,170,0.3); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 22px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
    height: 44px;
  }

  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .btn-red {
    background: rgba(255,79,107,0.12);
    color: var(--red);
    border: 1px solid rgba(255,79,107,0.25);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .btn-red:hover { background: rgba(255,79,107,0.25); }

  .btn-blue {
    background: rgba(79,142,247,0.12);
    color: var(--accent2);
    border: 1px solid rgba(79,142,247,0.25);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .btn-blue:hover { background: rgba(79,142,247,0.25); }

  /* ── Portfolio table ── */
  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    background: var(--surface2);
    padding: 12px 16px;
    text-align: left;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  td {
    padding: 15px 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -0.3px;
    white-space: nowrap;
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.018); }

  .td-name {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
  }

  .td-code {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 5px;
    letter-spacing: 0.5px;
  }

  .status-ok {
    background: rgba(0,212,170,0.1);
    color: var(--accent);
    border: 1px solid rgba(0,212,170,0.25);
  }

  .status-pending {
    background: rgba(100,116,139,0.1);
    color: var(--text-muted);
    border: 1px solid rgba(100,116,139,0.25);
  }

  .status-error {
    background: rgba(255,79,107,0.1);
    color: var(--red);
    border: 1px solid rgba(255,79,107,0.25);
  }

  /* ── Profit bar ── */
  .profit-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .profit-bar-bg {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    overflow: hidden;
    min-width: 60px;
  }

  .profit-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  /* ── Refresh controls ── */
  .refresh-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .last-updated {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 64px 24px;
    color: var(--text-muted);
  }

  .empty-icon {
    font-size: 40px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .empty-sub { font-size: 13px; }

  /* ── Notification ── */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 14px 20px;
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    z-index: 1000;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── Edit modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 420px;
    margin: 16px;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { opacity:0; transform:translateY(20px); }
    to { opacity:1; transform:translateY(0); }
  }

  .modal h2 {
    font-size: 18px;
    font-weight: 900;
    margin-bottom: 24px;
    letter-spacing: -0.5px;
  }

  .modal .field { margin-bottom: 16px; }

  .modal-btns {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }

  .modal-btns .btn { flex: 1; }
  .modal-btns .btn-ghost { flex: 1; }

  /* ── Search page styles (original) ── */
  .search-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 32px;
  }

  .search-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
    display: block;
  }

  .search-row { display: flex; gap: 10px; }

  .search-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--text);
    font-size: 15px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 1px;
  }

  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,170,0.1);
  }

  .search-input::placeholder { color: var(--text-muted); font-family: 'Noto Sans KR',sans-serif; letter-spacing: 0; }

  .hint { margin-top: 10px; font-size: 12px; color: var(--text-muted); }
  .hint span { color: var(--accent); cursor: pointer; font-weight: 500; }
  .hint span:hover { text-decoration: underline; }

  .date-range-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
    align-items: center;
  }

  .date-range-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .date-sep { color: var(--text-muted); font-size: 13px; padding: 0 2px; }

  .date-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
    transition: border-color 0.2s;
    cursor: pointer;
    flex: 1;
    min-width: 140px;
  }

  .date-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,170,0.1); }
  .date-input::-webkit-calendar-picker-indicator { filter: invert(0.5) sepia(1) saturate(3) hue-rotate(120deg); cursor: pointer; }

  .options-row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }

  .btn-row {
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn-row .btn { width: 100%; }

  .select-wrap { position: relative; flex: 1; min-width: 140px; }

  .select-wrap select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 36px 12px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    cursor: pointer;
    appearance: none;
    transition: border-color 0.2s;
  }

  .select-wrap select:focus { border-color: var(--accent); }
  .select-wrap::after { content:'▾'; position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); pointer-events:none; font-size:12px; }

  .loading { display: none; text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .loading.show { display: block; }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 16px;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    display: none;
    background: rgba(255,79,107,0.08);
    border: 1px solid rgba(255,79,107,0.3);
    border-radius: 12px;
    padding: 18px 22px;
    color: #ff8fa0;
    font-size: 14px;
    margin-bottom: 24px;
  }

  .error-box.show { display: flex; align-items: center; gap: 10px; }

  .result-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: slideUp 0.3s ease;
    margin-bottom: 24px;
  }

  .result-card.show { display: block; }

  .card-header {
    padding: 24px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .stock-name { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
  .stock-code { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); margin-top: 4px; letter-spacing: 1px; }

  .stock-market {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(79,142,247,0.1);
    border: 1px solid rgba(79,142,247,0.25);
    color: var(--accent2);
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    letter-spacing: 0.5px;
  }

  .price-section {
    padding: 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 16px;
    flex-wrap: wrap;
  }

  .price-current {
    font-size: 44px;
    font-weight: 900;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -2px;
    line-height: 1;
  }

  .price-current.up { color: var(--red); }
  .price-current.down { color: var(--accent2); }

  .price-change {
    font-size: 16px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    padding: 6px 12px;
    border-radius: 8px;
  }

  .price-change.up { background: rgba(255,79,107,0.1); color: var(--red); border: 1px solid rgba(255,79,107,0.2); }
  .price-change.down { background: rgba(79,142,247,0.1); color: var(--accent2); border: 1px solid rgba(79,142,247,0.2); }
  .price-change.flat { background: rgba(100,116,139,0.1); color: var(--text-muted); border: 1px solid rgba(100,116,139,0.2); }

  .price-date { font-size: 12px; color: var(--text-muted); margin-left: auto; font-family: 'JetBrains Mono', monospace; }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0; }

  .stat-item { padding: 18px 24px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .stat-item:nth-child(4n) { border-right: none; }

  .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.5px; margin-bottom: 8px; text-transform: uppercase; }
  .stat-value { font-size: 16px; font-weight: 700; font-family: 'JetBrains Mono', monospace; letter-spacing: -0.5px; }
  .stat-value.up { color: var(--red); }
  .stat-value.down { color: var(--accent2); }

  /* card-header with add-to-portfolio btn */
  .add-portfolio-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,212,170,0.1);
    border: 1px solid rgba(0,212,170,0.3);
    color: var(--accent);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR',sans-serif;
    margin-top: 8px;
  }

  .add-portfolio-btn:hover { background: rgba(0,212,170,0.2); }

  .table-wrap { overflow-x: auto; }

  th {
    background: var(--surface2);
    padding: 12px 16px;
    text-align: left;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -0.3px;
    white-space: nowrap;
  }

  .td-name2 { font-family: 'Noto Sans KR',sans-serif; font-weight: 600; color: var(--text); letter-spacing: 0; }
  .td-up { color: var(--red); }
  .td-down { color: var(--accent2); }

  .pagination { display:flex; align-items:center; justify-content:center; gap:8px; padding:20px; border-top:1px solid var(--border); }

  .page-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'JetBrains Mono', monospace;
  }

  .page-btn:hover, .page-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
  .page-btn:disabled { opacity:0.3; cursor:not-allowed; }

  .info-strip {
    font-size: 12px;
    color: var(--text-muted);
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ────────────────────────────── API & constants ────────────────────────────── */
const API_KEY = 'dc8294cd0177c5d51b45be29652fb691c4b18e055f22c87b0967ca1a78c7df0a';
const BASE_URL = 'https://apis.data.go.kr/1160100/service/GetStockSecuritiesInfoService/getStockPriceInfo';

/* ────────────────────────────── Portfolio state ────────────────────────────── */
let portfolio = JSON.parse(localStorage.getItem('portfolio') || '[]');

function savePortfolio() {
  localStorage.setItem('portfolio', JSON.stringify(portfolio));
}

/* ────────────────────────────── Tab switching ────────────────────────────── */
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  event.target.classList.add('active');
}

/* ────────────────────────────── Toast ────────────────────────────── */
let toastTimer;
function showToast(msg, color = 'var(--accent)') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = color;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ────────────────────────────── Add stock ────────────────────────────── */
function addStock() {
  const name = document.getElementById('addName').value.trim();
  const code = document.getElementById('addCode').value.trim();
  const qty  = parseInt(document.getElementById('addQty').value);
  const avg  = parseFloat(document.getElementById('addAvgPrice').value) || 0;

  if (!name || !code) { showToast('종목명과 종목코드를 입력해주세요.', 'var(--red)'); return; }
  if (!/^\d{6}$/.test(code)) { showToast('종목코드는 6자리 숫자입니다.', 'var(--red)'); return; }
  if (!qty || qty < 1) { showToast('보유 주식수를 올바르게 입력해주세요.', 'var(--red)'); return; }

  // check duplicate
  const dup = portfolio.find(p => p.code === code);
  if (dup) { showToast(`이미 등록된 종목입니다. (${dup.name})`, 'var(--red)'); return; }

  const stock = {
    id: Date.now(),
    name,
    code,
    qty,
    avgPrice: avg,
    currentPrice: null,
    lastFetched: null,
    market: ''
  };

  portfolio.push(stock);
  savePortfolio();
  renderPortfolio();
  fetchPrice(stock.id);
  showToast(`${name} 추가 완료!`);

  document.getElementById('addName').value = '';
  document.getElementById('addCode').value = '';
  document.getElementById('addQty').value = '';
  document.getElementById('addAvgPrice').value = '';
}

/* ────────────────────────────── Fetch price ────────────────────────────── */
async function fetchPrice(id) {
  const stock = portfolio.find(p => p.id === id);
  if (!stock) return;

  const qs = new URLSearchParams({
    serviceKey: API_KEY,
    resultType: 'json',
    likeSrtnCd: stock.code,
    numOfRows: '1',
    pageNo: '1'
  });

  try {
    const resp = await fetch(`${BASE_URL}?${qs}`);
    const data = await resp.json();
    const item = data?.response?.body?.items?.item;
    const row = Array.isArray(item) ? item[0] : item;

    if (row && row.clpr) {
      stock.currentPrice = parseInt(row.clpr);
      stock.market = row.mrktCtg || '';
      stock.lastFetched = new Date().toLocaleTimeString('ko-KR');
    }
  } catch(e) {
    console.warn('시세 조회 실패:', stock.name, e);
  }

  savePortfolio();
  renderPortfolio();
}

async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '조회 중…';

  const promises = portfolio.map(s => fetchPrice(s.id));
  await Promise.all(promises);

  btn.disabled = false;
  btn.textContent = '시세 새로고침';
  document.getElementById('lastUpdated').textContent = '업데이트: ' + new Date().toLocaleTimeString('ko-KR');
  showToast('시세가 업데이트 되었습니다.');
}

/* ────────────────────────────── Render portfolio ────────────────────────────── */
function renderPortfolio() {
  const container = document.getElementById('portfolioBody');

  if (portfolio.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">등록된 종목이 없습니다</div>
        <div class="empty-sub">위 양식에서 보유 주식을 추가해 보세요</div>
      </div>`;
    updateSummary();
    return;
  }

  let totalVal = 0, totalCost = 0;
  let hasPrice = false;

  const rows = portfolio.map(s => {
    const cost = s.avgPrice * s.qty;
    const val  = s.currentPrice ? s.currentPrice * s.qty : null;
    const pnl  = val !== null ? val - cost : null;
    const pct  = (cost > 0 && pnl !== null) ? (pnl / cost) * 100 : null;

    if (val !== null) { totalVal += val; hasPrice = true; }
    totalCost += cost;

    let statusHtml;
    if (s.currentPrice === null) {
      statusHtml = `<span class="status-badge status-pending">대기</span>`;
    } else {
      statusHtml = `<span class="status-badge status-ok">●&nbsp;${s.lastFetched || ''}</span>`;
    }

    const pnlClass = pnl === null ? '' : pnl > 0 ? 'up' : pnl < 0 ? 'down' : 'flat';
    const pnlSign  = pnl === null ? '' : pnl > 0 ? '+' : '';

    // profit bar
    let barHtml = '';
    if (pct !== null) {
      const clamp = Math.min(Math.abs(pct), 30);
      const width = (clamp / 30) * 100;
      const barColor = pct >= 0 ? 'var(--red)' : 'var(--accent2)';
      barHtml = `
        <div class="profit-bar-wrap">
          <span class="${pnlClass}" style="min-width:56px;font-weight:700">${pnlSign}${pct.toFixed(2)}%</span>
          <div class="profit-bar-bg"><div class="profit-bar-fill" style="width:${width}%;background:${barColor}"></div></div>
        </div>`;
    } else {
      barHtml = `<span class="flat">—</span>`;
    }

    return `<tr>
      <td>
        <div class="td-name">${s.name}</div>
        <div class="td-code">${s.code}${s.market ? ' · '+s.market : ''}</div>
      </td>
      <td style="text-align:right">${s.qty.toLocaleString()}</td>
      <td style="text-align:right">${s.avgPrice ? s.avgPrice.toLocaleString()+'원' : '—'}</td>
      <td style="text-align:right">${s.currentPrice !== null ? s.currentPrice.toLocaleString()+'원' : '—'}</td>
      <td style="text-align:right">${cost > 0 ? cost.toLocaleString()+'원' : '—'}</td>
      <td style="text-align:right">${val !== null ? val.toLocaleString()+'원' : '—'}</td>
      <td style="text-align:right" class="${pnlClass}">${pnl !== null ? pnlSign+pnl.toLocaleString()+'원' : '—'}</td>
      <td>${barHtml}</td>
      <td>${statusHtml}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn-blue" onclick="openEdit(${s.id})">수정</button>
          <button class="btn-red" onclick="removeStock(${s.id})">삭제</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  container.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>종목</th>
            <th style="text-align:right">보유수량</th>
            <th style="text-align:right">평균매입가</th>
            <th style="text-align:right">현재가</th>
            <th style="text-align:right">매입금액</th>
            <th style="text-align:right">평가금액</th>
            <th style="text-align:right">평가손익</th>
            <th style="min-width:160px">수익률</th>
            <th>상태</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  updateSummary(totalVal, totalCost, hasPrice);
}

function updateSummary(totalVal, totalCost, hasPrice) {
  const pnl = (totalVal && totalCost) ? totalVal - totalCost : null;
  const pct = (pnl !== null && totalCost > 0) ? (pnl / totalCost) * 100 : null;

  document.getElementById('totalVal').textContent  = hasPrice ? totalVal.toLocaleString() : '—';
  document.getElementById('totalCost').textContent = totalCost ? totalCost.toLocaleString() : '—';
  document.getElementById('totalCount').textContent = portfolio.length;

  const pnlEl  = document.getElementById('totalPnl');
  const pctEl  = document.getElementById('totalPnlPct');

  if (pnl !== null) {
    const cls  = pnl > 0 ? 'up' : pnl < 0 ? 'down' : 'flat';
    const sign = pnl > 0 ? '+' : '';
    pnlEl.textContent  = sign + pnl.toLocaleString();
    pnlEl.className    = 'summary-val ' + cls;
    pctEl.textContent  = sign + pct.toFixed(2) + '%';
    pctEl.className    = 'summary-sub ' + cls;
  } else {
    pnlEl.textContent = '—';
    pnlEl.className   = 'summary-val';
    pctEl.textContent = '—';
    pctEl.className   = 'summary-sub';
  }
}

/* ────────────────────────────── Edit / Delete ────────────────────────────── */
function openEdit(id) {
  const s = portfolio.find(p => p.id === id);
  if (!s) return;
  document.getElementById('editId').value = id;
  document.getElementById('editName').value = s.name;
  document.getElementById('editQty').value = s.qty;
  document.getElementById('editAvgPrice').value = s.avgPrice || '';
  document.getElementById('editModal').classList.add('show');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('show');
}

function saveEdit() {
  const id  = parseInt(document.getElementById('editId').value);
  const s   = portfolio.find(p => p.id === id);
  if (!s) return;

  s.name     = document.getElementById('editName').value.trim() || s.name;
  s.qty      = parseInt(document.getElementById('editQty').value) || s.qty;
  s.avgPrice = parseFloat(document.getElementById('editAvgPrice').value) || 0;

  savePortfolio();
  renderPortfolio();
  closeModal();
  showToast('수정 완료!');
}

function removeStock(id) {
  const s = portfolio.find(p => p.id === id);
  if (!s) return;
  if (!confirm(`"${s.name}"을(를) 삭제하시겠습니까?`)) return;
  portfolio = portfolio.filter(p => p.id !== id);
  savePortfolio();
  renderPortfolio();
  showToast(`${s.name} 삭제됨`, 'var(--red)');
}

/* ────────────────────────────── Add from search result ────────────────────────────── */
let currentStockInfo = null;

function addCurrentToPortfolio() {
  if (!currentStockInfo) return;
  const { name, code, currentPrice } = currentStockInfo;

  const qty = parseInt(prompt(`${name} 보유 주식수를 입력하세요:`) || '0');
  if (!qty || qty < 1) { showToast('주식수를 올바르게 입력해주세요.', 'var(--red)'); return; }
  const avg = parseFloat(prompt(`평균 매입가를 입력하세요 (원, 없으면 0):`) || '0');

  const dup = portfolio.find(p => p.code === code);
  if (dup) { showToast(`이미 등록된 종목입니다. (${dup.name})`, 'var(--red)'); return; }

  portfolio.push({ id: Date.now(), name, code, qty, avgPrice: avg, currentPrice, lastFetched: new Date().toLocaleTimeString('ko-KR'), market: currentStockInfo.market });
  savePortfolio();
  renderPortfolio();
  showToast(`${name} 포트폴리오에 추가 완료!`);
  switchTabByName('portfolio');
}

function switchTabByName(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'portfolio') || (i === 1 && tab === 'search'));
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
}

/* ────────────────────────────── Search (original logic) ────────────────────────────── */
let currentPage = 1;
let totalCount  = 0;
let lastQuery   = {};

function quickSearch(name) {
  document.getElementById('searchInput').value = name;
  switchTabByName('search');
  search();
}

function formatNum(v) {
  if (!v || v === '-') return '-';
  const n = Number(v);
  if (isNaN(n)) return v;
  return n.toLocaleString('ko-KR');
}

function formatChange(v) {
  if (!v || v === '0' || v === '') return 'flat';
  return Number(v) > 0 ? 'up' : 'down';
}

function arrow(v) {
  if (!v || v === '0') return '';
  return Number(v) > 0 ? '▲' : '▼';
}

async function fetchData(params) {
  const qs  = new URLSearchParams({ serviceKey: API_KEY, resultType: 'json', ...params });
  const resp = await fetch(`${BASE_URL}?${qs}`);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

async function search(page = 1) {
  const query    = document.getElementById('searchInput').value.trim();
  const market   = document.getElementById('marketType').value;
  const numOfRows = document.getElementById('numRows').value;
  const startDate = document.getElementById('startDate').value.replace(/-/g,'');
  const endDate   = document.getElementById('endDate').value.replace(/-/g,'');

  hideAll();

  const params = { numOfRows, pageNo: page };
  if (/^\d{6}$/.test(query)) params.likeSrtnCd = query;
  else if (query) params.likeItmsNm = query;
  if (market)    params.mrktCls   = market;
  if (startDate) params.beginBasDt = startDate;
  if (endDate)   params.endBasDt   = endDate;

  if (!query && !market) { showError('종목명, 종목코드 또는 시장을 입력해주세요.'); return; }

  lastQuery  = { query, market, numOfRows, startDate, endDate };
  currentPage = page;
  showLoading(true);
  document.getElementById('searchBtn').disabled = true;
  if (document.getElementById('searchBtn2')) document.getElementById('searchBtn2').disabled = true;

  try {
    const data = await fetchData(params);
    const body = data?.response?.body;
    if (!body) throw new Error('응답 데이터 오류');
    const items = body.items?.item;
    totalCount  = parseInt(body.totalCount || 0);

    if (!items || totalCount === 0) { showError('검색 결과가 없습니다. 종목명이나 코드를 확인해주세요.'); return; }

    const list = Array.isArray(items) ? items : [items];
    if (list.length === 1) renderDetailCard(list[0]);
    else renderTable(list, parseInt(numOfRows), page);

  } catch(e) {
    console.error(e);
    showError('API 호출 중 오류가 발생했습니다. CORS 환경에서는 직접 조회가 제한될 수 있습니다.\n(' + e.message + ')');
  } finally {
    showLoading(false);
    document.getElementById('searchBtn').disabled = false;
    if (document.getElementById('searchBtn2')) document.getElementById('searchBtn2').disabled = false;
  }
}

function renderDetailCard(item) {
  const dir = formatChange(item.vs);
  currentStockInfo = {
    name: item.itmsNm,
    code: item.srtnCd,
    currentPrice: parseInt(item.clpr) || null,
    market: item.mrktCtg || ''
  };

  document.getElementById('cardHeader').innerHTML = `
    <div>
      <div class="stock-name">${item.itmsNm || '-'}</div>
      <div class="stock-code">${item.srtnCd || ''} &nbsp;|&nbsp; ${item.isinCd || ''}</div>
    </div>
    <div class="stock-market">${item.mrktCtg || '-'}</div>`;

  const sign = dir === 'up' ? '+' : dir === 'down' ? '-' : '';
  document.getElementById('priceSection').innerHTML = `
    <div class="price-current ${dir}">${formatNum(item.clpr)}원</div>
    <div class="price-change ${dir}">${arrow(item.vs)} ${formatNum(Math.abs(item.vs))} (${sign}${item.fltRt||'0'}%)</div>
    <div class="price-date">${formatDate(item.basDt)}</div>`;

  const stats = [
    { label:'시가',   value: formatNum(item.mkp),  cls:'' },
    { label:'고가',   value: formatNum(item.hipr), cls:'up' },
    { label:'저가',   value: formatNum(item.lopr), cls:'down' },
    { label:'전일종가', value: formatNum(item.vs ? item.clpr - item.vs : '-'), cls:'' },
    { label:'거래량',  value: formatNum(item.trqu), cls:'' },
    { label:'거래대금', value: formatNum(item.trPrc)+(item.trPrc?'원':''), cls:'' },
    { label:'시가총액', value: formatNum(item.mrktTotAmt)+(item.mrktTotAmt?'원':''), cls:'' },
    { label:'상장주식수', value: formatNum(item.lstgStCnt), cls:'' },
  ];

  document.getElementById('statsGrid').innerHTML = stats.map(s => `
    <div class="stat-item">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value ${s.cls}">${s.value}</div>
    </div>`).join('');

  document.getElementById('resultCard').classList.add('show');
}

function renderTable(list, numOfRows, page) {
  document.getElementById('tableHead').innerHTML = `
    <tr>
      <th>기준일</th><th>종목명</th><th>종목코드</th><th>시장</th>
      <th>종가</th><th>등락</th><th>등락률</th><th>시가</th><th>고가</th><th>저가</th><th>거래량</th>
    </tr>`;

  document.getElementById('tableBody').innerHTML = list.map(item => {
    const dir  = formatChange(item.vs);
    const sign = dir === 'up' ? '+' : '';
    return `<tr onclick="selectStock('${item.itmsNm}')" style="cursor:pointer">
      <td>${formatDate(item.basDt)}</td>
      <td class="td-name2">${item.itmsNm||'-'}</td>
      <td>${item.srtnCd||'-'}</td>
      <td>${item.mrktCtg||'-'}</td>
      <td>${formatNum(item.clpr)}</td>
      <td class="td-${dir}">${arrow(item.vs)} ${formatNum(Math.abs(item.vs))}</td>
      <td class="td-${dir}">${sign}${item.fltRt||'0'}%</td>
      <td>${formatNum(item.mkp)}</td>
      <td class="td-up">${formatNum(item.hipr)}</td>
      <td class="td-down">${formatNum(item.lopr)}</td>
      <td>${formatNum(item.trqu)}</td>
    </tr>`;
  }).join('');

  const totalPages = Math.ceil(totalCount / numOfRows);
  document.getElementById('infoStrip').innerHTML = `총 <strong>${totalCount.toLocaleString()}</strong>건 · ${page}/${totalPages} 페이지 · <span style="color:var(--text-muted)">행 클릭 시 상세 조회</span>`;

  let ph = '';
  ph += `<button class="page-btn" onclick="search(${page-1})" ${page<=1?'disabled':''}>‹</button>`;
  const sp = Math.max(1,page-2), ep = Math.min(totalPages,sp+4);
  for (let i=sp;i<=ep;i++) ph += `<button class="page-btn ${i===page?'active':''}" onclick="search(${i})">${i}</button>`;
  ph += `<button class="page-btn" onclick="search(${page+1})" ${page>=totalPages?'disabled':''}>›</button>`;
  document.getElementById('pagination').innerHTML = ph;
  document.getElementById('tableCard').classList.add('show');
}

function selectStock(name) {
  document.getElementById('searchInput').value = name;
  search();
}

function formatDate(d) {
  if (!d || d.length !== 8) return d||'-';
  return `${d.slice(0,4)}.${d.slice(4,6)}.${d.slice(6,8)}`;
}

function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorBox').classList.add('show');
}

function showLoading(v) {
  document.getElementById('loading').classList.toggle('show', v);
}

function hideAll() {
  ['errorBox','resultCard','tableCard','loading'].forEach(id => {
    document.getElementById(id).classList.remove('show');
  });
  currentStockInfo = null;
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') search();
});

// Init dates
(function() {
  const today  = new Date();
  const fmt    = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const monthAgo = new Date(today); monthAgo.setMonth(monthAgo.getMonth()-1);
  document.getElementById('endDate').value   = fmt(today);
  document.getElementById('startDate').value = fmt(monthAgo);
})();

// Close modal on overlay click
document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editModal')) closeModal();
});

// Initial render
renderPortfolio();
</script>
</body>
</html>
