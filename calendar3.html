<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>대한민국 기념일 달력</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ══════════════════════════════════════════
       TOKENS
    ══════════════════════════════════════════ */
    :root {
      --bg:       #f7f5f0;
      --surface:  #ffffff;
      --ink:      #1c1c1e;
      --ink2:     #48484a;
      --muted:    #8e8e93;
      --line:     #e5e5ea;
      --red:      #d0021b;
      --blue:     #1a56db;
      --green:    #1a7a3a;
      --gold:     #b8860b;
      --amber:    #f5a623;
      --purple:   #7b5ea7;
      --teal:     #0e7490;

      /* tag colours per type */
      --t-hol-bg:  #fff0f0; --t-hol-fg: var(--red);
      --t-ann-bg:  #f0f7ff; --t-ann-fg: var(--blue);
      --t-nat-bg:  #fff8e6; --t-nat-fg: #7a5c00;
      --t-sol-bg:  #f0f9f4; --t-sol-fg: var(--green);
      --t-etc-bg:  #f5f0ff; --t-etc-fg: var(--purple);

      --radius: 12px;
      --radius-sm: 6px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.05);
    }

    /* ══════════════════════════════════════════
       RESET
    ══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100dvh;
    }

    /* ══════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════ */
    .app-header {
      background: var(--ink);
      color: #fff;
      padding: 16px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .app-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -.3px;
      white-space: nowrap;
    }
    .app-subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: rgba(255,255,255,.4);
      letter-spacing: 1.5px;
      margin-top: 2px;
    }

    /* month nav */
    .month-nav {
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(255,255,255,.1);
      border-radius: 24px;
      padding: 2px;
      flex-shrink: 0;
    }
    .nav-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      transition: background .15s;
      /* IMPORTANT: prevent pointer-events issues */
      position: relative;
      z-index: 1;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .nav-btn:hover  { background: rgba(255,255,255,.15); }
    .nav-btn:active { background: rgba(255,255,255,.25); }
    .ym-label {
      font-family: 'DM Mono', monospace;
      font-size: .9rem;
      font-weight: 500;
      letter-spacing: 2px;
      color: #fff;
      min-width: 100px;
      text-align: center;
      user-select: none;
    }

    /* status strip */
    .status-strip {
      margin-top: 10px;
      font-family: 'DM Mono', monospace;
      font-size: .62rem;
      letter-spacing: 1px;
      color: rgba(255,255,255,.35);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .status-strip b { color: rgba(255,255,255,.7); }

    /* ══════════════════════════════════════════
       TYPE FILTER BAR
    ══════════════════════════════════════════ */
    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 10px 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: .72rem;
      font-weight: 500;
      border: 1.5px solid var(--line);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .filter-chip.active {
      border-color: var(--ink);
      background: var(--ink);
      color: #fff;
    }

    /* ══════════════════════════════════════════
       MAIN LAYOUT
    ══════════════════════════════════════════ */
    .app-body {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 12px 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ══════════════════════════════════════════
       CALENDAR CARD
    ══════════════════════════════════════════ */
    .cal-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* DOW header */
    .dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-bottom: 1.5px solid var(--line);
    }
    .dow-cell {
      padding: 10px 0 8px;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      color: var(--muted);
    }
    .dow-cell:first-child { color: var(--red); }
    .dow-cell:last-child  { color: var(--blue); }

    /* Days grid */
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .day-cell {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      min-height: 76px;
      padding: 6px 5px 4px;
      position: relative;
      transition: background .12s;
      cursor: default;
    }
    .day-cell:nth-child(7n) { border-right: none; }
    .day-cell.empty {
      background: rgba(0,0,0,.015);
      pointer-events: none;
    }
    .day-cell.has-event { background: #fafcff; }
    .day-cell.has-holiday { background: #fff8f8; }

    /* date number */
    .day-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      font-family: 'DM Mono', monospace;
      font-size: .78rem;
      font-weight: 500;
      color: var(--ink);
      border-radius: 50%;
      line-height: 1;
    }
    .day-cell.sun  .day-num { color: var(--red); }
    .day-cell.sat  .day-num { color: var(--blue); }
    .day-cell.is-holiday .day-num { color: var(--red); }
    .day-cell.today .day-num {
      background: var(--gold);
      color: #fff;
      font-weight: 700;
    }

    /* event dots / tags */
    .tag-list {
      margin-top: 3px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .etag {
      font-size: .55rem;
      font-weight: 500;
      line-height: 1.3;
      padding: 2px 4px;
      border-radius: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .etag.t-hol { background: var(--t-hol-bg); color: var(--t-hol-fg); }
    .etag.t-ann { background: var(--t-ann-bg); color: var(--t-ann-fg); }
    .etag.t-nat { background: var(--t-nat-bg); color: var(--t-nat-fg); }
    .etag.t-sol { background: var(--t-sol-bg); color: var(--t-sol-fg); }
    .etag.t-etc { background: var(--t-etc-bg); color: var(--t-etc-fg); }

    /* ══════════════════════════════════════════
       EVENT LIST CARD
    ══════════════════════════════════════════ */
    .list-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .list-card-title {
      padding: 14px 16px 10px;
      font-size: .78rem;
      font-weight: 700;
      color: var(--ink2);
      letter-spacing: .3px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .list-card-title .count-badge {
      font-family: 'DM Mono', monospace;
      font-size: .68rem;
      font-weight: 400;
      background: var(--bg);
      color: var(--muted);
      border-radius: 20px;
      padding: 2px 8px;
    }

    .ev-list { list-style: none; }
    .ev-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      animation: fadeUp .25s ease both;
    }
    .ev-item:last-child { border-bottom: none; }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .ev-date-col {
      font-family: 'DM Mono', monospace;
      font-size: .7rem;
      color: var(--muted);
      min-width: 38px;
      padding-top: 2px;
      flex-shrink: 0;
    }
    .ev-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .ev-dot.t-hol { background: var(--red); }
    .ev-dot.t-ann { background: var(--blue); }
    .ev-dot.t-nat { background: var(--amber); }
    .ev-dot.t-sol { background: var(--green); }
    .ev-dot.t-etc { background: var(--purple); }

    .ev-info { flex: 1; min-width: 0; }
    .ev-name {
      font-size: .82rem;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.4;
    }
    .ev-type-label {
      display: inline-block;
      font-size: .6rem;
      font-weight: 500;
      border-radius: 3px;
      padding: 1px 5px;
      margin-top: 2px;
    }
    .ev-type-label.t-hol { background: var(--t-hol-bg); color: var(--t-hol-fg); }
    .ev-type-label.t-ann { background: var(--t-ann-bg); color: var(--t-ann-fg); }
    .ev-type-label.t-nat { background: var(--t-nat-bg); color: var(--t-nat-fg); }
    .ev-type-label.t-sol { background: var(--t-sol-bg); color: var(--t-sol-fg); }
    .ev-type-label.t-etc { background: var(--t-etc-bg); color: var(--t-etc-fg); }

    /* ══════════════════════════════════════════
       LEGEND CARD
    ══════════════════════════════════════════ */
    .legend-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px 16px;
    }
    .legend-title {
      font-size: .72rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .legend-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px 12px;
    }
    .leg-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .73rem;
      color: var(--ink2);
    }
    .leg-swatch {
      width: 10px; height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* ══════════════════════════════════════════
       LOADER / ERROR
    ══════════════════════════════════════════ */
    .state-box {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 40px 20px;
      color: var(--muted);
      font-size: .8rem;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2.5px solid var(--line);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-icon { font-size: 1.8rem; }
    .error-msg  { color: var(--red); font-size: .78rem; text-align:center; line-height:1.6; }
    .error-hint { font-size: .68rem; color: var(--muted); text-align:center; line-height:1.6; }

    .empty-notice {
      padding: 24px 16px;
      text-align: center;
      color: var(--muted);
      font-size: .78rem;
    }

    /* ══════════════════════════════════════════
       RESPONSIVE — PC (≥ 700px): 2-col layout
    ══════════════════════════════════════════ */
    @media (min-width: 700px) {
      .app-body {
        display: grid;
        grid-template-columns: 1fr 260px;
        grid-template-rows: auto auto 1fr;
        align-items: start;
        padding: 20px 20px 40px;
        gap: 16px;
      }
      /* cal-card spans full left col */
      .cal-card    { grid-column: 1; grid-row: 1 / 4; }
      .list-card   { grid-column: 2; grid-row: 1; }
      .legend-card { grid-column: 2; grid-row: 2; }

      .day-cell { min-height: 96px; padding: 8px 7px 5px; }
      .etag { font-size: .6rem; }
      .day-num { font-size: .82rem; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════
     HEADER
════════════════════════════════════════ -->
<header class="app-header">
  <div class="header-top">
    <div>
      <div class="app-title">대한민국 기념일 달력</div>
      <div class="app-subtitle">KASI · 한국천문연구원 특일 정보</div>

<!-- ════════════════════════════════════════

<div class="filter-bar" id="filterBar" role="group" aria-label="표시 유형 필터">

<!-- ════════════════════════════════════════
     MAIN

<main class="app-body" id="appBody">

  <!-- Calendar -->
  <div class="cal-card">

    <div class="legend-grid">
      <div class="leg-row">

      </div>

<!-- ════════════════════════════════════════
     SCRIPT
════════════════════════════════════════ -->
<script>
/* ── API ── */
const API_KEY  = 'dc8294cd0177c5d51b45be29652fb691c4b18e055f22c87b0967ca1a78c7df0a';
const BASE_URL = 'https://apis.data.go.kr/B090041/openapi/service/SpcdeInfoService';

/* 5개 오퍼레이션 → 내부 type 코드 매핑 */
const ENDPOINTS = [
  { op: 'getRestDeInfo',       type: 'hol', label: '공휴일'  },
  { op: 'getAnniversaryInfo',  type: 'ann', label: '기념일'  },
  { op: 'getSundryDayInfo',    type: 'nat', label: '국경일'  },
  { op: 'get24DivisionsInfo',  type: 'sol', label: '24절기'  },
  { op: 'getHoliDeInfo',       type: 'etc', label: '잡절'    },
];

/* ── STATE ── */
let curYear, curMonth;
let activeFilter = 'all';
let cache = {};   // key → [{date,name,type,label,isHoliday}]
const today = new Date();

/* ── HELPERS ── */
const pad2 = n => String(n).padStart(2,'0');
const cacheKey = (y,m) => `${y}${pad2(m)}`;

/* ── FETCH ONE ENDPOINT ── */
async function fetchOne({ op, type, label }, year, month) {
  const mm  = pad2(month);
  const url = `${BASE_URL}/${op}?serviceKey=${API_KEY}&solYear=${year}&solMonth=${mm}&numOfRows=100&pageNo=1`;

  const res  = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();

  const xml   = new DOMParser().parseFromString(text, 'text/xml');
  const code  = xml.querySelector('resultCode')?.textContent?.trim();
  if (code && code !== '00') {
    const msg = xml.querySelector('resultMsg')?.textContent?.trim();
    throw new Error(`[${code}] ${msg}`);
  }

  const items = [];
  xml.querySelectorAll('item').forEach(el => {
    const date     = el.querySelector('locdate')?.textContent?.trim() || '';
    const name     = el.querySelector('dateName')?.textContent?.trim() || '';
    const isHoliday = el.querySelector('isHoliday')?.textContent?.trim() === 'Y';
    if (date && name) items.push({ date, name, type, label, isHoliday });
  });
  return items;
}

/* ── FETCH ALL 5 ── */
async function fetchMonth(year, month) {
  const key = cacheKey(year, month);
  if (cache[key]) return cache[key];

  const settled = await Promise.allSettled(
    ENDPOINTS.map(ep => fetchOne(ep, year, month))
  );

  const all = [];
  settled.forEach((r, i) => {
    if (r.status === 'fulfilled') all.push(...r.value);
    else console.warn(`${ENDPOINTS[i].label} 조회 실패:`, r.reason?.message);
  });

  /* 중복 제거 (같은 날짜+이름) */
  const seen = new Set();
  const unique = all.filter(e => {
    const k = e.date + e.name;
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });

  cache[key] = unique;
  return unique;
}

/* ── FILTER ── */
function applyFilter(events) {
  if (activeFilter === 'all') return events;
  return events.filter(e => e.type === activeFilter);
}

/* ── TAG CLASS per type ── */
const tagClass = { hol:'t-hol', ann:'t-ann', nat:'t-nat', sol:'t-sol', etc:'t-etc' };

/* ── RENDER ── */
async function renderCalendar(year, month) {
  /* header */
  document.getElementById('ymLabel').textContent    = `${year}.${pad2(month)}`;
  document.getElementById('statusLoad').innerHTML   = `STATUS <b>불러오는 중…</b>`;
  document.getElementById('countBadge').textContent = '──';

  /* loading state */
  document.getElementById('daysGrid').innerHTML =
    `<div class="state-box" style="grid-column:1/-1"><div class="spinner"></div><span>데이터 로딩 중…</span></div>`;
  document.getElementById('eventList').innerHTML =
    `<li class="empty-notice">불러오는 중…</li>`;

  /* fetch */
  let events = [];
  try {
    events = await fetchMonth(year, month);
  } catch(err) {
    document.getElementById('daysGrid').innerHTML = `
      <div class="state-box" style="grid-column:1/-1">
        <div class="error-icon">⚠️</div>
        <div class="error-msg">API 호출 실패: ${err.message}</div>
        <div class="error-hint">로컬 서버(예: VS Code Live Server)에서 열거나<br>브라우저 CORS 허용 확장을 사용해 주세요.</div>
      </div>`;
    document.getElementById('eventList').innerHTML =
      `<li class="empty-notice">데이터를 불러올 수 없습니다</li>`;
    document.getElementById('statusLoad').innerHTML = `STATUS <b style="color:#ff6b6b">오류</b>`;
    return;
  }

  /* ── filter ── */
  const visible = applyFilter(events);

  /* ── group by date ── */
  const byDate = {};
  visible.forEach(e => { (byDate[e.date] ??= []).push(e); });

  /* ── calendar cells ── */
  const firstDow    = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();
  const todayStr    = `${today.getFullYear()}${pad2(today.getMonth()+1)}${pad2(today.getDate())}`;

  let html = '';

  /* leading empty */
  for (let i = 0; i < firstDow; i++)
    html += `<div class="day-cell empty"></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}${pad2(month)}${pad2(d)}`;
    const dow     = (firstDow + d - 1) % 7;
    const isSun   = dow === 0;
    const isSat   = dow === 6;
    const isToday = dateStr === todayStr;
    const dayEvs  = byDate[dateStr] || [];
    const hasHol  = dayEvs.some(e => e.isHoliday);
    const hasEv   = dayEvs.length > 0;

    let cls = 'day-cell';
    if (isSun)   cls += ' sun';
    if (isSat)   cls += ' sat';
    if (isToday) cls += ' today';
    if (hasHol)  cls += ' is-holiday has-holiday';
    else if (hasEv) cls += ' has-event';

    /* up to 3 tags, then "+N" */
    const MAX_TAGS = 3;
    let tags = '';
    dayEvs.slice(0, MAX_TAGS).forEach(e => {
      const tc = tagClass[e.type] || 't-etc';
      tags += `<div class="etag ${tc}" title="${e.name}">${e.name}</div>`;
    });
    if (dayEvs.length > MAX_TAGS)
      tags += `<div class="etag t-etc">+${dayEvs.length - MAX_TAGS}</div>`;

    html += `
      <div class="${cls}">
        <div class="day-num">${d}</div>
        <div class="tag-list">${tags}</div>
      </div>`;
  }

  /* trailing empty */
  const total = firstDow + daysInMonth;
  const rem   = total % 7;
  if (rem !== 0) for (let i = 0; i < 7 - rem; i++)
    html += `<div class="day-cell empty"></div>`;

  document.getElementById('daysGrid').innerHTML = html;

  /* ── event list (sidebar) ── */
  const sorted = [...visible].sort((a,b) => a.date.localeCompare(b.date));
  document.getElementById('countBadge').textContent = `${sorted.length}건`;

  if (sorted.length === 0) {
    document.getElementById('eventList').innerHTML =
      `<li class="empty-notice">표시할 일정이 없습니다</li>`;
  } else {
    let listHtml = '';
    sorted.forEach((e, i) => {
      const dd = e.date.slice(6);
      const tc = tagClass[e.type] || 't-etc';
      listHtml += `
        <li class="ev-item" style="animation-delay:${i * 20}ms">
          <div class="ev-date-col">${dd}일</div>
          <div class="ev-dot ${tc}"></div>
          <div class="ev-info">
            <div class="ev-name">${e.name}</div>
            <div class="ev-type-label ${tc}">${e.label}</div>
          </div>
        </li>`;
    });
    document.getElementById('eventList').innerHTML = listHtml;
  }

  /* ── status ── */
  const counts = {};
  ENDPOINTS.forEach(ep => { counts[ep.type] = 0; });
  events.forEach(e => { if (counts[e.type] !== undefined) counts[e.type]++; });
  document.getElementById('statusLoad').innerHTML =
    `공휴일 <b>${counts.hol}</b> · 기념일 <b>${counts.ann}</b> · 국경일 <b>${counts.nat}</b> · 절기 <b>${counts.sol}</b> · 잡절 <b>${counts.etc}</b>`;
}

/* ══════════════════════════════════════════
   INIT — wire up buttons BEFORE any render
   (fixes the "arrow click not working" bug)
══════════════════════════════════════════ */
function init() {
  curYear  = today.getFullYear();
  curMonth = today.getMonth() + 1;

  /* Navigation — use onclick (most reliable cross-browser) */
  const prev = document.getElementById('prevBtn');
  const next = document.getElementById('nextBtn');

  prev.onclick = function() {
    curMonth--;
    if (curMonth < 1) { curMonth = 12; curYear--; }
    renderCalendar(curYear, curMonth);
  };
  next.onclick = function() {
    curMonth++;
    if (curMonth > 12) { curMonth = 1; curYear++; }
    renderCalendar(curYear, curMonth);
  };

  /* Filter chips */
  document.getElementById('filterBar').addEventListener('click', e => {
    const chip = e.target.closest('.filter-chip');
    if (!chip) return;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.type;
    renderCalendar(curYear, curMonth);
  });

  /* First render */
  renderCalendar(curYear, curMonth);
}

init();
</script>
</body>
</html>
