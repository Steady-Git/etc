<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>스케줄러</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #f7f5f0;
      --surface: #ffffff;
      --ink:     #1c1c1e;
      --ink2:    #48484a;
      --muted:   #8e8e93;
      --line:    #e5e5ea;
      --red:     #d0021b;
      --blue:    #1a56db;
      --gold:    #b8860b;
      --amber:   #f5a623;
      --radius:  12px;
      --shadow:  0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.05);
    }

    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body { background: var(--bg); color: var(--ink); font-family: 'Noto Sans KR', sans-serif; min-height: 100dvh; }

    /* ── HEADER ── */
    .app-header {
      background: var(--ink); color: #fff;
      padding: 14px 16px 10px;
      position: sticky; top: 0; z-index: 200;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .app-title { font-size: .95rem; font-weight: 700; letter-spacing: -.3px; }
    .app-subtitle { font-family: 'DM Mono', monospace; font-size: .58rem; color: rgba(255,255,255,.4); letter-spacing: 1.5px; margin-top: 2px; }

    /* ── TAB ── */
    .tab-bar {
      display: flex; gap: 0;
      background: var(--ink);
      border-top: 1px solid rgba(255,255,255,.08);
      padding: 0 16px;
    }
    .tab-btn {
      padding: 9px 20px 8px;
      font-family: 'DM Mono', monospace; font-size: .7rem; letter-spacing: 1px;
      color: rgba(255,255,255,.4); background: transparent; border: none;
      border-bottom: 2px solid transparent; cursor: pointer;
      transition: all .15s; white-space: nowrap;
    }
    .tab-btn.active { color: var(--amber); border-bottom-color: var(--amber); }

    /* ── BODY ── */
    .app-body { max-width: 960px; margin: 0 auto; padding: 16px 12px 40px; }
    .view { display: none; }
    .view.active { display: block; }

    /* ═══════════════════════════════
       단기 스케줄러 — 주간
    ═══════════════════════════════ */
    .week-header {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 12px 16px; margin-bottom: 12px;
    }
    .week-nav-btn {
      width: 36px; height: 36px; border: none; background: var(--bg);
      border-radius: 50%; font-size: 1rem; cursor: pointer; color: var(--ink2);
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .week-nav-btn:hover { background: var(--line); }
    .week-range-label {
      font-family: 'DM Mono', monospace; font-size: .85rem; font-weight: 500;
      color: var(--ink); letter-spacing: 1px; text-align: center; flex: 1;
    }
    .week-sub { font-size: .6rem; color: var(--muted); letter-spacing: 1px; margin-top: 2px; display: block; }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day-col {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex; flex-direction: column;
    }

    .day-col-head {
      padding: 8px 6px 6px;
      text-align: center;
      border-bottom: 1.5px solid var(--line);
    }
    .day-col-dow {
      font-family: 'DM Mono', monospace;
      font-size: .58rem; font-weight: 500; letter-spacing: 1px;
      color: var(--muted);
    }
    .day-col-dow.sun { color: var(--red); }
    .day-col-dow.sat { color: var(--blue); }

    .day-col-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 50%;
      font-family: 'DM Mono', monospace; font-size: .82rem; font-weight: 500;
      color: var(--ink); margin-top: 4px;
    }
    .day-col.sun .day-col-num { color: var(--red); }
    .day-col.sat .day-col-num { color: var(--blue); }
    .day-col.today .day-col-num { background: var(--gold); color: #fff; font-weight: 700; }

    .day-col-body {
      flex: 1;
      padding: 6px;
      display: flex; flex-direction: column; gap: 4px;
      min-height: 140px;
    }

    .task-input-wrap {
      display: flex; flex-direction: column; gap: 3px;
      flex: 1;
    }

    .task-item {
      display: flex; align-items: center; gap: 4px;
    }
    .task-cb {
      width: 13px; height: 13px; flex-shrink: 0;
      accent-color: var(--gold); cursor: pointer;
    }
    .task-text {
      flex: 1; border: none; background: transparent;
      font-family: 'Noto Sans KR', sans-serif; font-size: .65rem;
      color: var(--ink); outline: none; width: 100%;
      padding: 1px 2px;
      border-bottom: 1px solid transparent;
      transition: border-color .15s;
    }
    .task-text:focus { border-bottom-color: var(--gold); }
    .task-text.done { text-decoration: line-through; color: var(--muted); }
    .task-del {
      width: 14px; height: 14px; flex-shrink: 0;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: .65rem; line-height: 1;
      opacity: 0; transition: opacity .15s;
    }
    .task-item:hover .task-del { opacity: 1; }

    .add-task-btn {
      background: none; border: 1px dashed var(--line);
      border-radius: 6px; width: 100%; padding: 4px;
      font-family: 'Noto Sans KR', sans-serif; font-size: .6rem;
      color: var(--muted); cursor: pointer; text-align: center;
      transition: all .15s; margin-top: 2px;
    }
    .add-task-btn:hover { border-color: var(--gold); color: var(--gold); background: #fffbf0; }

    /* ═══════════════════════════════
       장기 스케줄러 — 연간
    ═══════════════════════════════ */
    .year-header {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 12px 16px; margin-bottom: 14px;
    }
    .year-nav-btn {
      width: 36px; height: 36px; border: none; background: var(--bg);
      border-radius: 50%; font-size: 1rem; cursor: pointer; color: var(--ink2);
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .year-nav-btn:hover { background: var(--line); }
    .year-label {
      font-family: 'DM Mono', monospace; font-size: 1.1rem; font-weight: 600;
      color: var(--ink); letter-spacing: 2px;
    }

    .months-wrap { display: flex; flex-direction: column; gap: 10px; }

    .month-card {
      background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
      overflow: hidden;
    }
    .month-card-head {
      background: var(--ink); color: #fff;
      padding: 8px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .month-card-title {
      font-family: 'DM Mono', monospace; font-size: .8rem; font-weight: 500;
      letter-spacing: 1.5px;
    }
    .month-card-today-badge {
      font-size: .55rem; background: var(--gold); color: #fff;
      border-radius: 10px; padding: 2px 7px; font-weight: 700; letter-spacing: .5px;
    }

    .quarters-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid var(--line);
    }

    .quarter-cell {
      border-right: 1px solid var(--line);
      padding: 0;
    }
    .quarter-cell:last-child { border-right: none; }

    .quarter-head {
      padding: 6px 10px 5px;
      border-bottom: 1px solid var(--line);
      background: var(--bg);
    }
    .quarter-period {
      font-family: 'DM Mono', monospace; font-size: .58rem;
      color: var(--muted); letter-spacing: .5px;
      display: block;
    }
    .quarter-week-label {
      font-size: .6rem; font-weight: 600; color: var(--ink2); margin-top: 2px;
      display: block;
    }
    .quarter-now {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold); margin-left: 4px; vertical-align: middle;
    }

    .quarter-body {
      padding: 6px 8px;
      min-height: 90px;
      display: flex; flex-direction: column; gap: 3px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .week-grid {
        grid-template-columns: repeat(7, 1fr);
        gap: 3px;
      }
      .day-col-body { min-height: 100px; }
      .day-col-num { width: 22px; height: 22px; font-size: .7rem; }
      .quarters-row { grid-template-columns: repeat(2, 1fr); }
      .quarter-cell:nth-child(2) { border-right: none; }
      .quarter-cell:nth-child(3) { border-right: 1px solid var(--line); border-top: 1px solid var(--line); }
      .quarter-cell:nth-child(4) { border-right: none; border-top: 1px solid var(--line); }
    }
    @media (min-width: 601px) and (max-width: 800px) {
      .week-grid { gap: 5px; }
    }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div>
      <div class="app-title">📋 스케줄러</div>
      <div class="app-subtitle">단기 · 장기 플래너</div>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="short">📅 주간 스케줄러</button>
    <button class="tab-btn" data-tab="long">🗓 연간 스케줄러</button>
  </div>
</header>

<div class="app-body">

  <!-- ══════════════════════════════
       단기: 주간 스케줄러
  ══════════════════════════════ -->
  <div class="view active" id="view-short">

    <div class="week-header">
      <button class="week-nav-btn" id="prevWeek">←</button>
      <div style="text-align:center;flex:1;">
        <div class="week-range-label" id="weekRangeLabel">────</div>
        <span class="week-sub" id="weekSubLabel">──주차</span>
      </div>
      <button class="week-nav-btn" id="nextWeek">→</button>
    </div>

    <div class="week-grid" id="weekGrid"></div>
  </div>

  <!-- ══════════════════════════════
       장기: 연간 스케줄러
  ══════════════════════════════ -->
  <div class="view" id="view-long">
    <div class="year-header">
      <button class="year-nav-btn" id="prevYear">←</button>
      <span class="year-label" id="yearLabel">────</span>
      <button class="year-nav-btn" id="nextYear">→</button>
    </div>
    <div class="months-wrap" id="monthsWrap"></div>
  </div>

</div>

<script>
/* ════════════════════════════════
   UTILITIES
════════════════════════════════ */
const pad2 = n => String(n).padStart(2,'0');
const today = new Date();
const todayStr = `${today.getFullYear()}-${pad2(today.getMonth()+1)}-${pad2(today.getDate())}`;

/* localStorage helpers */
function saveTask(key, tasks) {
  try { localStorage.setItem(key, JSON.stringify(tasks)); } catch(e) {}
}
function loadTask(key) {
  try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch(e) { return []; }
}

/* ════════════════════════════════
   TAB SWITCHING
════════════════════════════════ */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-' + btn.dataset.tab).classList.add('active');
  });
});

/* ════════════════════════════════
   주간 스케줄러
════════════════════════════════ */
const DOW_KO  = ['일','월','화','수','목','금','토'];
const DOW_CLS = ['sun','','','','','','sat'];

let weekOffset = 0; // weeks from current week

function getWeekDates(offset) {
  const base = new Date(today);
  const dow   = base.getDay(); // 0=Sun
  base.setDate(base.getDate() - dow + offset * 7);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(base);
    d.setDate(base.getDate() + i);
    days.push(d);
  }
  return days;
}

function fmtDate(d) {
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}

function fmtKorDate(d) {
  return `${d.getMonth()+1}월 ${d.getDate()}일`;
}

function getWeekNumber(d) {
  const jan1 = new Date(d.getFullYear(), 0, 1);
  return Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
}

/* Task DOM builder */
function buildTaskArea(storageKey) {
  const wrap = document.createElement('div');
  wrap.className = 'task-input-wrap';

  function renderItems() {
    wrap.innerHTML = '';
    const tasks = loadTask(storageKey);
    tasks.forEach((t, idx) => {
      const row = document.createElement('div');
      row.className = 'task-item';

      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.className = 'task-cb'; cb.checked = t.done;
      cb.addEventListener('change', () => {
        const ts = loadTask(storageKey); ts[idx].done = cb.checked; saveTask(storageKey, ts);
        inp.classList.toggle('done', cb.checked);
      });

      const inp = document.createElement('input');
      inp.type = 'text'; inp.className = 'task-text' + (t.done ? ' done' : '');
      inp.value = t.text; inp.placeholder = '할 일 입력…';
      inp.addEventListener('blur', () => {
        const ts = loadTask(storageKey); ts[idx].text = inp.value; saveTask(storageKey, ts);
      });
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); addTask(); }
      });

      const del = document.createElement('button');
      del.className = 'task-del'; del.textContent = '✕';
      del.addEventListener('click', () => {
        const ts = loadTask(storageKey); ts.splice(idx, 1); saveTask(storageKey, ts); renderItems();
      });

      row.appendChild(cb); row.appendChild(inp); row.appendChild(del);
      wrap.appendChild(row);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'add-task-btn'; addBtn.textContent = '+ 추가';
    addBtn.addEventListener('click', addTask);
    wrap.appendChild(addBtn);
  }

  function addTask() {
    const ts = loadTask(storageKey);
    ts.push({ text: '', done: false });
    saveTask(storageKey, ts);
    renderItems();
    // focus last input
    const inputs = wrap.querySelectorAll('.task-text');
    if (inputs.length) inputs[inputs.length - 1].focus();
  }

  renderItems();
  return wrap;
}

function renderWeek() {
  const days = getWeekDates(weekOffset);
  const first = days[0], last = days[6];

  // Range label
  const sameYear = first.getFullYear() === last.getFullYear();
  const sameMonth = sameYear && first.getMonth() === last.getMonth();
  let rangeText;
  if (sameMonth) {
    rangeText = `${first.getFullYear()}년 ${first.getMonth()+1}월 ${first.getDate()}일 – ${last.getDate()}일`;
  } else if (sameYear) {
    rangeText = `${first.getFullYear()}년 ${first.getMonth()+1}/${first.getDate()} – ${last.getMonth()+1}/${last.getDate()}`;
  } else {
    rangeText = `${first.getFullYear()}/${first.getMonth()+1}/${first.getDate()} – ${last.getFullYear()}/${last.getMonth()+1}/${last.getDate()}`;
  }
  document.getElementById('weekRangeLabel').textContent = rangeText;

  const wkNum = getWeekNumber(days[3]); // middle day
  document.getElementById('weekSubLabel').textContent = `${days[3].getFullYear()}년 제 ${wkNum}주차`;

  // Grid
  const grid = document.getElementById('weekGrid');
  grid.innerHTML = '';

  days.forEach((d, i) => {
    const dateStr = fmtDate(d);
    const isToday = dateStr === todayStr;
    const isSun = i === 0, isSat = i === 6;

    const col = document.createElement('div');
    col.className = 'day-col' + (isSun ? ' sun' : '') + (isSat ? ' sat' : '') + (isToday ? ' today' : '');

    const head = document.createElement('div');
    head.className = 'day-col-head';
    head.innerHTML = `
      <div class="day-col-dow ${isSun?'sun':isSat?'sat':''}">${DOW_KO[i]}</div>
      <div class="day-col-num">${d.getDate()}</div>
      <div style="font-family:'DM Mono',monospace;font-size:.5rem;color:var(--muted);margin-top:1px;">${d.getMonth()+1}/${d.getDate()}</div>
    `;

    const body = document.createElement('div');
    body.className = 'day-col-body';

    const storageKey = `week_task_${dateStr}`;
    body.appendChild(buildTaskArea(storageKey));

    col.appendChild(head);
    col.appendChild(body);
    grid.appendChild(col);
  });
}

document.getElementById('prevWeek').addEventListener('click', () => { weekOffset--; renderWeek(); });
document.getElementById('nextWeek').addEventListener('click', () => { weekOffset++; renderWeek(); });

/* ════════════════════════════════
   연간 스케줄러
════════════════════════════════ */
let longYear = today.getFullYear();

const MONTH_NAMES = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

/* 한 달을 4분의 1로 나누기: 각 구간의 시작일~종료일 */
function getQuarters(year, month) {
  const days = new Date(year, month, 0).getDate(); // 1-indexed
  const sizes = [
    Math.floor(days / 4),
    Math.floor(days / 4),
    Math.floor(days / 4),
    days - Math.floor(days / 4) * 3
  ];
  const quarters = [];
  let start = 1;
  for (let q = 0; q < 4; q++) {
    const end = start + sizes[q] - 1;
    quarters.push({ start, end, label: `${start}일 – ${end}일` });
    start = end + 1;
  }
  return quarters;
}

function isCurrentPeriod(year, month, qStart, qEnd) {
  if (today.getFullYear() !== year) return false;
  if (today.getMonth() + 1 !== month) return false;
  const d = today.getDate();
  return d >= qStart && d <= qEnd;
}

function renderYear() {
  document.getElementById('yearLabel').textContent = `${longYear}년`;

  const wrap = document.getElementById('monthsWrap');
  wrap.innerHTML = '';

  for (let m = 1; m <= 12; m++) {
    const quarters = getQuarters(longYear, m);
    const isThisMonth = (today.getFullYear() === longYear && today.getMonth() + 1 === m);

    const card = document.createElement('div');
    card.className = 'month-card';

    const cardHead = document.createElement('div');
    cardHead.className = 'month-card-head';
    cardHead.innerHTML = `
      <span class="month-card-title">${longYear}. ${pad2(m)} ${MONTH_NAMES[m-1]}</span>
      ${isThisMonth ? '<span class="month-card-today-badge">이번 달</span>' : ''}
    `;

    const qRow = document.createElement('div');
    qRow.className = 'quarters-row';

    quarters.forEach((q, qi) => {
      const isCurrent = isCurrentPeriod(longYear, m, q.start, q.end);

      const cell = document.createElement('div');
      cell.className = 'quarter-cell';

      const qHead = document.createElement('div');
      qHead.className = 'quarter-head';
      qHead.innerHTML = `
        <span class="quarter-period">${q.label}${isCurrent ? '<span class="quarter-now"></span>' : ''}</span>
        <span class="quarter-week-label">${qi+1}분기</span>
      `;

      const qBody = document.createElement('div');
      qBody.className = 'quarter-body';

      const storageKey = `year_task_${longYear}_${pad2(m)}_q${qi+1}`;
      qBody.appendChild(buildTaskArea(storageKey));

      cell.appendChild(qHead);
      cell.appendChild(qBody);
      qRow.appendChild(cell);
    });

    card.appendChild(cardHead);
    card.appendChild(qRow);
    wrap.appendChild(card);
  }
}

document.getElementById('prevYear').addEventListener('click', () => { longYear--; renderYear(); });
document.getElementById('nextYear').addEventListener('click', () => { longYear++; renderYear(); });

/* ════════════════════════════════
   INIT
════════════════════════════════ */
renderWeek();
renderYear();
</script>
</body>
</html>
