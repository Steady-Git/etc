<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>날씨 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #1a2235;
    --border: #1e2d45;
    --accent: #38bdf8;
    --accent2: #818cf8;
    --warm: #fb923c;
    --green: #34d399;
    --red: #f87171;
    --text: #e2e8f0;
    --muted: #64748b;
    --font-main: 'Noto Sans KR', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 20px rgba(56,189,248,0.3);
  }

  .logo h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo p {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    margin-top: 2px;
  }

  .update-time {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    background: var(--surface);
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  /* Region selector */
  .region-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .region-label {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--font-mono);
    white-space: nowrap;
  }

  .region-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: var(--font-main);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .region-btn:hover { border-color: var(--accent); color: var(--accent); }

  .region-btn.active {
    background: rgba(56,189,248,0.1);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 500;
  }

  /* Main grid */
  .main-grid {
    display: grid;
    grid-template-columns: 320px minmax(0, 1fr);
    gap: 20px;
    margin-bottom: 20px;
  }

  /* Current weather card */
  .current-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    position: relative;
    overflow: hidden;
  }

  .current-card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(56,189,248,0.12), transparent 70%);
    pointer-events: none;
  }

  .current-region {
    font-size: 13px;
    color: var(--accent);
    font-family: var(--font-mono);
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .current-temp {
    font-size: 80px;
    font-weight: 700;
    line-height: 1;
    margin: 12px 0;
    background: linear-gradient(135deg, #fff 40%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .current-sky {
    font-size: 18px;
    color: var(--text);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .current-sky .sky-icon { font-size: 24px; }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .stat-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }

  .stat-value span {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
  }

  /* Hourly chart card */
  .hourly-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    min-width: 0;
    overflow: hidden;
  }

  .card-title {
    font-size: 13px;
    color: var(--muted);
    font-family: var(--font-mono);
    letter-spacing: 1px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }

  .hourly-scroll {
    overflow-x: auto;
    overflow-y: visible;
    padding-bottom: 8px;
    -webkit-overflow-scrolling: touch;
  }

  .hourly-scroll::-webkit-scrollbar { height: 4px; }
  .hourly-scroll::-webkit-scrollbar-track { background: var(--surface); border-radius: 2px; }
  .hourly-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .hourly-list {
    display: flex;
    gap: 12px;
    min-width: max-content;
    width: max-content;
  }

  .hourly-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 14px;
    text-align: center;
    min-width: 72px;
    transition: all 0.2s;
    cursor: default;
  }

  .hourly-item:hover {
    border-color: var(--accent);
    background: rgba(56,189,248,0.05);
    transform: translateY(-2px);
  }

  .hourly-item.now {
    border-color: var(--accent);
    background: rgba(56,189,248,0.08);
  }

  .h-time {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .hourly-item.now .h-time { color: var(--accent); }

  .h-icon { font-size: 22px; margin-bottom: 10px; }

  .h-temp {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .h-pop {
    font-size: 11px;
    color: #60a5fa;
    font-family: var(--font-mono);
  }

  /* Compare section */
  .compare-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
  }

  .compare-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-top: 4px;
  }

  .compare-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 18px;
    position: relative;
    overflow: hidden;
    transition: all 0.25s;
    cursor: pointer;
  }

  .compare-item:hover {
    border-color: rgba(56,189,248,0.4);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  .compare-item.selected {
    border-color: var(--accent);
    background: rgba(56,189,248,0.06);
  }

  .compare-city {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .compare-eng {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--font-mono);
    margin-bottom: 16px;
  }

  .compare-temp-big {
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 8px;
  }

  .compare-sky {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .compare-bar {
    margin-top: 14px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .compare-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.8s ease;
  }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 16px;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading p {
    font-size: 13px;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  /* Error */
  .error-box {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: 14px;
    padding: 20px;
    color: var(--red);
    font-size: 14px;
    margin: 12px 0;
  }

  /* Fade in */
  .fade-in {
    animation: fadeIn 0.5s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE: Tablet (≤ 900px) ── */
  @media (max-width: 900px) {
    .main-grid {
      grid-template-columns: 1fr;
    }
    .compare-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  /* ── RESPONSIVE: Mobile (≤ 600px) ── */
  @media (max-width: 600px) {
    /* Container */
    .container {
      padding: 16px 14px 24px;
    }

    /* Header: 가로 배치 → 세로 배치 */
    header {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo h1 { font-size: 17px; }
    .logo p  { font-size: 10px; }
    .logo-icon { width: 36px; height: 36px; font-size: 18px; border-radius: 10px; }
    .update-time {
      font-size: 11px;
      padding: 6px 11px;
      align-self: flex-start;
    }

    /* Region bar: 스크롤 가능하게 */
    .region-bar {
      gap: 7px;
      margin-bottom: 18px;
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }
    .region-bar::-webkit-scrollbar { display: none; }
    .region-label { display: none; }
    .region-btn {
      padding: 8px 16px;
      font-size: 13px;
      flex-shrink: 0;
      border-radius: 20px;
    }

    /* Main grid: 세로 1열 */
    .main-grid {
      grid-template-columns: 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    /* Current card: 더 컴팩트하게 */
    .current-card {
      padding: 22px 20px;
      border-radius: 18px;
    }
    .current-region { font-size: 12px; margin-bottom: 4px; }
    .current-temp {
      font-size: 72px;
      margin: 8px 0;
    }
    .current-sky {
      font-size: 16px;
      margin-bottom: 20px;
    }
    .current-sky .sky-icon { font-size: 20px; }
    .stat-grid { gap: 10px; }
    .stat-item { padding: 12px; border-radius: 10px; }
    .stat-label { font-size: 10px; }
    .stat-value { font-size: 18px; }

    /* Hourly card */
    .hourly-card {
      padding: 18px 16px;
      border-radius: 18px;
    }
    .card-title { font-size: 12px; margin-bottom: 14px; }
    .hourly-item {
      min-width: 60px;
      padding: 12px 10px;
      border-radius: 12px;
    }
    .h-time  { font-size: 10px; margin-bottom: 8px; }
    .h-icon  { font-size: 20px; margin-bottom: 8px; }
    .h-temp  { font-size: 14px; margin-bottom: 4px; }
    .h-pop   { font-size: 10px; }
    .hourly-list { gap: 8px; }

    /* Compare card: 2열 그리드 */
    .compare-card {
      padding: 18px 16px;
      border-radius: 18px;
    }
    .compare-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .compare-item {
      padding: 14px 12px;
      border-radius: 12px;
    }
    .compare-city   { font-size: 13px; }
    .compare-eng    { font-size: 9px; margin-bottom: 10px; }
    .compare-temp-big { font-size: 28px; }
    .compare-sky    { font-size: 11px; }
    .compare-bar    { margin-top: 10px; }

    /* Loading & Error */
    .loading { padding: 40px 16px; }
    .spinner { width: 28px; height: 28px; }
    .loading p { font-size: 12px; }
    .error-box { padding: 14px 16px; font-size: 13px; }
  }

  /* ── RESPONSIVE: Very small (≤ 380px) ── */
  @media (max-width: 380px) {
    .current-temp { font-size: 60px; }
    .compare-grid { grid-template-columns: repeat(2, 1fr); }
    .compare-temp-big { font-size: 24px; }
    .region-btn { padding: 7px 13px; font-size: 12px; }
  }

  /* ══════════════════════════════════════
     3일 예보 카드
  ══════════════════════════════════════ */
  .daily-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-top: 20px;
  }

  .daily-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-top: 4px;
  }

  .daily-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 18px;
    text-align: center;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .daily-item:hover {
    border-color: rgba(56,189,248,0.4);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  .daily-item.today {
    border-color: var(--accent);
    background: rgba(56,189,248,0.06);
  }

  .daily-item.today::before {
    content: 'TODAY';
    position: absolute;
    top: 10px; right: 12px;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .daily-dow {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .daily-date {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 14px;
  }

  .daily-icon { font-size: 32px; margin-bottom: 14px; line-height: 1; }

  .daily-sky {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .daily-temps {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
  }

  .daily-hi {
    font-size: 22px;
    font-weight: 700;
    color: var(--warm);
  }

  .daily-lo {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }

  .daily-sep {
    font-size: 14px;
    color: var(--muted);
  }

  .daily-pop {
    margin-top: 12px;
    font-size: 12px;
    color: #60a5fa;
    font-family: var(--font-mono);
  }

  /* 온도 바 (최저~최고 범위) */
  .temp-range-bar {
    margin-top: 14px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: visible;
    position: relative;
  }

  .temp-range-fill {
    position: absolute;
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--warm));
    transition: width 0.8s ease, left 0.8s ease;
  }

  /* ══════════════════════════════════════
     온도 꺾은선 차트
  ══════════════════════════════════════ */
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-top: 20px;
  }

  .chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chart-legend {
    display: flex;
    gap: 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }

  .leg-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }

  .chart-canvas-wrap {
    position: relative;
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .chart-canvas-wrap::-webkit-scrollbar { height: 4px; }
  .chart-canvas-wrap::-webkit-scrollbar-track { background: var(--surface); }
  .chart-canvas-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  canvas#tempChart {
    display: block;
    min-width: 100%;
  }

  /* ── 반응형 추가 ── */
  @media (max-width: 600px) {
    .daily-card, .chart-card {
      padding: 18px 16px;
      border-radius: 18px;
      margin-top: 14px;
    }
    .daily-grid {
      gap: 10px;
    }
    .daily-item {
      padding: 16px 12px;
      border-radius: 12px;
    }
    .daily-dow   { font-size: 10px; }
    .daily-date  { font-size: 12px; margin-bottom: 10px; }
    .daily-icon  { font-size: 26px; margin-bottom: 10px; }
    .daily-sky   { font-size: 11px; margin-bottom: 12px; }
    .daily-hi, .daily-lo { font-size: 18px; }
    .daily-pop   { font-size: 11px; margin-top: 10px; }
  }

  @media (max-width: 380px) {
    .daily-hi, .daily-lo { font-size: 16px; }
    .daily-icon { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">🌤</div>
      <div>
        <h1>날씨 대시보드</h1>
        <p>기상청 단기예보 API</p>
      </div>
    </div>
    <div class="update-time" id="updateTime">로딩 중...</div>
  </header>

  <!-- Region selector -->
  <div class="region-bar">
    <span class="region-label">// REGION</span>
    <button class="region-btn active" data-idx="0" onclick="selectRegion(0)">서울</button>
    <button class="region-btn" data-idx="1" onclick="selectRegion(1)">부산</button>
    <button class="region-btn" data-idx="2" onclick="selectRegion(2)">대구</button>
    <button class="region-btn" data-idx="3" onclick="selectRegion(3)">인천</button>
    <button class="region-btn" data-idx="4" onclick="selectRegion(4)">광주</button>
    <button class="region-btn" data-idx="5" onclick="selectRegion(5)">대전</button>
  </div>

  <!-- Main grid: Current + Hourly -->
  <div class="main-grid">
    <div class="current-card" id="currentCard">
      <div class="loading"><div class="spinner"></div><p>날씨 조회 중...</p></div>
    </div>
    <div class="hourly-card" id="hourlyCard">
      <div class="loading"><div class="spinner"></div><p>시간별 예보 로딩...</p></div>
    </div>
  </div>


  <!-- 3일 예보 -->
  <div class="daily-card">
    <div class="card-title">3일 예보</div>
    <div class="daily-grid" id="dailyGrid">
      <div class="loading" style="grid-column:1/-1"><div class="spinner"></div><p>불러오는 중...</p></div>
    </div>
  </div>

  <!-- 온도 꺾은선 차트 -->
  <div class="chart-card">
    <div class="chart-header">
      <div class="card-title" style="margin-bottom:0">18시간 온도 추이</div>
      <div class="chart-legend">
        <span><span class="leg-dot" style="background:#38bdf8"></span>기온</span>
        <span><span class="leg-dot" style="background:#818cf8"></span>강수확률</span>
      </div>
    </div>
    <div class="chart-canvas-wrap">
      <canvas id="tempChart" height="180"></canvas>
    </div>
  </div>

  <!-- Compare -->
  <div class="compare-card">
    <div class="card-title">지역별 날씨 비교</div>
    <div class="compare-grid" id="compareGrid">
      <div class="loading"><div class="spinner"></div><p>불러오는 중...</p></div>
    </div>
  </div>

</div>

<script>
  // ★ 여기에 발급받은 인증키를 입력하세요
  const SERVICE_KEY = "dc8294cd0177c5d51b45be29652fb691c4b18e055f22c87b0967ca1a78c7df0a";
  const BASE_URL = "https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst";

  const REGIONS = [
    { name: "서울", eng: "Seoul",  nx: 60, ny: 127 },
    { name: "부산", eng: "Busan",  nx: 98, ny: 76  },
    { name: "대구", eng: "Daegu",  nx: 89, ny: 90  },
    { name: "인천", eng: "Incheon",nx: 55, ny: 124 },
    { name: "광주", eng: "Gwangju",nx: 58, ny: 74  },
    { name: "대전", eng: "Daejeon",nx: 67, ny: 100 },
  ];

  const SKY  = { "1": ["맑음","☀️"], "3": ["구름많음","⛅"], "4": ["흐림","☁️"] };
  const PTY  = { "0": ["없음",""], "1": ["비","🌧"], "2": ["비/눈","🌨"], "3": ["눈","❄️"], "4": ["소나기","⛈"] };

  let currentIdx = 0;
  let allData = {}; // { regionIdx: items[] }

  function getBaseDateTime() {
    const now = new Date();
    const times = ["0200","0500","0800","1100","1400","1700","2000","2300"];
    const h = now.getHours(), m = now.getMinutes();
    let baseTime = "2300";
    let baseDate = now;
    for (let t of times) {
      const th = parseInt(t.slice(0,2));
      if (h > th || (h === th && m >= 10)) baseTime = t;
    }
    if (baseTime === "2300" && h < 2) {
      baseDate = new Date(now - 86400000);
    }
    const y = baseDate.getFullYear();
    const mo = String(baseDate.getMonth()+1).padStart(2,'0');
    const d = String(baseDate.getDate()).padStart(2,'0');
    return { date: `${y}${mo}${d}`, time: baseTime };
  }

  async function fetchWeather(region) {
    const { date, time } = getBaseDateTime();
    const params = new URLSearchParams({
      serviceKey: SERVICE_KEY,
      pageNo: 1,
      numOfRows: 300,
      dataType: "JSON",
      base_date: date,
      base_time: time,
      nx: region.nx,
      ny: region.ny,
    });
    const res = await fetch(`${BASE_URL}?${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const rc = json?.response?.header?.resultCode;
    if (rc !== "00") throw new Error(`API 오류 코드: ${rc}`);
    return json.response.body.items.item;
  }

  function parseWeather(items) {
    // Group by fcstDate+fcstTime
    const map = {};
    for (const it of items) {
      const key = it.fcstDate + it.fcstTime;
      if (!map[key]) map[key] = { date: it.fcstDate, time: it.fcstTime };
      map[key][it.category] = it.fcstValue;
    }
    return Object.values(map).sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));
  }

  function skyInfo(item) {
    const pty = item.PTY || "0";
    const sky = item.SKY || "1";
    if (pty !== "0") return PTY[pty] || ["",PTY["0"][1]];
    return SKY[sky] || ["맑음","☀️"];
  }

  function renderCurrent(regionIdx) {
    const region = REGIONS[regionIdx];
    const items = allData[regionIdx];
    if (!items) return;

    const parsed = parseWeather(items);
    const now = new Date();
    const nowKey = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}${String(now.getHours()).padStart(2,'0')}00`;

    let current = parsed.find(p => (p.date+p.time) >= nowKey) || parsed[0];
    const [skyText, skyIcon] = skyInfo(current);
    const tmp = current.TMP ?? "--";
    const pop = current.POP ?? "--";
    const reh = current.REH ?? "--";
    const wsd = current.WSD ?? "--";

    document.getElementById('currentCard').innerHTML = `
      <div class="fade-in">
        <div class="current-region">${region.eng.toUpperCase()} · ${region.name}</div>
        <div class="current-temp">${tmp}°</div>
        <div class="current-sky">
          <span class="sky-icon">${skyIcon}</span>
          <span>${skyText}</span>
        </div>
        <div class="stat-grid">
          <div class="stat-item">
            <div class="stat-label">강수확률</div>
            <div class="stat-value">${pop}<span>%</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">습도</div>
            <div class="stat-value">${reh}<span>%</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">풍속</div>
            <div class="stat-value">${wsd}<span>m/s</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">기준 시각</div>
            <div class="stat-value" style="font-size:15px">${current.time.slice(0,2)}<span>시</span></div>
          </div>
        </div>
      </div>
    `;
  }

  function renderHourly(regionIdx) {
    const items = allData[regionIdx];
    if (!items) return;

    const parsed = parseWeather(items);
    const now = new Date();
    const nowKey = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}${String(now.getHours()).padStart(2,'0')}00`;

    const startIdx = Math.max(0, parsed.findIndex(p => (p.date+p.time) >= nowKey));
    const slice = parsed.slice(startIdx, startIdx + 18);

    const listHTML = slice.map((p, i) => {
      const [, icon] = skyInfo(p);
      const isNow = i === 0;
      const h = p.time.slice(0,2);
      return `
        <div class="hourly-item ${isNow ? 'now' : ''}">
          <div class="h-time">${isNow ? 'NOW' : h+'시'}</div>
          <div class="h-icon">${icon || '🌤'}</div>
          <div class="h-temp">${p.TMP ?? '--'}°</div>
          <div class="h-pop">💧${p.POP ?? '--'}%</div>
        </div>
      `;
    }).join('');

    document.getElementById('hourlyCard').innerHTML = `
      <div class="fade-in">
        <div class="card-title">시간별 예보</div>
        <div class="hourly-scroll">
          <div class="hourly-list">${listHTML}</div>
        </div>
      </div>
    `;
  }

  function renderCompare() {
    const temps = REGIONS.map((r, i) => {
      const items = allData[i];
      if (!items) return null;
      const parsed = parseWeather(items);
      const now = new Date();
      const nowKey = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}${String(now.getHours()).padStart(2,'0')}00`;
      const current = parsed.find(p => (p.date+p.time) >= nowKey) || parsed[0];
      return { region: r, idx: i, temp: parseFloat(current?.TMP ?? 0), sky: skyInfo(current) };
    }).filter(Boolean);

    if (temps.length === 0) return;

    const maxTemp = Math.max(...temps.map(t => t.temp));
    const minTemp = Math.min(...temps.map(t => t.temp));
    const range = maxTemp - minTemp || 1;

    const html = temps.map(t => {
      const pct = Math.round(((t.temp - minTemp) / range) * 100);
      const isHot = t.temp === maxTemp;
      const isCold = t.temp === minTemp;
      const badge = isHot ? '🔥' : isCold ? '🧊' : '';
      return `
        <div class="compare-item ${t.idx === currentIdx ? 'selected' : ''}" onclick="selectRegion(${t.idx})">
          <div class="compare-city">${t.region.name} ${badge}</div>
          <div class="compare-eng">${t.region.eng}</div>
          <div class="compare-temp-big" style="color:${isHot?'var(--warm)':isCold?'var(--accent)':'var(--text)'}">${t.temp}°</div>
          <div class="compare-sky">${t.sky[0] || '--'} ${t.sky[1]}</div>
          <div class="compare-bar">
            <div class="compare-bar-fill" style="width:${pct}%"></div>
          </div>
        </div>
      `;
    }).join('');

    document.getElementById('compareGrid').innerHTML = `<div class="fade-in" style="display:contents">${html}</div>`;
  }


  /* ══════════════════════════════════════
     renderDaily — 3일 예보 카드
  ══════════════════════════════════════ */
  function renderDaily(regionIdx) {
    const items = allData[regionIdx];
    if (!items) return;

    const parsed = parseWeather(items);
    const DOW = ['일','월','화','수','목','금','토'];
    const today = new Date();
    const todayStr = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;

    // 날짜별로 그룹핑
    const byDate = {};
    for (const p of parsed) {
      if (!byDate[p.date]) byDate[p.date] = [];
      byDate[p.date].push(p);
    }

    const dates = Object.keys(byDate).sort().slice(0, 3);

    // 3일 전체 온도 범위 (막대 상대 크기용)
    let globalMin = Infinity, globalMax = -Infinity;
    dates.forEach(d => {
      byDate[d].forEach(p => {
        const t = parseFloat(p.TMN ?? p.TMP ?? 0);
        const x = parseFloat(p.TMX ?? p.TMP ?? 0);
        if (t < globalMin) globalMin = t;
        if (x > globalMax) globalMax = x;
      });
    });
    const globalRange = globalMax - globalMin || 1;

    const html = dates.map(d => {
      const dayItems = byDate[d];
      const isToday = d === todayStr;

      // 최저/최고 기온
      const tmns = dayItems.map(p => parseFloat(p.TMN)).filter(v => !isNaN(v));
      const tmxs = dayItems.map(p => parseFloat(p.TMX)).filter(v => !isNaN(v));
      const tmps = dayItems.map(p => parseFloat(p.TMP)).filter(v => !isNaN(v));

      let lo = tmns.length ? Math.min(...tmns) : (tmps.length ? Math.min(...tmps) : null);
      let hi = tmxs.length ? Math.max(...tmxs) : (tmps.length ? Math.max(...tmps) : null);

      // TMN/TMX가 없으면 TMP 범위 사용
      if (lo === null && tmps.length) lo = Math.min(...tmps);
      if (hi === null && tmps.length) hi = Math.max(...tmps);

      // 대표 날씨: 낮 12시~15시 기준
      const noonItems = dayItems.filter(p => p.time >= '1200' && p.time <= '1500');
      const rep = noonItems[0] || dayItems[Math.floor(dayItems.length/2)] || dayItems[0];
      const [skyText, skyIcon] = skyInfo(rep);

      // 최대 강수확률
      const pops = dayItems.map(p => parseInt(p.POP||0)).filter(v=>!isNaN(v));
      const maxPop = pops.length ? Math.max(...pops) : '--';

      // 날짜 표시
      const dt = new Date(+d.slice(0,4), +d.slice(4,6)-1, +d.slice(6,8));
      const dow = DOW[dt.getDay()];
      const dateLabel = `${d.slice(4,6)}/${d.slice(6,8)}`;

      // 온도 바 위치
      const loN = lo ?? globalMin, hiN = hi ?? globalMax;
      const barLeft = ((loN - globalMin) / globalRange * 100).toFixed(1);
      const barWidth = ((hiN - loN) / globalRange * 100).toFixed(1);

      return `
        <div class="daily-item ${isToday ? 'today' : ''}">
          <div class="daily-dow">${dow}요일</div>
          <div class="daily-date">${dateLabel}</div>
          <div class="daily-icon">${skyIcon || '🌤'}</div>
          <div class="daily-sky">${skyText}</div>
          <div class="daily-temps">
            <span class="daily-lo">${lo !== null ? lo+'°' : '--'}</span>
            <span class="daily-sep">/</span>
            <span class="daily-hi">${hi !== null ? hi+'°' : '--'}</span>
          </div>
          <div class="daily-pop">💧 ${maxPop}%</div>
          <div class="temp-range-bar">
            <div class="temp-range-fill" style="left:${barLeft}%;width:${Math.max(barWidth,4)}%"></div>
          </div>
        </div>`;
    }).join('');

    document.getElementById('dailyGrid').innerHTML = `<div class="fade-in" style="display:contents">${html}</div>`;
  }

  /* ══════════════════════════════════════
     renderTempChart — 18시간 온도 꺾은선 차트
  ══════════════════════════════════════ */
  function renderTempChart(regionIdx) {
    const items = allData[regionIdx];
    if (!items) return;

    const parsed = parseWeather(items);
    const now = new Date();
    const nowKey = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}${String(now.getHours()).padStart(2,'0')}00`;
    const startIdx = Math.max(0, parsed.findIndex(p => (p.date+p.time) >= nowKey));
    const slice = parsed.slice(startIdx, startIdx + 18);

    if (!slice.length) return;

    const canvas = document.getElementById('tempChart');
    if (!canvas) return;

    // 캔버스 크기: 최소 너비 확보
    const POINT_W = 52;   // 포인트 간격
    const PAD = { top: 36, right: 24, bottom: 56, left: 44 };
    const W = Math.max(canvas.parentElement.clientWidth, slice.length * POINT_W + PAD.left + PAD.right);
    const H = 180;
    const DPR = window.devicePixelRatio || 1;

    canvas.width  = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(DPR, DPR);

    const temps = slice.map(p => parseFloat(p.TMP ?? 0));
    const pops  = slice.map(p => parseInt(p.POP ?? 0));
    const minT  = Math.min(...temps) - 2;
    const maxT  = Math.max(...temps) + 2;
    const rangeT = maxT - minT || 1;

    const plotW = W - PAD.left - PAD.right;
    const plotH = H - PAD.top  - PAD.bottom;

    const xOf = i  => PAD.left + (i / (slice.length - 1)) * plotW;
    const yOfT = v => PAD.top  + (1 - (v - minT) / rangeT) * plotH;
    const yOfP = v => PAD.top  + (1 - v / 100) * plotH;   // 강수확률

    // ── 격자 ──
    ctx.strokeStyle = 'rgba(30,45,69,0.8)';
    ctx.lineWidth   = 1;
    for (let i = 0; i <= 4; i++) {
      const y = PAD.top + (i / 4) * plotH;
      ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
    }

    // ── Y축 온도 눈금 ──
    ctx.fillStyle = 'rgba(100,116,139,0.9)';
    ctx.font = `500 10px 'DM Mono', monospace`;
    ctx.textAlign = 'right';
    for (let i = 0; i <= 4; i++) {
      const v = minT + (i / 4) * rangeT;
      const y = PAD.top + (1 - i/4) * plotH;
      ctx.fillText(Math.round(v) + '°', PAD.left - 6, y + 4);
    }

    // ── 강수확률 막대 ──
    const barW = Math.max(plotW / slice.length - 4, 6);
    pops.forEach((p, i) => {
      if (!p) return;
      const x  = xOf(i) - barW / 2;
      const bH = (p / 100) * plotH;
      const y  = PAD.top + plotH - bH;
      ctx.fillStyle = `rgba(129,140,248,${0.12 + p/100 * 0.2})`;
      ctx.fillRect(x, y, barW, bH);
    });

    // ── 온도 그라디언트 면 ──
    const grad = ctx.createLinearGradient(0, PAD.top, 0, PAD.top + plotH);
    grad.addColorStop(0,   'rgba(56,189,248,0.25)');
    grad.addColorStop(1,   'rgba(56,189,248,0.01)');
    ctx.beginPath();
    slice.forEach((p, i) => {
      const x = xOf(i), y = yOfT(parseFloat(p.TMP ?? 0));
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.lineTo(xOf(slice.length - 1), PAD.top + plotH);
    ctx.lineTo(xOf(0), PAD.top + plotH);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // ── 온도 선 ──
    ctx.beginPath();
    ctx.strokeStyle = '#38bdf8';
    ctx.lineWidth   = 2.5;
    ctx.lineJoin    = 'round';
    ctx.lineCap     = 'round';
    slice.forEach((p, i) => {
      const x = xOf(i), y = yOfT(parseFloat(p.TMP ?? 0));
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    // ── 포인트 & 온도 라벨 ──
    slice.forEach((p, i) => {
      const x  = xOf(i);
      const y  = yOfT(parseFloat(p.TMP ?? 0));
      const isNow = i === 0;

      // 점
      ctx.beginPath();
      ctx.arc(x, y, isNow ? 5 : 3.5, 0, Math.PI * 2);
      ctx.fillStyle   = isNow ? '#fff' : '#38bdf8';
      ctx.strokeStyle = '#38bdf8';
      ctx.lineWidth   = 2;
      ctx.fill();
      ctx.stroke();

      // 온도 텍스트
      ctx.fillStyle = isNow ? '#ffffff' : '#e2e8f0';
      ctx.font = `${isNow ? '600' : '400'} 11px 'DM Mono', monospace`;
      ctx.textAlign = 'center';
      ctx.fillText((p.TMP ?? '--') + '°', x, y - 12);

      // X축 시간 라벨
      ctx.fillStyle = i === 0 ? '#38bdf8' : 'rgba(100,116,139,0.85)';
      ctx.font = `${i === 0 ? '600' : '400'} 10px 'DM Mono', monospace`;
      const h = p.time.slice(0, 2);
      const dateChg = i > 0 && p.date !== slice[i-1].date;
      const label = i === 0 ? 'NOW' : (dateChg ? p.date.slice(6)+'일' : h+'시');
      ctx.fillText(label, x, H - PAD.bottom + 18);

      // 강수확률 라벨 (하단 2줄)
      if (pops[i] > 0) {
        ctx.fillStyle = 'rgba(129,140,248,0.8)';
        ctx.font = `400 9px 'DM Mono', monospace`;
        ctx.fillText(pops[i] + '%', x, H - PAD.bottom + 32);
      }
    });
  }

  async function selectRegion(idx) {
    currentIdx = idx;
    document.querySelectorAll('.region-btn').forEach((b,i) => b.classList.toggle('active', i===idx));

    if (allData[idx]) {
      renderCurrent(idx);
      renderHourly(idx);
      renderDaily(idx);
      renderTempChart(idx);
      renderCompare();
      return;
    }

    document.getElementById('currentCard').innerHTML = '<div class="loading"><div class="spinner"></div><p>날씨 조회 중...</p></div>';
    document.getElementById('hourlyCard').innerHTML = '<div class="loading"><div class="spinner"></div><p>시간별 예보 로딩...</p></div>';

    try {
      allData[idx] = await fetchWeather(REGIONS[idx]);
      renderCurrent(idx);
      renderHourly(idx);
      renderDaily(idx);
      renderTempChart(idx);
      renderCompare();
    } catch(e) {
      document.getElementById('currentCard').innerHTML = `<div class="error-box">⚠️ 오류: ${e.message}<br><small>인증키 또는 네트워크를 확인하세요.</small></div>`;
    }
  }

  async function loadAll() {
    const now = new Date();
    document.getElementById('updateTime').textContent =
      `업데이트 ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

    // 모든 지역 병렬 로드
    await Promise.all(REGIONS.map(async (r, i) => {
      try { allData[i] = await fetchWeather(r); } catch(e) { allData[i] = null; }
    }));

    renderCurrent(currentIdx);
    renderHourly(currentIdx);
    renderDaily(currentIdx);
    renderTempChart(currentIdx);
    renderCompare();
  }

  loadAll();
</script>
</body>
</html>
