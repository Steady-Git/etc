<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>날씨 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #1a2235;
    --border: #1e2d45;
    --accent: #38bdf8;
    --accent2: #818cf8;
    --warm: #fb923c;
    --green: #34d399;
    --red: #f87171;
    --text: #e2e8f0;
    --muted: #64748b;
    --font-main: 'Noto Sans KR', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 20px rgba(56,189,248,0.3);
  }

  .logo h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo p {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    margin-top: 2px;
  }

  .update-time {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    background: var(--surface);
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  /* Region selector */
  .region-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .region-label {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--font-mono);
    white-space: nowrap;
  }

  .region-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: var(--font-main);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .region-btn:hover { border-color: var(--accent); color: var(--accent); }

  .region-btn.active {
    background: rgba(56,189,248,0.1);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 500;
  }

  /* Main grid */
  .main-grid {
    display: grid;
    grid-template-columns: 320px minmax(0, 1fr);
    gap: 20px;
    margin-bottom: 20px;
  }

  /* Current weather card */
  .current-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    position: relative;
    overflow: hidden;
  }

  .current-card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(56,189,248,0.12), transparent 70%);
    pointer-events: none;
  }

  .current-region {
    font-size: 13px;
    color: var(--accent);
    font-family: var(--font-mono);
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .current-temp {
    font-size: 80px;
    font-weight: 700;
    line-height: 1;
    margin: 12px 0;
    background: linear-gradient(135deg, #fff 40%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .current-sky {
    font-size: 18px;
    color: var(--text);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .current-sky .sky-icon { font-size: 24px; }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .stat-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }

  .stat-value span {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
  }

  /* Hourly chart card */
  .hourly-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    min-width: 0;
    overflow: hidden;
  }

  .card-title {
    font-size: 13px;
    color: var(--muted);
    font-family: var(--font-mono);
    letter-spacing: 1px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }

  .hourly-scroll {
    overflow-x: auto;
    overflow-y: visible;
    padding-bottom: 8px;
    -webkit-overflow-scrolling: touch;
  }

  .hourly-scroll::-webkit-scrollbar { height: 4px; }
  .hourly-scroll::-webkit-scrollbar-track { background: var(--surface); border-radius: 2px; }
  .hourly-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .hourly-list {
    display: flex;
    gap: 12px;
    min-width: max-content;
    width: max-content;
  }

  .hourly-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 14px;
    text-align: center;
    min-width: 72px;
    transition: all 0.2s;
    cursor: default;
  }

  .hourly-item:hover {
    border-color: var(--accent);
    background: rgba(56,189,248,0.05);
    transform: translateY(-2px);
  }

  .hourly-item.now {
    border-color: var(--accent);
    background: rgba(56,189,248,0.08);
  }

  .h-time {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .hourly-item.now .h-time { color: var(--accent); }

  .h-icon { font-size: 22px; margin-bottom: 10px; }

  .h-temp {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .h-pop {
    font-size: 11px;
    color: #60a5fa;
    font-family: var(--font-mono);
  }

  /* Compare section */
  .compare-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-top: 20px;
  }

  .compare-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-top: 4px;
  }

  .compare-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 18px;
    position: relative;
    overflow: hidden;
    transition: all 0.25s;
    cursor: pointer;
  }

  .compare-item:hover {
    border-color: rgba(56,189,248,0.4);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  .compare-item.selected {
    border-color: var(--accent);
    background: rgba(56,189,248,0.06);
  }

  .compare-city {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .compare-eng {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--font-mono);
    margin-bottom: 16px;
  }

  .compare-temp-big {
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 8px;
  }

  .compare-sky {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .compare-bar {
    margin-top: 14px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .compare-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.8s ease;
  }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 16px;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading p {
    font-size: 13px;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  /* Error */
  .error-box {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: 14px;
    padding: 20px;
    color: var(--red);
    font-size: 14px;
    margin: 12px 0;
  }

  /* Fade in */
  .fade-in {
    animation: fadeIn 0.5s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE: Tablet (≤ 900px) ── */
  @media (max-width: 900px) {
    .main-grid {
      grid-template-columns: 1fr;
    }
    .compare-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  /* ── RESPONSIVE: Mobile (≤ 600px) ── */
  @media (max-width: 600px) {
    /* Container */
    .container {
      padding: 16px 14px 24px;
    }

    /* Header: 가로 배치 → 세로 배치 */
    header {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo h1 { font-size: 17px; }
    .logo p  { font-size: 10px; }
    .logo-icon { width: 36px; height: 36px; font-size: 18px; border-radius: 10px; }
    .update-time {
      font-size: 11px;
      padding: 6px 11px;
      align-self: flex-start;
    }

    /* Region bar: 스크롤 가능하게 */
    .region-bar {
      gap: 7px;
      margin-bottom: 18px;
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }
    .region-bar::-webkit-scrollbar { display: none; }
    .region-label { display: none; }
    .region-btn {
      padding: 8px 16px;
      font-size: 13px;
      flex-shrink: 0;
      border-radius: 20px;
    }

    /* Main grid: 세로 1열 */
    .main-grid {
      grid-template-columns: 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    /* Current card: 더 컴팩트하게 */
    .current-card {
      padding: 22px 20px;
      border-radius: 18px;
    }
    .current-region { font-size: 12px; margin-bottom: 4px; }
    .current-temp {
      font-size: 72px;
      margin: 8px 0;
    }
    .current-sky {
      font-size: 16px;
      margin-bottom: 20px;
    }
    .current-sky .sky-icon { font-size: 20px; }
    .stat-grid { gap: 10px; }
    .stat-item { padding: 12px; border-radius: 10px; }
    .stat-label { font-size: 10px; }
    .stat-value { font-size: 18px; }

    /* Hourly card */
    .hourly-card {
      padding: 18px 16px;
      border-radius: 18px;
    }
    .card-title { font-size: 12px; margin-bottom: 14px; }
    .hourly-item {
      min-width: 60px;
      padding: 12px 10px;
      border-radius: 12px;
    }
    .h-time  { font-size: 10px; margin-bottom: 8px; }
    .h-icon  { font-size: 20px; margin-bottom: 8px; }
    .h-temp  { font-size: 14px; margin-bottom: 4px; }
    .h-pop   { font-size: 10px; }
    .hourly-list { gap: 8px; }

    /* Compare card: 2열 그리드 */
    .compare-card {
      padding: 18px 16px;
      border-radius: 18px;
    }
    .compare-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .compare-item {
      padding: 14px 12px;
      border-radius: 12px;
    }
    .compare-city   { font-size: 13px; }
    .compare-eng    { font-size: 9px; margin-bottom: 10px; }
    .compare-temp-big { font-size: 28px; }
    .compare-sky    { font-size: 11px; }
    .compare-bar    { margin-top: 10px; }

    /* Loading & Error */
    .loading { padding: 40px 16px; }
    .spinner { width: 28px; height: 28px; }
    .loading p { font-size: 12px; }
    .error-box { padding: 14px 16px; font-size: 13px; }
  }

  /* ── RESPONSIVE: Very small (≤ 380px) ── */
  @media (max-width: 380px) {
    .current-temp { font-size: 60px; }
    .compare-grid { grid-template-columns: repeat(2, 1fr); }
    .compare-temp-big { font-size: 24px; }
    .region-btn { padding: 7px 13px; font-size: 12px; }
  }

  /* ══════════════════════════════════════
     3일 예보 카드
  ══════════════════════════════════════ */
  .daily-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-top: 20px;
  }

  .daily-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px;
    margin-top: 4px;
  }

  /* 단기/중기 출처 구분 뱃지 */
  .src-badge {
    position: absolute;
    top: 9px; left: 10px;
    font-family: var(--font-mono);
    font-size: 8px;
    letter-spacing: 0.5px;
    padding: 2px 5px;
    border-radius: 4px;
    font-weight: 600;
  }
  .src-badge.short {
    background: rgba(56,189,248,0.15);
    color: var(--accent);
  }
  .src-badge.mid {
    background: rgba(129,140,248,0.15);
    color: var(--accent2);
  }

  /* 중기예보 카드: 오전/오후 날씨 */
  .daily-ampm {
    display: flex;
    justify-content: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .daily-ampm span { white-space: nowrap; }

  /* 카드 헤더: 3일 예보 → 10일 예보로 제목 바꿈 + 출처 레이전드 */
  .daily-legend {
    display: flex;
    gap: 14px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 14px;
    flex-wrap: wrap;
    align-items: center;
  }
  .daily-legend .leg { display: flex; align-items: center; gap: 4px; }
  .daily-legend .dot {
    width: 7px; height: 7px; border-radius: 2px;
  }

  .daily-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 18px;
    text-align: center;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .daily-item:hover {
    border-color: rgba(56,189,248,0.4);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  .daily-item.today {
    border-color: var(--accent);
    background: rgba(56,189,248,0.06);
  }

  .daily-item.today::before {
    content: 'TODAY';
    position: absolute;
    top: 10px; right: 12px;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .daily-dow {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .daily-date {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 14px;
  }

  .daily-icon { font-size: 32px; margin-bottom: 14px; line-height: 1; }

  .daily-sky {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .daily-temps {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
  }

  .daily-hi {
    font-size: 22px;
    font-weight: 700;
    color: var(--warm);
  }

  .daily-lo {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }

  .daily-sep {
    font-size: 14px;
    color: var(--muted);
  }

  .daily-pop {
    margin-top: 12px;
    font-size: 12px;
    color: #60a5fa;
    font-family: var(--font-mono);
  }

  /* 온도 바 (최저~최고 범위) */
  .temp-range-bar {
    margin-top: 14px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: visible;
    position: relative;
  }

  .temp-range-fill {
    position: absolute;
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--warm));
    transition: width 0.8s ease, left 0.8s ease;
  }

  /* ══════════════════════════════════════
     온도 꺾은선 차트
  ══════════════════════════════════════ */
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-top: 20px;
  }

  .chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chart-legend {
    display: flex;
    gap: 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }

  .leg-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }

  .chart-canvas-wrap {
    position: relative;
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .chart-canvas-wrap::-webkit-scrollbar { height: 4px; }
  .chart-canvas-wrap::-webkit-scrollbar-track { background: var(--surface); }
  .chart-canvas-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  canvas#tempChart {
    display: block;
    min-width: 100%;
  }

  /* ── 반응형 추가 ── */
  @media (max-width: 600px) {
    .daily-card, .chart-card {
      padding: 18px 16px;
      border-radius: 18px;
      margin-top: 14px;
    }
    .daily-grid {
      gap: 10px;
    }
    .daily-item {
      padding: 16px 12px;
      border-radius: 12px;
    }
    .daily-dow   { font-size: 10px; }
    .daily-date  { font-size: 12px; margin-bottom: 10px; }
    .daily-icon  { font-size: 26px; margin-bottom: 10px; }
    .daily-sky   { font-size: 11px; margin-bottom: 12px; }
    .daily-hi, .daily-lo { font-size: 18px; }
    .daily-pop   { font-size: 11px; margin-top: 10px; }
  }

  @media (max-width: 380px) {
    .daily-hi, .daily-lo { font-size: 16px; }
    .daily-icon { font-size: 22px; }
  }

  /* ── 초단기실황 뱃지 ── */
  .ncst-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(52,211,153,0.12);
    border: 1px solid rgba(52,211,153,0.3);
    color: var(--green);
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 1px;
    padding: 3px 9px; border-radius: 6px;
    margin-bottom: 10px;
  }
  .ncst-badge::before {
    content: '';
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: blink-green 1.2s step-start infinite;
  }
  @keyframes blink-green { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── 일출/일몰 바 ── */
  .sun-bar-wrap {
    margin-top: 20px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px 12px;
  }
  .sun-bar-title {
    font-size: 11px; color: var(--muted);
    font-family: var(--font-mono); letter-spacing: 1px;
    margin-bottom: 10px;

<script>
  // ★ 여기에 발급받은 인증키를 입력하세요
  const SERVICE_KEY = "dc8294cd0177c5d51b45be29652fb691c4b18e055f22c87b0967ca1a78c7df0a";
  const BASE_URL = "https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst";

  const REGIONS = [
    { name: "서울", eng: "Seoul",   nx: 60, ny: 127, lat: 37.5665, lng: 126.9780, locCode: "1100000000", sido: "서울" },
    { name: "부산", eng: "Busan",   nx: 98, ny: 76,  lat: 35.1796, lng: 129.0756, locCode: "2600000000", sido: "부산" },
    { name: "대구", eng: "Daegu",   nx: 89, ny: 90,  lat: 35.8714, lng: 128.6014, locCode: "2700000000", sido: "대구" },
    { name: "인천", eng: "Incheon", nx: 55, ny: 124, lat: 37.4563, lng: 126.7052, locCode: "2800000000", sido: "인천" },
    { name: "광주", eng: "Gwangju", nx: 58, ny: 74,  lat: 35.1595, lng: 126.8526, locCode: "2900000000", sido: "광주" },
    { name: "대전", eng: "Daejeon", nx: 67, ny: 100, lat: 36.3504, lng: 127.3845, locCode: "3000000000", sido: "대전" },
  ];

  // 중기육상예보 구역코드 (지역별 매핑)
  const MID_LAND_CODE = {
    "서울": "11B00000", "인천": "11B00000",
    "부산": "11H20000", "대구": "11H10000",
    "광주": "11F20000", "대전": "11C10000",
  };
  // 중기기온예보 구역코드
  const MID_TEMP_CODE = {
    "서울": "11B10101", "인천": "11B20201",
    "부산": "11H20201", "대구": "11H10701",
    "광주": "11F20501", "대전": "11C10301",
  };
  const MID_BASE_URL_LAND = "https://apis.data.go.kr/1360000/MidFcstInfoService/getMidLandFcst";
  const MID_BASE_URL_TEMP = "https://apis.data.go.kr/1360000/MidFcstInfoService/getMidTa";

  const SKY  = { "1": ["맑음","☀️"], "3": ["구름많음","⛅"], "4": ["흐림","☁️"] };
  const PTY  = { "0": ["없음",""], "1": ["비","🌧"], "2": ["비/눈","🌨"], "3": ["눈","❄️"], "4": ["소나기","⛈"] };

  let currentIdx = 0;
  let allData   = {}; // { regionIdx: items[] }          단기예보
  let midData   = {}; // { regionIdx: { land, temp } }   중기예보
  let ncstData  = {}; // { regionIdx: { T1H, RN1, ... }} 초단기실황
  let sunData   = {}; // { regionIdx: { sunrise, sunset }} 일출일몰
  let aqiData   = {}; // { regionIdx: 대기오염 측정값 }


  /* ── 초단기실황 fetch (getUltraSrtNcst) ── */
  async function fetchNcst(region) {
    const now   = new Date();
    const y     = now.getFullYear();
    const mo    = String(now.getMonth()+1).padStart(2,'0');
    const d     = String(now.getDate()).padStart(2,'0');
    // 발표: 매 시각 40분 이후 → 현재시 사용, 이전이면 한 시간 전
    let bh = now.getHours();
    if (now.getMinutes() < 40) bh--;
    if (bh < 0) bh = 23;
    const base_time = String(bh).padStart(2,'0') + '30';
    const base_date = bh === 23 && now.getHours() === 0
      ? (() => { const p=new Date(now-86400000); return `${p.getFullYear()}${String(p.getMonth()+1).padStart(2,'0')}${String(p.getDate()).padStart(2,'0')}`; })()
      : `${y}${mo}${d}`;

    const url = `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getUltraSrtNcst?serviceKey=${SERVICE_KEY}&numOfRows=20&pageNo=1&dataType=JSON&base_date=${base_date}&base_time=${base_time}&nx=${region.nx}&ny=${region.ny}`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (json?.response?.header?.resultCode !== "00") return null;
    const items = json.response.body.items.item;
    const obj = {};
    for (const it of items) obj[it.category] = it.obsrValue;
    obj._time = base_time;
    return obj;
  }

  /* ── 일출/일몰 fetch (한국천문연구원 RiseSetInfoService) ──
     getAreaRiseSetInfo: 위경도 기반 일출·일몰 조회
     파라미터: locdate(YYYYMMDD), longitude, latitude, dnYn(Y=도분초)
  ── */
  async function fetchSunrise(region) {
    const now = new Date();
    const y   = now.getFullYear();
    const mo  = String(now.getMonth()+1).padStart(2,'0');
    const d   = String(now.getDate()).padStart(2,'0');
    const locdate = `${y}${mo}${d}`;

    // 위경도는 REGIONS에 추가된 lat/lng 사용
    const lat = region.lat;
    const lng = region.lng;
    if (!lat || !lng) return null;

    // longitude/latitude 소수점 둘째 자리까지
    const latStr = lat.toFixed(2);
    const lngStr = lng.toFixed(2);

    const url = `https://apis.data.go.kr/B090041/openapi/service/RiseSetInfoService/getAreaRiseSetInfo`
      + `?serviceKey=${SERVICE_KEY}&locdate=${locdate}&longitude=${lngStr}&latitude=${latStr}&dnYn=Y`;

    try {
      const res  = await fetch(url);
      if (!res.ok) { console.warn('[일출일몰] HTTP', res.status); return null; }
      const text = await res.text();
      console.log('[일출일몰] 응답 미리보기:', text.slice(0, 300));

      const xml = new DOMParser().parseFromString(text, 'text/xml');

      // 응답 결과코드 확인
      const rc = xml.querySelector('resultCode')?.textContent?.trim();
      if (rc && rc !== '00') {
        console.warn('[일출일몰] API 오류:', rc, xml.querySelector('resultMsg')?.textContent);
        return null;
      }

      const get = tag => xml.querySelector(tag)?.textContent?.trim() ?? null;

      // 실제 응답 태그명: sunrise, sunset (HHMM 형식)
      const sunrise = get('sunrise');
      const sunset  = get('sunset');

      if (!sunrise || !sunset) {
        console.warn('[일출일몰] 태그 없음. 전체 XML:', text.slice(0, 500));
        return null;
      }

      console.log(`[일출일몰] ${region.name}: 일출=${sunrise} 일몰=${sunset}`);
      return { sunrise, sunset, date: locdate };

    } catch(e) {
      console.warn('[일출일몰] 예외:', e.message);
      return null;
    }
  }


  /* ══════════════════════════════════════
     대기오염 — 시도별 실시간 측정정보
     API: getCtprvnRltmMesureDnsty
  ══════════════════════════════════════ */
  const AQI_BASE = "https://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getCtprvnRltmMesureDnsty";

  /* 등급 숫자 → CSS class + 텍스트 */
  function gradeInfo(g) {
    const map = { '1':['g1','좋음'], '2':['g2','보통'], '3':['g3','나쁨'], '4':['g4','매우나쁨'] };
    return map[String(g)] ?? ['gx','—'];
  }

  /* 통합지수 등급 → 배지 class + 아이콘 */
  function khaiBadgeInfo(g) {
    const map = {
      '1': ['grade-1', '😊', '좋음'],
      '2': ['grade-2', '😐', '보통'],
      '3': ['grade-3', '😷', '나쁨'],
      '4': ['grade-4', '🚨', '매우나쁨'],
    };
    return map[String(g)] ?? ['grade-x', '🌫', '정보없음'];
  }

  /* 오염물질별 등급 기준 (최대값 기준 %) */
  const POLL_MAX = { pm10Value: 300, pm25Value: 150, o3Value: 0.3,
                     no2Value: 0.4, coValue: 50, so2Value: 0.35 };

  async function fetchAqi(regionIdx) {
    const sido = REGIONS[regionIdx].sido;
    const url  = `${AQI_BASE}?serviceKey=${SERVICE_KEY}&returnType=json&numOfRows=100&pageNo=1&sidoName=${encodeURIComponent(sido)}&ver=1.0`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const rc   = json?.response?.header?.resultCode;
    if (rc !== '00') throw new Error(`AQI 오류 [${rc}]`);
    const items = json.response.body.items;
    if (!items?.length) return null;

    /* 측정소 평균 계산 (유효값만) */
    const avg = (key) => {
      const vals = items.map(it => parseFloat(it[key])).filter(v => !isNaN(v) && v >= 0);
      return vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length) : null;
    };

    return {
      pm10:  avg('pm10Value'),
      pm25:  avg('pm25Value'),
      o3:    avg('o3Value'),
      no2:   avg('no2Value'),
      co:    avg('coValue'),
      so2:   avg('so2Value'),
      khai:  avg('khaiValue'),
      khaiGrade: items[0]?.khaiGrade ?? null,
      pm10Grade: items[0]?.pm10Grade ?? null,
      pm25Grade: items[0]?.pm25Grade ?? null,
      o3Grade:   items[0]?.o3Grade   ?? null,
      no2Grade:  items[0]?.no2Grade  ?? null,
      dataTime:  items[0]?.dataTime  ?? null,
      stationCount: items.length,
    };
  }

  /* ── 대기오염 렌더링 ── */
  function renderAqi(regionIdx) {
    const d = aqiData[regionIdx];

    if (!d) {
      document.getElementById('pollutantGrid').innerHTML =
        `<div class="loading" style="grid-column:1/-1;padding:24px">
           <div class="error-box" style="margin:0">⚠️ 대기 데이터를 가져올 수 없습니다</div>
         </div>`;
      document.getElementById('khaiGlobal').className = 'khai-badge grade-x';
      document.getElementById('khaiGlobal').innerHTML = '<span class="khai-icon">🌫</span>정보없음';
      return;
    }

    /* 통합지수 배지 */
    const [bCls, bIcon, bText] = khaiBadgeInfo(d.khaiGrade);
    const khaiVal = d.khai ? Math.round(d.khai) : '—';
    document.getElementById('khaiGlobal').className = `khai-badge ${bCls}`;
    document.getElementById('khaiGlobal').innerHTML =
      `<span class="khai-icon">${bIcon}</span>${bText} (${khaiVal})`;

    /* 오염물질 목록 */
    const POLLS = [
      { key:'pm10',  label:'PM10',  unit:'㎍/㎥', gradeKey:'pm10Grade', dec:0, max:300 },
      { key:'pm25',  label:'PM2.5', unit:'㎍/㎥', gradeKey:'pm25Grade', dec:0, max:150 },
      { key:'o3',    label:'O₃',    unit:'ppm',   gradeKey:'o3Grade',   dec:3, max:0.3  },
      { key:'no2',   label:'NO₂',   unit:'ppm',   gradeKey:'no2Grade',  dec:3, max:0.4  },
      { key:'co',    label:'CO',    unit:'ppm',   gradeKey:null,        dec:1, max:50   },
      { key:'so2',   label:'SO₂',   unit:'ppm',   gradeKey:null,        dec:3, max:0.35 },
    ];

    const pollHtml = POLLS.map(p => {
      const val   = d[p.key];
      const grade = d[p.gradeKey] ?? null;
      const [gCls, gText] = gradeInfo(grade);
      const dispVal = val !== null ? val.toFixed(p.dec) : '--';
      const barPct  = val !== null ? Math.min(100, val / p.max * 100).toFixed(1) : 0;

      /* 바 색상: 등급에 따라 */
      const barColor = {g1:'#34d399',g2:'#fbbf24',g3:'#fb713e',g4:'#f87171',gx:'#334155'}[gCls] || '#334155';

      return `
        <div class="pollutant-item">
          <div class="poll-name">${p.label}</div>
          <div class="poll-value ${gCls}">${dispVal}<span class="poll-unit">${p.unit}</span></div>
          ${grade ? `<div class="poll-grade ${gCls}">${gText}</div>` : ''}
          <div class="poll-bar">
            <div class="poll-bar-fill" style="width:${barPct}%;background:${barColor}"></div>
          </div>
        </div>`;
    }).join('');

    document.getElementById('pollutantGrid').innerHTML = pollHtml;

    /* 지역별 AQI 비교 칩 */
    const chipHtml = REGIONS.map((r, i) => {
      const rd = aqiData[i];
      const v  = rd?.khai ? Math.round(rd.khai) : '—';
      const [gc] = rd ? khaiBadgeInfo(rd.khaiGrade) : ['grade-x'];
      const colorMap = {'grade-1':'#34d399','grade-2':'#fbbf24','grade-3':'#fb713e','grade-4':'#f87171','grade-x':'#64748b'};
      return `
        <div class="aqi-city-chip ${i===regionIdx?'active':''}" onclick="selectRegion(${i})">
          <div class="aqi-city-name">${r.name}</div>
          <div class="aqi-city-val" style="color:${colorMap[gc]}">${v}</div>
        </div>`;
    }).join('');
    document.getElementById('aqiCompareRow').innerHTML = chipHtml;

    /* 측정 시각 */
    if (d.dataTime) {
      document.getElementById('aqiTime').textContent =
        `📡 ${d.stationCount}개 측정소 평균 · 측정 시각 ${d.dataTime}`;
    }
  }

  /* 중기예보 발표 시각 계산 (06:00 / 18:00 기준) */
  function getMidTmFc() {
    const now = new Date();
    const h   = now.getHours();
    const y   = now.getFullYear();
    const mo  = String(now.getMonth() + 1).padStart(2, '0');
    const d   = String(now.getDate()).padStart(2, '0');
    // 06:10 이전이면 전날 18:00 발표
    if (h < 6 || (h === 6 && now.getMinutes() < 10)) {
      const prev = new Date(now - 86400000);
      return `${prev.getFullYear()}${String(prev.getMonth()+1).padStart(2,'0')}${String(prev.getDate()).padStart(2,'0')}1800`;
    }
    // 18:10 이전이면 당일 06:00 발표
    if (h < 18 || (h === 18 && now.getMinutes() < 10)) {
      return `${y}${mo}${d}0600`;
    }
    return `${y}${mo}${d}1800`;
  }

  /* 중기예보 fetch (육상예보 + 기온예보 병렬) */
  async function fetchMidWeather(regionName) {
    const tmFc     = getMidTmFc();
    const landCode = MID_LAND_CODE[regionName];
    const tempCode = MID_TEMP_CODE[regionName];
    if (!landCode || !tempCode) return null;

    const [landRes, tempRes] = await Promise.all([
      fetch(`${MID_BASE_URL_LAND}?serviceKey=${SERVICE_KEY}&numOfRows=10&pageNo=1&dataType=JSON&regId=${landCode}&tmFc=${tmFc}`),
      fetch(`${MID_BASE_URL_TEMP}?serviceKey=${SERVICE_KEY}&numOfRows=10&pageNo=1&dataType=JSON&regId=${tempCode}&tmFc=${tmFc}`),
    ]);

    const landJson = await landRes.json();
    const tempJson = await tempRes.json();

    const land = landJson?.response?.body?.items?.item?.[0] ?? null;
    const temp = tempJson?.response?.body?.items?.item?.[0] ?? null;

    // 개발 디버그: 실제 API 응답 필드 확인
    if (temp) {
      const keys = Object.keys(temp).filter(k => k.startsWith('ta'));
      console.log(`[중기기온] ${regionName} 응답 필드:`, keys.slice(0,8).join(', '));
      console.log(`[중기기온] taMin3 계열:`, temp.taMin3, temp.taMin3Low, temp.taMin3High);
    }
    if (land) {
      console.log(`[중기육상] ${regionName} wf3Am:`, land.wf3Am, 'wf3Pm:', land.wf3Pm);
    }

    // tmFc 문자열(YYYYMMDDHHMI)에서 발표 날짜(Date) 추출
    const tmFcDate = new Date(
      +tmFc.slice(0,4),
      +tmFc.slice(4,6) - 1,
      +tmFc.slice(6,8)
    );
    return { land, temp, tmFc, tmFcDate };
  }

  /* ══════════════════════════════════════
     parseMidDays — 중기예보 파싱
     n은 발표일 기준 인덱스 (n=3 → 발표일+3일)
     기온(taMin/taMax)이 null이면 해당 날짜를 결과에서 제외
     → renderDaily에서 단기예보(byDate)로 자동 fallback
  ══════════════════════════════════════ */
  function parseMidDays(midObj, startDate) {
    if (!midObj?.land || !midObj?.temp) return [];
    const { land, temp } = midObj;
    const DOW = ['일','월','화','수','목','금','토'];
    const days = [];

    /* 기온 필드 두 가지 명명 규칙 모두 시도
       형식A: taMin3, taMax3  (구 API)
       형식B: taMin3Low, taMax3High  (신 API) */
    function getTemp(obj, type, n) {
      const candidates = type === 'min'
        ? [`taMin${n}`, `taMin${n}Low`, `taMin${n}High`]
        : [`taMax${n}`, `taMax${n}High`, `taMax${n}Low`];
      for (const key of candidates) {
        const v = obj[key];
        if (v !== null && v !== undefined && v !== '') return v;
      }
      return null;
    }

    for (let n = 3; n <= 10; n++) {
      /* 발표일 기준 n일 후 날짜 계산 */
      const base = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
      base.setDate(base.getDate() + n);
      const yyyy    = base.getFullYear();
      const mm      = String(base.getMonth()+1).padStart(2,'0');
      const dd      = String(base.getDate()).padStart(2,'0');
      const dateStr = `${yyyy}${mm}${dd}`;

      /* 육상예보: n=3~7 → Am/Pm, n=8~10 → 단일 필드 */
      const hasAmPm = n <= 7;
      const wfAm = hasAmPm ? (land[`wf${n}Am`] ?? '') : (land[`wf${n}`] ?? '');
      const wfPm = hasAmPm ? (land[`wf${n}Pm`] ?? '') : '';
      const rnAm = parseInt(hasAmPm
        ? (land[`rnSt${n}Am`] ?? land[`rnSt${n}`] ?? '0')
        : (land[`rnSt${n}`]   ?? '0')) || 0;
      const rnPm   = hasAmPm ? (parseInt(land[`rnSt${n}Pm`] ?? '0') || 0) : 0;
      const maxPop = Math.max(rnAm, rnPm);

      /* 기온 */
      const lo = getTemp(temp, 'min', n);
      const hi = getTemp(temp, 'max', n);

      /* ★ 기온이 모두 null이면 이 날짜는 단기예보 fallback에 맡김 */
      if (lo === null && hi === null) {
        console.log(`[중기예보] ${dateStr} (n=${n}) taMin/taMax 모두 null → 단기예보로 fallback`);
        continue;
      }

      const repWf   = wfPm || wfAm;
      const skyIcon = wfToIcon(repWf);
      const skyText = repWf || '—';

      days.push({ dateStr, dow: DOW[base.getDay()], dateLabel:`${mm}/${dd}`,
                  lo, hi, maxPop, skyIcon, skyText, wfAm, wfPm, src:'mid' });
    }
    return days;
  }

  /* 중기예보 날씨 문자열 → 이모지 */
  function wfToIcon(wf) {
    if (!wf) return '🌤';
    if (wf.includes('맑음'))     return '☀️';
    if (wf.includes('구름많고') && wf.includes('비')) return '🌧';
    if (wf.includes('구름많고') && wf.includes('눈')) return '🌨';
    if (wf.includes('구름많음')) return '⛅';
    if (wf.includes('흐리고')   && wf.includes('비')) return '🌧';
    if (wf.includes('흐리고')   && wf.includes('눈')) return '🌨';
    if (wf.includes('흐리고')   && wf.includes('소나기')) return '⛈';
    if (wf.includes('흐림'))     return '☁️';
    if (wf.includes('비/눈'))    return '🌨';
    if (wf.includes('소나기'))   return '⛈';
    if (wf.includes('비'))       return '🌧';
    if (wf.includes('눈'))       return '❄️';
    return '🌤';
  }

  function getBaseDateTime() {
    const now = new Date();
    const times = ["0200","0500","0800","1100","1400","1700","2000","2300"];
    const h = now.getHours(), m = now.getMinutes();
    let baseTime = "2300";
    let baseDate = now;
    for (let t of times) {
      const th = parseInt(t.slice(0,2));
      if (h > th || (h === th && m >= 10)) baseTime = t;
    }
    if (baseTime === "2300" && h < 2) {
      baseDate = new Date(now - 86400000);
    }
    const y = baseDate.getFullYear();
    const mo = String(baseDate.getMonth()+1).padStart(2,'0');
    const d = String(baseDate.getDate()).padStart(2,'0');
    return { date: `${y}${mo}${d}`, time: baseTime };
  }

  async function fetchWeather(region) {
    const { date, time } = getBaseDateTime();
    const params = new URLSearchParams({
      serviceKey: SERVICE_KEY,
      pageNo: 1,
      numOfRows: 1000,   // 단기예보 최대 66시간 × ~12항목 = ~792개
      dataType: "JSON",
      base_date: date,
      base_time: time,
      nx: region.nx,
      ny: region.ny,
    });
    const res = await fetch(`${BASE_URL}?${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const rc = json?.response?.header?.resultCode;
    if (rc !== "00") throw new Error(`API 오류 코드: ${rc}`);
    return json.response.body.items.item;
  }

  function parseWeather(items) {
    // Group by fcstDate+fcstTime
    const map = {};
    for (const it of items) {
      const key = it.fcstDate + it.fcstTime;
      if (!map[key]) map[key] = { date: it.fcstDate, time: it.fcstTime };
      map[key][it.category] = it.fcstValue;
    }
    return Object.values(map).sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));
  }

  function skyInfo(item) {
    const pty = item.PTY || "0";
    const sky = item.SKY || "1";
    if (pty !== "0") return PTY[pty] || ["",PTY["0"][1]];
    return SKY[sky] || ["맑음","☀️"];
  }

    let current = parsed.find(p => (p.date+p.time) >= nowKey) || parsed[0];
    const [skyText, skyIcon] = skyInfo(current);

    /* 초단기실황 우선 적용 */
    const ncst = ncstData[regionIdx];

    const rn1  = ncst?.RN1  ?? null;   // 1시간 강수량

    const ncstBadge = ncst

      : '';

      const setPct   = (setMin  / totalDay * 100).toFixed(1);

      sunBarHtml = `
        <div class="sun-bar-wrap">

            <span class="sun-set">🌇 ${fmtT(sun.sunset)}</span>

          <div class="sun-track">
            <div class="sun-now-dot" style="left:${nowPct}%"></div>
          </div>
          <div class="sun-day-len">낮 길이 ${dayH}시간 ${dayM}분</div>
        </div>`;
    }

    document.getElementById('currentCard').innerHTML = `
      <div class="fade-in">
        ${ncstBadge}
        <div class="current-region">${region.eng.toUpperCase()} · ${region.name}</div>
        <div class="current-temp">${tmp}°</div>
        <div class="current-sky">
          <span class="sky-icon">${skyIcon}</span>
          <span>${skyText}</span>
        </div>
        <div class="stat-grid-3">
          <div class="stat-item">
            <div class="stat-label">강수확률</div>
            <div class="stat-value">${pop}<span>%</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">1h 강수량</div>
            <div class="stat-value" style="font-size:16px">${rnText}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">습도</div>
            <div class="stat-value">${reh}<span>%</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">풍속</div>
            <div class="stat-value">${wsd}<span>m/s</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">기준 시각</div>
            <div class="stat-value" style="font-size:15px">${current.time.slice(0,2)}<span>시</span></div>

  function renderHourly(regionIdx) {

    const nowKey = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}${String(now.getHours()).padStart(2,'0')}00`;

    const startIdx = Math.max(0, parsed.findIndex(p => (p.date+p.time) >= nowKey));
    const slice = parsed.slice(startIdx, startIdx + 18);

    const listHTML = slice.map((p, i) => {
      const [, icon] = skyInfo(p);

  function renderCompare() {
    const temps = REGIONS.map((r, i) => {
      const items = allData[i];
      if (!items) return null;
      const parsed = parseWeather(items);
      const now = new Date();
      const nowKey = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}${String(now.getHours()).padStart(2,'0')}00`;
      const current = parsed.find(p => (p.date+p.time) >= nowKey) || parsed[0];

      // 초단기실황(T1H) 우선 → 없으면 단기예보(TMP)
      const ncst = ncstData[i];
      const rawTemp = ncst?.T1H ?? current?.TMP ?? 0;
      const temp = parseFloat(rawTemp);
      const isRealtime = !!ncst?.T1H;   // 실측값 여부 표시용

      return { region: r, idx: i, temp, sky: skyInfo(current), isRealtime };
    }).filter(Boolean);

    if (temps.length === 0) return;

    const maxTemp = Math.max(...temps.map(t => t.temp));
    const minTemp = Math.min(...temps.map(t => t.temp));
    const range = maxTemp - minTemp || 1;

    const html = temps.map(t => {
      const pct = Math.round(((t.temp - minTemp) / range) * 100);
      const isHot  = t.temp === maxTemp;
      const isCold = t.temp === minTemp;
      const badge  = isHot ? '🔥' : isCold ? '🧊' : '';
      // 실측값이면 작은 뱃지 표시
      const rtBadge = t.isRealtime
        ? `<span style="font-size:9px;font-family:var(--font-mono);color:var(--green);letter-spacing:0.5px;margin-left:4px;vertical-align:middle">실측</span>`
        : '';
      return `
        <div class="compare-item ${t.idx === currentIdx ? 'selected' : ''}" onclick="selectRegion(${t.idx})">
          <div class="compare-city">${t.region.name} ${badge}</div>
          <div class="compare-eng">${t.region.eng}</div>
          <div class="compare-temp-big" style="color:${isHot?'var(--warm)':isCold?'var(--accent)':'var(--text)'}">${t.temp}°${rtBadge}</div>
          <div class="compare-sky">${t.sky[0] || '--'} ${t.sky[1]}</div>
          <div class="compare-bar">
            <div class="compare-bar-fill" style="width:${pct}%"></div>
          </div>
        </div>
      `;
    }).join('');

    document.getElementById('compareGrid').innerHTML = `<div class="fade-in" style="display:contents">${html}</div>`;
  }


  /* ══════════════════════════════════════
     renderDaily — 10일 예보
     우선순위: 중기예보 > 단기예보 (중기 없는 날만 단기로 보완)
  ══════════════════════════════════════ */
  function renderDaily(regionIdx) {
    const items = allData[regionIdx];
    if (!items) return;

    const parsed  = parseWeather(items);
    const DOW     = ['일','월','화','수','목','금','토'];
    const todayDt = new Date();
    const todayStr = `${todayDt.getFullYear()}${String(todayDt.getMonth()+1).padStart(2,'0')}${String(todayDt.getDate()).padStart(2,'0')}`;

    /* ── 단기예보 날짜별 그룹핑 ── */
    const byDate = {};
    for (const p of parsed) {
      if (!byDate[p.date]) byDate[p.date] = [];
      byDate[p.date].push(p);
    }

    /* 단기예보 day 객체 생성 함수 */
    function makeShortDay(d) {
      const dayItems = byDate[d];
      if (!dayItems) return null;
      const isToday = d === todayStr;
      const tmns = dayItems.map(p => parseFloat(p.TMN)).filter(v => !isNaN(v));
      const tmxs = dayItems.map(p => parseFloat(p.TMX)).filter(v => !isNaN(v));
      const tmps = dayItems.map(p => parseFloat(p.TMP)).filter(v => !isNaN(v));
      let lo = tmns.length ? Math.min(...tmns) : null;
      let hi = tmxs.length ? Math.max(...tmxs) : null;
      if (lo === null && tmps.length) lo = Math.min(...tmps);
      if (hi === null && tmps.length) hi = Math.max(...tmps);
      const noonItems = dayItems.filter(p => p.time >= '1200' && p.time <= '1500');
      const rep = noonItems[0] || dayItems[Math.floor(dayItems.length/2)] || dayItems[0];
      const [skyText, skyIcon] = skyInfo(rep);
      const pops = dayItems.map(p => parseInt(p.POP||0)).filter(v=>!isNaN(v));
      const maxPop = pops.length ? Math.max(...pops) : 0;
      const dt = new Date(+d.slice(0,4), +d.slice(4,6)-1, +d.slice(6,8));
      return { dateStr:d, dow:DOW[dt.getDay()], dateLabel:`${d.slice(4,6)}/${d.slice(6,8)}`,
               lo, hi, maxPop, skyIcon, skyText, src:'short', isToday };
    }

    /* ── 중기예보 파싱 ──
       parseMidDays에 발표일(tmFcDate) 전달 → n=3이 정확한 날짜에 맞음 ── */
    const mid = midData[regionIdx];
    const midStartDate = mid?.tmFcDate ?? todayDt;
    const midDays = mid ? parseMidDays(mid, midStartDate) : [];

    /* 중기예보 날짜를 Set으로 빠르게 조회 */
    const midDateSet = new Set(midDays.map(m => m.dateStr));
    const midByDate  = Object.fromEntries(midDays.map(m => [m.dateStr, m]));

    /* ── 오늘부터 D+10까지 날짜 순서대로 수집 ──
       우선순위: 중기예보 > 단기예보 (중기가 없는 날만 단기로 보완) ── */
    const allDays = [];
    for (let offset = 0; offset <= 10; offset++) {
      const dt = new Date(todayDt.getFullYear(), todayDt.getMonth(), todayDt.getDate() + offset);
      const dateStr = `${dt.getFullYear()}${String(dt.getMonth()+1).padStart(2,'0')}${String(dt.getDate()).padStart(2,'0')}`;

      if (midDateSet.has(dateStr)) {
        // 중기예보 우선
        allDays.push({ ...midByDate[dateStr], isToday: dateStr === todayStr });
      } else if (byDate[dateStr]) {
        // 중기 없으면 단기예보 사용
        const day = makeShortDay(dateStr);
        if (day) allDays.push(day);
      }
      // 둘 다 없는 날은 건너뜀
    }

    if (!allDays.length) return;

    /* ── 전체 온도 범위 계산 ── */
    let globalMin = Infinity, globalMax = -Infinity;
    allDays.forEach(d => {
      const lo = parseFloat(d.lo ?? 99), hi = parseFloat(d.hi ?? -99);
      if (!isNaN(lo) && lo < globalMin) globalMin = lo;
      if (!isNaN(hi) && hi > globalMax) globalMax = hi;
    });
    const globalRange = globalMax - globalMin || 1;

    /* ── 카드 HTML 생성 ── */
    const cardHtml = allDays.map(day => {
      const loN = parseFloat(day.lo ?? globalMin);
      const hiN = parseFloat(day.hi ?? globalMax);
      const barLeft  = ((!isNaN(loN) ? (loN - globalMin) / globalRange * 100 : 0)).toFixed(1);
      const barWidth = ((!isNaN(loN) && !isNaN(hiN) ? (hiN - loN) / globalRange * 100 : 4)).toFixed(1);
      const isMid = day.src === 'mid';

      // 오전/오후 날씨 (중기만)
      const ampm = isMid && day.wfAm && day.wfPm && day.wfAm !== day.wfPm
        ? `<div class="daily-ampm">
             <span>오전 ${wfToIcon(day.wfAm)}</span>
             <span>오후 ${wfToIcon(day.wfPm)}</span>
           </div>`
        : '';

      return `
        <div class="daily-item ${day.isToday ? 'today' : ''}">
          <span class="src-badge ${isMid ? 'mid' : 'short'}">${isMid ? 'MID' : 'NOW'}</span>
          <div class="daily-dow">${day.dow}요일</div>
          <div class="daily-date">${day.dateLabel}</div>
          <div class="daily-icon">${day.skyIcon || '🌤'}</div>
          ${ampm || `<div class="daily-sky">${day.skyText || ''}</div>`}
          <div class="daily-temps">
            <span class="daily-lo">${(day.lo !== null && day.lo !== undefined && day.lo !== '') ? day.lo+'°' : '--'}</span>
            <span class="daily-sep">/</span>
            <span class="daily-hi">${(day.hi !== null && day.hi !== undefined && day.hi !== '') ? day.hi+'°' : '--'}</span>
          </div>
          <div class="daily-pop">💧 ${day.maxPop ?? '--'}%</div>
          <div class="temp-range-bar">
            <div class="temp-range-fill" style="left:${barLeft}%;width:${Math.max(parseFloat(barWidth),4)}%"></div>
          </div>
        </div>`;
    }).join('');

    document.getElementById('dailyGrid').innerHTML =
      `<div class="fade-in" style="display:contents">${cardHtml}</div>`;
  }

  /* ══════════════════════════════════════
     renderTempChart — 18시간 온도 꺾은선 차트
  ══════════════════════════════════════ */
  function renderTempChart(regionIdx) {
    const items = allData[regionIdx];
    if (!items) return;

    const parsed = parseWeather(items);
    const now = new Date();
    const nowKey = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}${String(now.getHours()).padStart(2,'0')}00`;
    const startIdx = Math.max(0, parsed.findIndex(p => (p.date+p.time) >= nowKey));
    const slice = parsed.slice(startIdx, startIdx + 18);

    if (!slice.length) return;

    const canvas = document.getElementById('tempChart');
    if (!canvas) return;

    // 캔버스 크기: 최소 너비 확보
    const POINT_W = 52;   // 포인트 간격
    const PAD = { top: 36, right: 24, bottom: 56, left: 44 };
    const W = Math.max(canvas.parentElement.clientWidth, slice.length * POINT_W + PAD.left + PAD.right);
    const H = 180;
    const DPR = window.devicePixelRatio || 1;

    canvas.width  = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(DPR, DPR);

    const temps = slice.map(p => parseFloat(p.TMP ?? 0));
    const pops  = slice.map(p => parseInt(p.POP ?? 0));
    const minT  = Math.min(...temps) - 2;
    const maxT  = Math.max(...temps) + 2;
    const rangeT = maxT - minT || 1;

    const plotW = W - PAD.left - PAD.right;
    const plotH = H - PAD.top  - PAD.bottom;

    const xOf = i  => PAD.left + (i / (slice.length - 1)) * plotW;
    const yOfT = v => PAD.top  + (1 - (v - minT) / rangeT) * plotH;
    const yOfP = v => PAD.top  + (1 - v / 100) * plotH;   // 강수확률

    // ── 격자 ──
    ctx.strokeStyle = 'rgba(30,45,69,0.8)';
    ctx.lineWidth   = 1;
    for (let i = 0; i <= 4; i++) {
      const y = PAD.top + (i / 4) * plotH;
      ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
    }

    // ── Y축 온도 눈금 ──
    ctx.fillStyle = 'rgba(100,116,139,0.9)';
    ctx.font = `500 10px 'DM Mono', monospace`;
    ctx.textAlign = 'right';
    for (let i = 0; i <= 4; i++) {
      const v = minT + (i / 4) * rangeT;
      const y = PAD.top + (1 - i/4) * plotH;
      ctx.fillText(Math.round(v) + '°', PAD.left - 6, y + 4);
    }

    // ── 강수확률 막대 ──
    const barW = Math.max(plotW / slice.length - 4, 6);
    pops.forEach((p, i) => {
      if (!p) return;
      const x  = xOf(i) - barW / 2;
      const bH = (p / 100) * plotH;
      const y  = PAD.top + plotH - bH;
      ctx.fillStyle = `rgba(129,140,248,${0.12 + p/100 * 0.2})`;
      ctx.fillRect(x, y, barW, bH);
    });

    // ── 온도 그라디언트 면 ──
    const grad = ctx.createLinearGradient(0, PAD.top, 0, PAD.top + plotH);
    grad.addColorStop(0,   'rgba(56,189,248,0.25)');
    grad.addColorStop(1,   'rgba(56,189,248,0.01)');
    ctx.beginPath();
    slice.forEach((p, i) => {
      const x = xOf(i), y = yOfT(parseFloat(p.TMP ?? 0));
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.lineTo(xOf(slice.length - 1), PAD.top + plotH);
    ctx.lineTo(xOf(0), PAD.top + plotH);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // ── 온도 선 ──
    ctx.beginPath();
    ctx.strokeStyle = '#38bdf8';
    ctx.lineWidth   = 2.5;
    ctx.lineJoin    = 'round';
    ctx.lineCap     = 'round';
    slice.forEach((p, i) => {
      const x = xOf(i), y = yOfT(parseFloat(p.TMP ?? 0));
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    // ── 포인트 & 온도 라벨 ──
    slice.forEach((p, i) => {
      const x  = xOf(i);
      const y  = yOfT(parseFloat(p.TMP ?? 0));
      const isNow = i === 0;

      // 점
      ctx.beginPath();
      ctx.arc(x, y, isNow ? 5 : 3.5, 0, Math.PI * 2);
      ctx.fillStyle   = isNow ? '#fff' : '#38bdf8';
      ctx.strokeStyle = '#38bdf8';
      ctx.lineWidth   = 2;
      ctx.fill();
      ctx.stroke();

      // 온도 텍스트
      ctx.fillStyle = isNow ? '#ffffff' : '#e2e8f0';
      ctx.font = `${isNow ? '600' : '400'} 11px 'DM Mono', monospace`;
      ctx.textAlign = 'center';
      ctx.fillText((p.TMP ?? '--') + '°', x, y - 12);

      // X축 시간 라벨
      ctx.fillStyle = i === 0 ? '#38bdf8' : 'rgba(100,116,139,0.85)';
      ctx.font = `${i === 0 ? '600' : '400'} 10px 'DM Mono', monospace`;
      const h = p.time.slice(0, 2);
      const dateChg = i > 0 && p.date !== slice[i-1].date;
      const label = i === 0 ? 'NOW' : (dateChg ? p.date.slice(6)+'일' : h+'시');
      ctx.fillText(label, x, H - PAD.bottom + 18);

      // 강수확률 라벨 (하단 2줄)
      if (pops[i] > 0) {
        ctx.fillStyle = 'rgba(129,140,248,0.8)';
        ctx.font = `400 9px 'DM Mono', monospace`;
        ctx.fillText(pops[i] + '%', x, H - PAD.bottom + 32);
      }
    });
  }

  async function selectRegion(idx) {
    currentIdx = idx;
    document.querySelectorAll('.region-btn').forEach((b,i) => b.classList.toggle('active', i===idx));

    if (allData[idx]) {
      renderCurrent(idx);
      renderHourly(idx);
      renderDaily(idx);
      renderTempChart(idx);
      renderAqi(idx);
      renderCompare();
      return;
    }

    document.getElementById('currentCard').innerHTML = '<div class="loading"><div class="spinner"></div><p>날씨 조회 중...</p></div>';
    document.getElementById('hourlyCard').innerHTML = '<div class="loading"><div class="spinner"></div><p>시간별 예보 로딩...</p></div>';
    document.getElementById('dailyGrid').innerHTML = '<div class="loading" style="grid-column:1/-1"><div class="spinner"></div><p>예보 로딩 중...</p></div>';

    try {
      const [shortItems, midResult, ncstResult, sunResult, aqiResult] = await Promise.allSettled([
        fetchWeather(REGIONS[idx]),
        fetchMidWeather(REGIONS[idx].name),
        fetchNcst(REGIONS[idx]),
        fetchSunrise(REGIONS[idx]),
        fetchAqi(idx),
      ]);
      if (shortItems.status === 'fulfilled') allData[idx] = shortItems.value;
      else throw shortItems.reason;
      if (midResult.status  === 'fulfilled') midData[idx]  = midResult.value;
      if (ncstResult.status === 'fulfilled') ncstData[idx] = ncstResult.value;
      if (sunResult.status  === 'fulfilled') sunData[idx]  = sunResult.value;
      if (aqiResult.status  === 'fulfilled') aqiData[idx]  = aqiResult.value;

      renderCurrent(idx);
      renderHourly(idx);
      renderDaily(idx);
      renderTempChart(idx);
      renderAqi(idx);
      renderCompare();
    } catch(e) {
      document.getElementById('currentCard').innerHTML = `<div class="error-box">⚠️ 오류: ${e.message}<br><small>인증키 또는 네트워크를 확인하세요.</small></div>`;
    }
  }

  async function loadAll() {
    const now = new Date();
    document.getElementById('updateTime').textContent =
      `업데이트 ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

    // 모든 지역 단기 + 중기 + 초단기실황 + 일출일몰 + 대기오염 병렬 로드
    await Promise.all(REGIONS.map(async (r, i) => {
      const [shortRes, midRes, ncstRes, sunRes, aqiRes] = await Promise.allSettled([
        fetchWeather(r),
        fetchMidWeather(r.name),
        fetchNcst(r),
        fetchSunrise(r),
        fetchAqi(i),
      ]);
      allData[i]  = shortRes.status === 'fulfilled' ? shortRes.value : null;
      midData[i]  = midRes.status   === 'fulfilled' ? midRes.value   : null;
      ncstData[i] = ncstRes.status  === 'fulfilled' ? ncstRes.value  : null;
      sunData[i]  = sunRes.status   === 'fulfilled' ? sunRes.value   : null;
      aqiData[i]  = aqiRes.status   === 'fulfilled' ? aqiRes.value   : null;
    }));

    renderCurrent(currentIdx);
    renderHourly(currentIdx);
    renderDaily(currentIdx);
    renderTempChart(currentIdx);
    renderAqi(currentIdx);
    renderCompare();
  }

  loadAll();
</script>
